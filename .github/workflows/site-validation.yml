name: Site Validation

on:
  pull_request:
    paths:
      - ".github/workflows/site-validation.yml"
      - "amplify.yml"
      - "site/**"
      - ".kiro/specs/site-*/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/site-validation.yml"
      - "amplify.yml"
      - "site/**"
      - ".kiro/specs/site-*/**"

jobs:
  site-validation:
    name: Site validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate generated site
        run: npm run validate
