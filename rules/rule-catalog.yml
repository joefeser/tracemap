rules:
  - id: repo.manifest.v1
    name: Repository manifest
    description: Captures repo metadata, commit SHA, project inventory, scan status, and known gaps.
    evidenceTier: Tier2Structural
    emits:
      - RepoScanned
      - BuildStatus
      - AnalysisGap
    limitations:
      - Git metadata may be unavailable outside a git checkout.

  - id: file.inventory.v1
    name: File inventory
    description: Records deterministic inventory facts for supported solution, project, source, config, JSON, and SQL files.
    evidenceTier: Tier2Structural
    emits:
      - FileInventoried
      - ConfigFileDeclared
      - SqlFileDeclared
    limitations:
      - File presence is structural evidence only; it does not prove runtime usage.
      - Generated, bin, obj, .git, and TraceMap output directories are excluded in the MVP.

  - id: project.file.v1
    name: Project file inventory
    description: Reads solution and C# project declarations, target frameworks, and package references from project files and packages.config.
    evidenceTier: Tier2Structural
    emits:
      - SolutionDeclared
      - ProjectDeclared
      - TargetFrameworkDeclared
      - PackageReferenced
    limitations:
      - XML files that cannot be parsed are still inventoried but do not emit project metadata facts.
      - Conditional MSBuild properties are not evaluated in Milestone 1.

  - id: csharp.syntax.memberaccess.v1
    name: C# syntax member access
    description: Finds member access names from C# syntax without requiring compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
    limitations:
      - Does not prove the containing type or symbol identity.
      - May match unrelated properties with the same name.

  - id: csharp.syntax.declarations.v1
    name: C# syntax declarations
    description: Finds type, method, property, enum, and attribute names from C# syntax without requiring project load or compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - PropertyDeclared
      - EnumDeclared
      - AttributeUsed
      - AnalysisGap
    limitations:
      - Does not prove symbol identity, overload resolution, inheritance, or generated code behavior.
      - Files with parse errors may still emit partial syntax facts, and parse errors are reported as AnalysisGap facts.

  - id: csharp.syntax.invocation.v1
    name: C# syntax invocation
    description: Finds invocation expression names from C# syntax without requiring compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - InvocationName
    limitations:
      - Does not prove receiver type, overload target, extension method binding, or runtime dispatch.

  - id: csharp.semantic.propertyaccess.v1
    name: C# semantic property access
    description: Finds compiler-resolved property accesses using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - PropertyAccessed
    limitations:
      - Requires project load and enough references to resolve symbols.
      - Does not detect reflection-only access.
      - Member access syntax that does not bind to an IPropertySymbol is not emitted by this rule.

  - id: csharp.semantic.methodinvocation.v1
    name: C# semantic method invocation
    description: Finds compiler-resolved method invocations using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - MethodInvoked
    limitations:
      - Requires project load and enough references to resolve symbols.
      - Dynamic dispatch, reflection, and unresolved overload candidates are not emitted by this rule.

  - id: csharp.semantic.declarations.v1
    name: C# semantic declarations
    description: Finds compiler-resolved type declarations using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - TypeDeclared
    limitations:
      - Requires project load and enough references to create a Roslyn compilation.
      - Generated source excluded from inventory is not reported.

  - id: csharp.semantic.workspace.v1
    name: C# semantic workspace gaps
    description: Records MSBuildWorkspace load, MSBuild registration, syntax tree, and compilation gaps during semantic extraction.
    evidenceTier: Tier4Unknown
    emits:
      - AnalysisGap
    limitations:
      - Workspace diagnostics can be environment-specific because they depend on installed SDKs and available project references.
      - Compilation gaps do not prevent syntax fallback facts from being emitted.

  - id: http.client.invocation.v1
    name: HTTP client invocation
    description: Finds outbound HTTP calls through common .NET HTTP APIs.
    evidenceTier: Tier2Structural
    emits:
      - HttpCallDetected
      - HttpClientCreated
    limitations:
      - URL may not be fully resolvable if built dynamically or loaded from runtime configuration.

  - id: database.sql.text.v1
    name: SQL text detection
    description: Finds SQL-like files and string literals.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - SqlTextUsed
    limitations:
      - SQL parsing is approximate in MVP.
      - Identifier matches are not proof of contract usage.
