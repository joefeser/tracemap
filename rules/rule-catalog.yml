rules:
  - id: public.demo.summary.v1
    name: Public demo summary section
    description: Records public demo workflow section status, coverage labels, artifact references, and deterministic counts produced by checked-in validation scripts.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - demo summary section row
    limitations:
      - Demo summary rows describe validation workflow status and generated artifact availability; they are not scanner facts and do not prove runtime execution, deployment, production traffic, release approval, vulnerability, or compatibility.
      - Deferred, unavailable, and failed sections are explicit analysis gaps and remain Tier4Unknown.
      - Artifact paths are output-root-relative and public-shareable summaries must not render local absolute paths, raw SQL, source snippets, raw secrets, or credential-bearing URLs.

  - id: legacy.validation.summary.v1
    name: Legacy codebase validation summary
    description: Records local-only validation summary rows for operator-provided old or large .NET codebases using neutral sample labels and deterministic counts.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - legacy validation summary row
      - redaction failure category
    limitations:
      - Validation samples are operator-provided local inputs and are not committed fixtures.
      - Summary rows intentionally omit local absolute paths, raw remotes, private repository names, raw SQL, config values, connection strings, source snippets, and secrets.
      - Public claim level remains hidden until a redacted summary is reviewed and intentionally promoted.

  - id: legacy.validation.environment.v1
    name: Legacy environment evidence probe
    description: Summarizes static project/config indicators such as target frameworks, old-style project files, packages.config, binding redirects, and MSBuild ToolsVersion values.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - legacy environment indicator count
      - legacy environment limitation
    limitations:
      - Environment indicators are static clues, not guaranteed remediation instructions.
      - Missing SDK/runtime/build-tool guidance is evidence-backed only when surfaced by scan artifacts or project/config indicators.
      - Failed project load is reduced coverage and must not be treated as a clean scan.

  - id: legacy.validation.ui-events.v1
    name: Legacy UI event static evidence probe
    description: Summarizes whether current facts expose WinForms/WebForms-style event wiring, handler-like symbols, call edges, or dependency surfaces without rendering source snippets.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - UI event evidence summary
      - UI event evidence gap
    limitations:
      - Static wiring evidence does not prove that a control exists at runtime, that a handler executes, that a user can reach the event, or that backend behavior occurred.
      - No event evidence is a scanner evidence gap, not proof that legacy UI events are absent.
      - Syntax/text matches remain review-tier evidence when semantic call or dependency facts cannot establish a chain.

  - id: legacy.validation.bounds.v1
    name: Legacy validation bounds and truncation
    description: Records local validation timeout, output-size, artifact-existence, and bounded-failure outcomes for old or large repositories.
    evidenceTier: Tier4Unknown
    emits:
      - timeout/deferred limitation
      - artifact-size limitation
      - missing artifact limitation
    limitations:
      - Timeout and artifact-size truncation make the validation result partial.
      - Output-size and duration limits are validation harness bounds, not repository complexity conclusions.
      - Bounded failure preserves available evidence but must not be interpreted as complete scan coverage.

  - id: legacy.wcf.config.v1
    name: Legacy WCF serviceModel config evidence
    description: Extracts WCF client and service endpoint declarations from local config files using safe endpoint metadata and hashed addresses.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - WcfClientEndpointDeclared
      - WcfServiceEndpointDeclared
      - AnalysisGap
    limitations:
      - Endpoint config is static evidence and does not prove deployment, reachability, service activation, DNS, authentication, authorization, binding compatibility, or runtime endpoint selection.
      - Endpoint addresses are hashed or omitted; raw addresses and config values are not rendered.
      - Config transforms, environment-specific overrides, and dynamically selected endpoints are not evaluated.

  - id: legacy.wcf.contract.v1
    name: Legacy WCF service contract and generated client evidence
    description: Extracts service contract, operation contract, and generated service-client declarations from C# syntax and generated-code patterns.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WcfServiceContractDeclared
      - WcfOperationContractDeclared
      - WcfGeneratedClientDeclared
      - AnalysisGap
    limitations:
      - Syntax-only contract evidence does not prove WSDL compatibility, generated proxy freshness, service deployment, or runtime invocation.
      - Generated-client detection requires WCF ClientBase-style inheritance and can miss custom proxies or nonstandard generated clients.
      - Missing generated files or unsupported service-reference shapes are analysis gaps, not proof that no service dependency exists.

  - id: legacy.wcf.host.v1
    name: Legacy WCF and ASMX service host evidence
    description: Extracts safe service host declarations from .svc and ASMX directive-style files.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - WcfServiceHostDeclared
      - AnalysisGap
    limitations:
      - Host declarations are static file evidence and do not prove IIS configuration, deployment, route reachability, service activation, or runtime factory behavior.
      - Malformed or unsupported host declarations are emitted as gaps rather than absence of service evidence.

  - id: legacy.wcf.metadata.v1
    name: Legacy WCF checked-in metadata evidence
    description: Extracts safe service-reference metadata and WSDL portType operation declarations from checked-in .svcmap, gated .wsdl, .disco, and .xsd files.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - WcfServiceReferenceMetadataDeclared
      - WcfMetadataOperationDeclared
      - AnalysisGap
    limitations:
      - Checked-in service-reference metadata is static design-time evidence and does not prove runtime reachability, deployment, service activation, generated proxy freshness, service version compatibility, authorization, or binding compatibility.
      - TraceMap does not fetch remote WSDL, DISCO, schema imports, service URLs, or endpoint addresses.
      - Raw URLs, SOAP actions, schema locations, namespace URIs, local absolute paths, raw schemas, and source snippets are hashed or omitted.
      - WSDL/DISCO/XSD inventory is gated to service-reference folders or files co-located with .svcmap metadata to avoid unrelated schemas and vendor specifications.
      - Malformed or rejected XML is emitted as `MalformedWcfMetadata` rather than treated as clean absence of metadata.

  - id: legacy.wcf.operation-normalization.v1
    name: Legacy WCF operation name normalization
    description: Applies conservative deterministic generated-client operation aliases such as FooAsync to Foo and BeginFoo/EndFoo to Foo when WCF evidence corroborates the alias.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WcfServiceReferenceMapping
      - AnalysisGap
    limitations:
      - Normalization is case-sensitive deterministic name handling only; it does not use fuzzy matching, edit distance, stemming, prompts, embeddings, LLM calls, or runtime service behavior.
      - Async suffix aliases require WCF-generated client evidence and corroboration from connected checked-in WSDL metadata, a same-contract sync sibling, or an aligned service operation.
      - Begin/End aliases require both members on the same generated client or operation contract; lone Begin or End methods are not normalized.
      - Lifecycle methods such as Open, Close, Abort, Dispose, OpenAsync, CloseAsync, and Begin/End lifecycle pairs are excluded unless an exact metadata operation is explicitly present.

  - id: legacy.wcf.mapping.v1
    name: Legacy WCF service-reference mapping evidence
    description: Emits probable static mappings from generated service-client methods to service operation contracts when method names, checked-in metadata, normalization, and config/contract metadata align.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WcfServiceReferenceMapping
      - AnalysisGap
    limitations:
      - Mappings are static evidence and do not prove runtime execution, endpoint reachability, generated proxy freshness, or backend implementation selection.
      - Name-only and generated-code-only normalized matches remain review-tier evidence.
      - Metadata-backed normalized mappings require generated client contract, normalized operation name, connected WSDL operation metadata, and service contract evidence; a random repository-level WSDL operation name is not sufficient.
      - Without aligned config endpoint evidence, metadata-backed mappings are capped at Tier3SyntaxOrTextual even when supporting metadata is Tier2Structural.
      - Multiple matching endpoints, hosts, contracts, metadata identities, or distinct logical operations are ambiguity gaps/review-tier evidence; TraceMap does not choose an arbitrary winner.

  - id: legacy.data.metadata.inventory.v1
    name: Legacy data metadata inventory
    description: Inventories checked-in DBML, EDMX, typed DataSet XSD, TableAdapter, generated designer, config, and old ORM descriptor files with safe static metadata.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataMetadataDeclared
      - AnalysisGap
    limitations:
      - Metadata inventory is static repository evidence and does not prove runtime data access, database existence, provider compatibility, deployment, or production usage.
      - Arbitrary XSD files are gated; unrelated schemas are not treated as typed DataSet metadata.
      - Malformed, unsupported, too-large, or parser-rejected metadata is emitted as an analysis gap rather than clean absence.
      - Raw SQL, connection strings, config values, URLs, remotes, local absolute paths, source snippets, and secrets are hashed or omitted.

  - id: legacy.data.dbml.v1
    name: Legacy LINQ to SQL DBML metadata
    description: Extracts safe DBML entity, table, column, association, and routine descriptor evidence from checked-in metadata.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataEntityDeclared
      - LegacyDataStorageObjectDeclared
      - LegacyDataColumnDeclared
      - LegacyDataMappingDeclared
      - AnalysisGap
    limitations:
      - DBML metadata is static design-time evidence and does not prove database existence, LINQ runtime behavior, routine existence, lazy loading, query execution, or provider compatibility.
      - Generated-code linkage is separate evidence and does not upgrade metadata descriptor tier.
      - Unsafe names, provider metadata, database names, connection names, and routine identifiers are hashed or omitted when required.

  - id: legacy.data.edmx.v1
    name: Legacy Entity Framework EDMX metadata
    description: Extracts safe CSDL, SSDL, and unambiguous MSL entity/storage/property mapping evidence from checked-in EDMX metadata.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataEntityDeclared
      - LegacyDataStorageObjectDeclared
      - LegacyDataColumnDeclared
      - LegacyDataMappingDeclared
      - AnalysisGap
    limitations:
      - EDMX metadata is static design-time evidence and does not prove EF runtime model loading, lazy loading, change tracking, query execution, provider compatibility, migrations, or schema existence.
      - Complex, inherited, split, conditional, many-to-many, duplicate-container, and provider-extension mappings are gaps unless a future spec defines deterministic handling.
      - Namespace URIs, provider details, unsafe identifiers, and raw metadata content are hashed or omitted.

  - id: legacy.data.typed-dataset.v1
    name: Legacy typed DataSet and TableAdapter metadata
    description: Extracts safe typed DataSet table/column/relation, TableAdapter, command descriptor, and complete static command-text hash/shape evidence.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataEntityDeclared
      - LegacyDataStorageObjectDeclared
      - LegacyDataColumnDeclared
      - LegacyDataMappingDeclared
      - SqlTextUsed
      - QueryPatternDetected
      - AnalysisGap
    limitations:
      - Typed DataSet metadata is static design-time evidence and does not prove adapter execution, stored-procedure existence, command reachability, SQL execution, provider compatibility, or database schema existence.
      - Raw SQL command text is never stored; complete static command text may produce only existing hash/length and safe shape evidence.
      - Unrelated XSD files, dynamic commands, incomplete schemas, unsupported provider metadata, and stale or missing generated code remain gaps or unsupported evidence.

  - id: legacy.data.config.v1
    name: Legacy data provider and connection config metadata
    description: Extracts safe provider, connection-name, provider factory, Entity Framework provider, and ORM config metadata from checked-in config files.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataProviderConfigDeclared
      - ConfigKeyDeclared
      - AnalysisGap
    limitations:
      - Config metadata is static checked-in evidence and does not prove runtime environment selection, transform application, secret availability, provider installation, database reachability, or production usage.
      - Raw connection strings, usernames, passwords, server names, catalog names, file paths, URLs, secret-looking values, and config values are hashed or omitted.
      - Encrypted sections, external config includes, transforms, and code-built connections are reduced-coverage gaps.

  - id: legacy.data.generated-link.v1
    name: Legacy data generated-code linkage
    description: Links DBML, EDMX, and typed DataSet metadata descriptors to checked-in generated files or compiler-resolved generated symbols when deterministic evidence exists.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - LegacyDataGeneratedCodeLinked
      - AnalysisGap
    limitations:
      - Generated-code linkage is static evidence and does not prove generated files are fresh, runtime code paths execute, query execution occurs, or database access happens.
      - Global short-name matching is not allowed; ambiguous or missing generated-code candidates are gaps.
      - Linkage tier is recorded separately and does not upgrade the descriptor tier of the metadata evidence.

  - id: legacy.webforms.inventory.v1
    name: Legacy WebForms file and page inventory
    description: Inventories WebForms markup, code-behind, designer files, directives, static server controls, and safe page linkage metadata.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WebFormsPageDeclared
      - WebFormsControlDeclared
      - AnalysisGap
    limitations:
      - Markup and file inventory are static repository evidence and do not prove IIS configuration, page activation, runtime control tree construction, event firing, deployment, or production usage.
      - Directive paths and linkage attributes are kept only as safe relative filenames or omitted; raw local paths, URLs, config values, snippets, and unsafe expressions are not stored.
      - Malformed or unreadable markup is an analysis gap, not proof that no WebForms page, control, or handler exists.

  - id: legacy.webforms.event-binding.v1
    name: Legacy WebForms markup event binding evidence
    description: Extracts supported static WebForms server-control event attributes such as OnClick, OnCommand, OnLoad, and OnInit with control IDs, handler names, and line spans.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WebFormsEventBindingDeclared
      - AnalysisGap
    limitations:
      - Event bindings are static declarations and do not prove that a control exists at runtime, a user can reach the event, event bubbling occurs, or the handler executes.
      - Unsupported event-like attributes, dynamic wiring, generated controls, data-bound command names, and unsafe handler values are needs-review or gap evidence rather than guessed handlers.
      - Duplicate controls or duplicate bindings are preserved as separate evidence rows with deterministic IDs; TraceMap does not collapse them into a single runtime control.

  - id: legacy.webforms.handler-resolution.v1
    name: Legacy WebForms code-behind handler resolution
    description: Resolves markup event handlers to linked code-behind partial methods by semantic source-symbol evidence when available, otherwise by scoped structural or syntax fallback.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WebFormsHandlerResolved
      - AnalysisGap
    limitations:
      - Handler resolution is static evidence and does not prove runtime event execution, page lifecycle order, postback behavior, authorization, deployment, or production usage.
      - Syntax and structural fallback depend on directive/linkage and partial class names; missing builds, generated code, stale files, partial classes, overloads, and event subscriptions can reduce confidence.
      - Ambiguous methods or partial classes are emitted as gaps and TraceMap does not choose an arbitrary winner.
      - Auto-event-wireup MVP evidence is limited to Page_Load and Page_Init and requires explicit enabled evidence; false, unknown, or contradictory evidence remains Tier4Unknown.

  - id: legacy.webforms.designer-control.v1
    name: Legacy WebForms designer control field evidence
    description: Extracts designer-generated partial-class control fields and links them as supporting evidence for matching markup control IDs.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WebFormsDesignerControlDeclared
      - AnalysisGap
    limitations:
      - Designer files can be generated, missing, stale, hand-edited, or mismatched with markup; designer evidence is supporting evidence only.
      - Designer fields do not classify code as business logic and do not prove runtime control creation or page compilation.

  - id: legacy.webforms.event-flow.v1
    name: Legacy WebForms event-to-backend static flow projection
    description: Projects resolved WebForms handlers to directly connected call, WCF/service-reference, HTTP, SQL/query, config, or dependency-surface evidence while preserving supporting fact IDs and coverage labels.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WebFormsEventFlowProjected
      - AnalysisGap
    limitations:
      - Event-flow projection is static evidence and does not prove runtime event firing, branch feasibility, dynamic dispatch, delegate invocation, reflection targets, event bubbling, generated-code freshness, service reachability, SQL execution, database state, or production usage.
      - MVP projection prefers direct handler-to-evidence facts and can miss multi-hop call chains, dependency injection, reflection, generated code, unsupported frameworks, or ORM metadata.
      - Reduced semantic coverage, missing call edges, ambiguous generated clients, or unavailable terminal evidence produce partial or unknown classifications rather than clean absence claims.

  - id: legacy.webforms.logic-signal.v1
    name: Legacy WebForms static logic and UI-boilerplate signals
    description: Emits bounded deterministic handler-level signals for visible calculations, branches, service/database calls, domain object construction, and UI-only assignments or data binding.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WebFormsLogicSignalDetected
      - AnalysisGap
    limitations:
      - Logic signals are deterministic static heuristics, not proof of business logic, code quality, risk, runtime behavior, or production usage.
      - UI-boilerplate signals are lower-strength syntax evidence and do not prove that a handler is safe, irrelevant, or free of backend effects.
      - Generated code, partial methods, reflection, dynamic dispatch, branch feasibility, and indirect helper calls can hide or dilute signals.

  - id: snapshot.diff.source.v1
    name: Snapshot diff source comparison
    description: Compares source inventory and source metadata between two TraceMap snapshots by exact source label and stable source identity metadata.
    evidenceTier: Tier2Structural
    emits:
      - source diff row
      - SourceOnlyOnOneSide gap
    limitations:
      - Source pairing is exact-label based and does not infer renamed repositories, source labels, branches, or merge ancestry.
      - Source diffs compare static scan metadata and do not prove code behavior changed.
      - Single-index snapshots use the synthetic source label `single`.

  - id: snapshot.diff.coverage.v1
    name: Snapshot diff coverage comparison
    description: Compares source-level scan coverage, build status, analysis level, known gaps, and commit SHA credibility between paired TraceMap snapshot sources.
    evidenceTier: Tier4Unknown
    emits:
      - coverage diff row
      - ReducedCoverage gap
      - UnknownCommitSha gap
    limitations:
      - Coverage is source-level unless language adapters emit more precise gap metadata.
      - Reduced coverage makes absence of evidence coverage-relative, not proof that evidence was removed.
      - Unknown commit SHAs prevent history-dependent conclusions.

  - id: snapshot.diff.evidence.v1
    name: Snapshot diff evidence comparison
    description: Carries deterministic snapshot-diff evidence rows and selector/truncation gaps for implemented static evidence sections.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - extractor version diff row
      - SelectorNoMatch gap
      - TruncatedByLimit gap
    limitations:
      - Extractor version changes describe scanner metadata only and do not prove source-code behavior changed.
      - Selector gaps describe the current static evidence and query bounds only.
      - Truncated output is intentionally partial and must not be treated as complete evidence coverage.

  - id: snapshot.diff.identity.v1
    name: Snapshot diff source identity validation
    description: Validates comparable source identity for snapshot diffs and emits review-tier or unknown gaps when identity is missing, partial, or conflicting.
    evidenceTier: Tier4Unknown
    emits:
      - SourceIdentityConflict gap
      - SourceOnlyOnOneSide gap
    limitations:
      - Repository identity is hash-based and omits raw remote URLs, raw repository names, and local absolute paths.
      - Identity validation cannot prove two differently labeled or renamed repositories are equivalent.
      - Conflicting identity fails by default unless the caller explicitly allows review-tier mismatch output.

  - id: snapshot.diff.schema.v1
    name: Snapshot diff schema and availability gap
    description: Emits gaps when snapshot-diff evidence sections are unavailable because required precision tables or implementation slices are absent.
    evidenceTier: Tier4Unknown
    emits:
      - UnavailableEvidence gap
    limitations:
      - Availability gaps explicitly mark partial analysis and must not be interpreted as no changes.
      - Missing optional precision tables can reduce comparison precision and downgrade conclusions.

  - id: combined.diff.source.v1
    name: Combined dependency diff source comparison
    description: Compares source inventory and source metadata between two combined indexes by exact source label and stable source identity metadata.
    evidenceTier: Tier2Structural
    emits:
      - source diff row
      - SourceIdentityChanged gap
    limitations:
      - Source pairing is exact-label based and does not infer renamed sources.
      - Source identity metadata may be incomplete; unverifiable identity is review-tier evidence.
      - Source diffs compare static scan metadata and do not prove code behavior changed.

  - id: combined.diff.coverage.v1
    name: Combined dependency diff coverage comparison
    description: Compares scan coverage, build status, commit SHA credibility, and known coverage warnings between paired sources.
    evidenceTier: Tier4Unknown
    emits:
      - coverage diff row
      - coverage caveat
    limitations:
      - Coverage is source-level unless adapters emit more precise gap metadata.
      - Reduced coverage makes absence of evidence coverage-relative, not proof that a dependency was removed.

  - id: combined.diff.endpoint.v1
    name: Combined dependency diff endpoint comparison
    description: Compares combined endpoint alignment evidence between two snapshots using static method/path keys and side-specific endpoint provenance.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - endpoint diff row
    limitations:
      - Endpoint diffs are static method/path evidence and do not prove runtime traffic, auth behavior, proxies, deployment base paths, CORS behavior, or reachability.
      - Dynamic, ambiguous, optional, and method-mismatch evidence remains review-tier.

  - id: combined.diff.surface.v1
    name: Combined dependency diff surface comparison
    description: Compares dependency surfaces such as SQL query/persistence, HTTP, package, and config evidence using safe structured metadata.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - surface diff row
    limitations:
      - Surface diffs do not prove runtime SQL execution, database schema existence, config loading, package loading, generated SQL equivalence, or branch feasibility.
      - Raw SQL, URLs, config values, connection strings, and source snippets are not rendered by default.
      - Hash-only SQL text surfaces emit a HashOnlyEvidence caveat and remain review-tier evidence.
      - SQL surfaces that fall back to fact-hash identity emit a VolatileIdentity caveat and remain review-tier evidence.
      - Package surface diffs compare static manifest metadata only; they do not prove package restore, installation, loading, import/use, vulnerability, exploitability, deployment, or transitive dependency impact.
      - Package version values that resemble URLs, local paths, or environment-expanded values are rendered as hashes with redaction caveats.
      - Package identity is ecosystem- and manifest-scoped; matching package names across ecosystems does not imply cross-language identity.

  - id: combined.diff.edge.v1
    name: Combined dependency diff edge comparison
    description: Compares combined dependency edge evidence such as calls, object creations, relationships, and parameter-forwarding edges using stable source/target metadata.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - edge diff row
    limitations:
      - Edge diffs are static evidence and do not prove dynamic dispatch, runtime DI registrations, reflection targets, branch feasibility, or collection contents.
      - Syntax-only or name-only edge evidence remains review-tier.

  - id: combined.diff.identity.v1
    name: Combined dependency diff stable identity
    description: Constructs stable identity keys for diffing and emits duplicate identity gaps when multiple records share the same stable key.
    evidenceTier: Tier4Unknown
    emits:
      - DuplicateIdentity gap
    limitations:
      - Stable identity is label-and-metadata based; renamed labels are not inferred as the same source.
      - Duplicate identity within one snapshot means diff comparison for affected records is review-tier only.
      - Identity construction depends on combined fact metadata quality; malformed or incomplete metadata degrades identity.

  - id: combined.diff.path.v1
    name: Combined dependency diff path comparison
    description: Compares opt-in dependency path signatures produced by the combined path query engine.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - path diff row
    limitations:
      - Path diffing is bounded by depth, path, and frontier limits and must not be treated as complete dependency coverage when truncated.
      - Path evidence is a static trail, not runtime execution or full taint analysis.

  - id: combined.diff.selector.v1
    name: Combined dependency diff selector handling
    description: Emits selector gaps when user-supplied source, endpoint, surface, or path filters match no comparable evidence.
    evidenceTier: Tier4Unknown
    emits:
      - SelectorNoMatch gap
    limitations:
      - Selector gaps describe the current static evidence and query bounds only.

  - id: combined.diff.schema.v1
    name: Combined dependency diff schema gap
    description: Emits gaps when optional combined-index precision tables are missing and diff comparison falls back to weaker evidence.
    evidenceTier: Tier4Unknown
    emits:
      - SchemaMissing gap
    limitations:
      - Schema gaps can reduce comparison precision and may downgrade added/removed claims.

  - id: combined.diff.truncation.v1
    name: Combined dependency diff truncation gap
    description: Emits gaps when diff row or gap caps truncate report output.
    evidenceTier: Tier4Unknown
    emits:
      - TruncatedByLimit gap
    limitations:
      - Truncated output is intentionally partial and must not be treated as complete evidence coverage.

  - id: combined.impact.source.v1
    name: Combined change impact source item
    description: Projects combined source diff rows into static change-impact source items with source identity, coverage, and rule-backed evidence.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - source impact item
      - NoImpactEvidence gap
    limitations:
      - Source impact items describe changed static source metadata, not runtime behavior.
      - Source pairing is exact-label based and does not infer renamed sources.
      - Missing or conflicting source identity metadata downgrades confidence.

  - id: combined.impact.coverage.v1
    name: Combined change impact coverage item
    description: Projects combined coverage diff rows into static change-impact coverage items so reduced scans and build-status changes are visible in impact reports.
    evidenceTier: Tier4Unknown
    emits:
      - coverage impact item
    limitations:
      - Coverage is source-level unless adapters emit more precise gap metadata.
      - Reduced coverage makes absence of impact evidence coverage-relative, not proof that a dependency was unaffected.

  - id: combined.impact.endpoint.v1
    name: Combined change impact endpoint item
    description: Projects combined endpoint diff rows into static change-impact endpoint items using method/path keys and side-specific endpoint provenance.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - endpoint impact item
    limitations:
      - Endpoint impact items do not prove runtime traffic, auth behavior, proxies, deployment base paths, CORS behavior, or reachability.
      - Dynamic, ambiguous, optional, and method-mismatch evidence remains review-tier.

  - id: combined.impact.surface.v1
    name: Combined change impact dependency surface item
    description: Projects dependency-surface diff rows into static change-impact items for SQL query/persistence, HTTP, package, and config surfaces using safe structured metadata.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - surface impact item
    limitations:
      - Surface impact items do not prove runtime SQL execution, database schema existence, config loading, package loading, generated SQL equivalence, or branch feasibility.
      - Raw SQL, URLs, config values, connection strings, and source snippets are not rendered by default.
      - HashOnlyEvidence and VolatileIdentity caveats from combined.diff.surface.v1 carry through as review-tier impact evidence.

  - id: combined.impact.edge.v1
    name: Combined change impact dependency edge item
    description: Projects dependency-edge diff rows into static change-impact items for calls, object creations, relationships, and parameter-forwarding evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - edge impact item
    limitations:
      - Edge impact items do not prove dynamic dispatch, runtime dependency injection registrations, reflection targets, branch feasibility, or collection contents.
      - Syntax-only or name-only edge evidence remains review-tier.

  - id: combined.impact.path.v1
    name: Combined change impact path item
    description: Projects opt-in combined path diff rows into static change-impact path items and path context summaries.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - path impact item
      - path context summary
    limitations:
      - Path context is opt-in, bounded, and must not be treated as complete dependency coverage when truncated.
      - Path evidence is a static trail, not runtime execution, full taint analysis, or proof of business impact.

  - id: combined.impact.path-context.v1
    name: Combined change impact path context
    description: Classifies optional per-item path context when the impact planner can safely map a changed endpoint, surface, or edge to bounded before/after path queries.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - ReachabilityChanged path context
      - ReachabilityEvidenceChanged path context
      - ReachabilityUnchanged path context
      - PathContextUnavailable gap
      - NoPathEvidence gap
    limitations:
      - Path context is static graph evidence and does not prove runtime reachability, branch feasibility, dynamic dispatch, dependency injection binding, or data flow.
      - Unsupported selector mappings must emit review or unknown gaps rather than guessed paths.
      - Reduced coverage and traversal truncation make no-path conclusions coverage-relative.

  - id: combined.impact.selector.v1
    name: Combined change impact selector handling
    description: Emits selector and ignored-selector gaps when user-supplied source, endpoint, surface, or path filters match no comparable evidence or are outside the selected scope.
    evidenceTier: Tier4Unknown
    emits:
      - SelectorNoMatch gap
      - IgnoredSelector gap
    limitations:
      - Selector gaps describe only the current static evidence and query bounds.
      - Ignored selector gaps do not prove matching evidence exists outside the selected scope.

  - id: combined.impact.truncation.v1
    name: Combined change impact truncation gap
    description: Emits gaps when impact item, path-query, or gap caps truncate report output.
    evidenceTier: Tier4Unknown
    emits:
      - TruncatedByLimit gap
    limitations:
      - Truncated output is intentionally partial and must not be treated as complete impact coverage.

  - id: combined.reverse.surface.v1
    name: Combined reverse selected dependency surface
    description: Selects terminal dependency surfaces for reverse static reachability queries using safe structured surface metadata.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - selected reverse surface row
      - NeedsReviewSurfaceEvidence row
      - UnknownAnalysisGap row
    limitations:
      - Surface selection is static evidence and does not prove runtime SQL execution, database schema existence, config loading, package loading, outbound traffic, or API route deployment.
      - Raw SQL, raw URLs, config values, connection strings, source snippets, raw repository remotes, and local absolute paths must not be rendered.
      - Ambiguous, syntax-only, textual, or duplicate-identity surface matches remain review-tier evidence.

  - id: combined.reverse.root.v1
    name: Combined reverse upstream root grouping
    description: Groups reverse traversal results by upstream endpoint, symbol, or source roots that can statically reach selected dependency surfaces.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - reverse endpoint root row
      - reverse symbol root row
      - reverse source root row
      - NoReversePathEvidence gap
    limitations:
      - Root grouping is bounded static graph evidence and does not prove runtime traffic, runtime dispatch, dependency injection binding, branch feasibility, or production usage.
      - Missing or reduced source coverage makes no-path conclusions unknown rather than proof that no caller exists.
      - Endpoint roots must not be substituted with symbol or source roots unless the requested target mode permits them.

  - id: combined.reverse.path.v1
    name: Combined reverse static path evidence
    description: Emits bounded reverse static paths from upstream roots to selected dependency surfaces by reusing the combined dependency path graph inventory.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - StrongStaticReversePath row
      - ProbableStaticReversePath row
      - NeedsReviewReversePath row
    limitations:
      - Reverse paths are static evidence trails, not runtime execution, full taint analysis, mutation semantics, or proof of business impact.
      - Traversal is bounded by surface, depth, frontier, root, and per-root path limits.
      - Fallback, name-only, syntax-only, dynamic, duplicate-identity, or ambiguous path evidence must be downgraded to review-tier or unknown classifications.

  - id: combined.reverse.selector.v1
    name: Combined reverse selector handling
    description: Emits gaps for reverse query selectors that match no eligible evidence or request a valid target mode that is not implemented in the current release.
    evidenceTier: Tier4Unknown
    emits:
      - SelectorNoMatch gap
      - UnsupportedSelector gap
    limitations:
      - Selector gaps describe only the current static evidence, selector semantics, and query bounds.
      - A selector no-match result is not proof that runtime dependencies or callers do not exist.

  - id: combined.reverse.truncation.v1
    name: Combined reverse traversal truncation gap
    description: Emits gaps when reverse surface, depth, frontier, root, path, or gap caps truncate report output.
    evidenceTier: Tier4Unknown
    emits:
      - TruncatedByLimit gap
    limitations:
      - Truncated output is intentionally partial and must not be treated as complete reverse dependency coverage.
      - Truncation can coexist with coverage gaps; it must not suppress UnknownAnalysisGap evidence.

  - id: combined.reverse.identity.v1
    name: Combined reverse stable identity caveat
    description: Emits reverse-query caveats when selected surfaces, roots, path nodes, source identity, or commit SHA metadata are duplicate, missing, or unverified.
    evidenceTier: Tier4Unknown
    emits:
      - DuplicateIdentity gap
      - IdentityUnverified gap
    limitations:
      - Stable identity construction depends on combined source, fact, symbol, and path metadata quality.
      - Duplicate or unverified identities downgrade affected reverse rows and must not produce strong static classifications.
      - Missing commit SHA or source identity means provenance is incomplete; it does not prove evidence is wrong or absent.

  - id: combined.paths.endpoint-match.v1
    name: Combined dependency path endpoint match edge
    description: Derives an in-memory path edge between HTTP client and server endpoint facts using the same deterministic endpoint matcher as the combined dependency report.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - endpoint-match path edge
    limitations:
      - Endpoint matches are static method/path evidence and do not prove runtime traffic, auth behavior, proxy behavior, deployment base paths, CORS behavior, or reachability.
      - Optional segment, ambiguous, method-mismatch, and dynamic URL cases are review evidence and cannot produce strong static paths.

  - id: combined.paths.fact-attached-to-symbol.v1
    name: Combined dependency path fact-to-symbol attachment edge
    description: Derives an in-memory path edge from endpoint facts to source-local symbol nodes when a fact carries source or target symbol evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - fact-attached-to-symbol path edge
    limitations:
      - Attachment strength follows the originating fact tier and rule; syntax or textual symbols remain review evidence.
      - Symbol display-name equality is source-local and does not imply identity across languages or source indexes.

  - id: combined.paths.surface-evidence.v1
    name: Combined dependency path surface evidence edge
    description: Derives an in-memory path edge from source-local symbol nodes to terminal dependency surfaces such as SQL, HTTP, config, and package evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - surface-evidence path edge
    limitations:
      - Surface attachment proves only static evidence proximity through recorded symbol fields; it does not prove runtime SQL execution, config usage, package loading, or outbound traffic.
      - Unattached surfaces remain inventory evidence and are reported as review gaps rather than guessed paths.

  - id: combined.paths.symbol-reconciliation.v1
    name: Combined dependency path source-local symbol reconciliation edge
    description: Derives an in-memory review-tier path edge between source-local symbol nodes when deterministic scanner facts describe the same member with compatible but non-identical display strings.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - symbol-reconciliation path edge
    limitations:
      - Reconciliation is source-local and must not join symbols across combined indexes or languages.
      - Short-name reconciliation is review evidence only and cannot produce a strong static path.
      - Ambiguous same-name candidates must remain gaps or review evidence rather than arbitrary strong links.
      - Reconciliation does not prove runtime dispatch, dependency injection binding, reflection targets, branch feasibility, serializer behavior, or SQL execution.

  - id: combined.paths.query-gap.v1
    name: Combined dependency path query gap
    description: Emits query-level path gaps such as selector misses, no matching terminal surfaces, and coverage-relative no-path outcomes.
    evidenceTier: Tier4Unknown
    emits:
      - SelectorNoMatch path gap
      - UnknownAnalysisGap path gap
    limitations:
      - Query gaps are conclusions about the current static graph and selector bounds, not proof that runtime dependencies do or do not exist.
      - File spans may be absent when no source evidence matched the selector.

  - id: combined.paths.truncation-gap.v1
    name: Combined dependency path truncation gap
    description: Emits path-search limit gaps when selector candidate, depth, cycle, path-count, or frontier bounds stop traversal.
    evidenceTier: Tier4Unknown
    emits:
      - TruncatedByLimit path gap
    limitations:
      - Truncation means the returned path set is intentionally partial and must not be treated as complete dependency coverage.
      - The triggering evidence span is best-effort and may point to the nearest traversed node rather than the omitted dependency.

  - id: repo.manifest.v1
    name: Repository manifest
    description: Captures repo metadata, commit SHA, project inventory, scan status, and known gaps.
    evidenceTier: Tier2Structural
    emits:
      - RepoScanned
      - BuildStatus
      - AnalysisGap
    limitations:
      - Git metadata may be unavailable outside a git checkout.

  - id: file.inventory.v1
    name: File inventory
    description: Records deterministic inventory facts for supported solution, project, source, config, JSON, and SQL files.
    evidenceTier: Tier2Structural
    emits:
      - FileInventoried
      - ConfigFileDeclared
      - SqlFileDeclared
    limitations:
      - File presence is structural evidence only; it does not prove runtime usage.
      - Generated, bin, obj, .git, and TraceMap output directories are excluded in the MVP.

  - id: project.file.v1
    name: Project file inventory
    description: Reads solution and C# project declarations, target frameworks, and package references from project files and packages.config.
    evidenceTier: Tier2Structural
    emits:
      - SolutionDeclared
      - ProjectDeclared
      - TargetFrameworkDeclared
      - PackageReferenced
    limitations:
      - XML files that cannot be parsed are still inventoried but do not emit project metadata facts.
      - Conditional MSBuild properties are not evaluated in Milestone 1.
      - PackageReferenced facts are static project-file or packages.config declarations and do not prove NuGet restore, resolved transitive dependencies, runtime loading, or deployment.
      - Central package management, imported props/targets, and unresolved property interpolation may reduce package metadata precision.

  - id: csharp.syntax.memberaccess.v1
    name: C# syntax member access
    description: Finds member access names from C# syntax without requiring compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
    limitations:
      - Does not prove the containing type or symbol identity.
      - May match unrelated properties with the same name.

  - id: csharp.syntax.declarations.v1
    name: C# syntax declarations
    description: Finds type, method, property, enum, and attribute names from C# syntax without requiring project load or compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - PropertyDeclared
      - EnumDeclared
      - AttributeUsed
      - AnalysisGap
    limitations:
      - Does not prove symbol identity, overload resolution, inheritance, or generated code behavior.
      - Files with parse errors may still emit partial syntax facts, and parse errors are reported as AnalysisGap facts.

  - id: csharp.syntax.invocation.v1
    name: C# syntax invocation
    description: Finds invocation expression names from C# syntax without requiring compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - InvocationName
    limitations:
      - Does not prove receiver type, overload target, extension method binding, or runtime dispatch.

  - id: csharp.syntax.callgraph.v1
    name: C# syntax call graph
    description: Emits syntax-only caller-to-callee edges from invocation and object creation expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - CallEdge
    limitations:
      - Caller names are best-effort containing member names, not fully qualified symbols.
      - Callee names are invocation names only; overload resolution and receiver type are not proven.
      - Dynamic dispatch, reflection, delegates, and event flow are not modeled.

  - id: csharp.syntax.objectcreation.v1
    name: C# syntax object creation
    description: Emits syntax-only object creation facts from new expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Created type names are syntax text and may not be fully qualified.
      - Assigned variable names are best-effort for direct variable declarations or assignments only.
      - Constructor overload and assembly identity are not proven without semantic analysis.

  - id: csharp.syntax.logicshape.v1
    name: C# syntax logic shape
    description: Emits deterministic syntax signals for calculation, branching, retry, serialization, and boilerplate-like code.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - CalculationExpression
      - BranchingLogic
      - RetryPolicyLogic
      - SerializationLogic
      - InfrastructureBoilerplate
    limitations:
      - Logic shape facts are heuristics over syntax and file paths; they are review-routing signals, not proof of business intent.
      - Calculation expressions store expression hashes, operators, and spans, not raw source snippets.
      - Boilerplate classification is path/name based and can misclassify unconventional project layouts.

  - id: csharp.syntax.querypattern.v1
    name: C# syntax query pattern
    description: Records LINQ-style filter, sort, select, and include call shapes with field names and hashed call expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - QueryPatternDetected
    limitations:
      - Syntax-only evidence does not prove the query provider, database table, generated SQL, runtime branch feasibility, or whether the query executes.
      - Field names are extracted from member access inside query arguments and can include unrelated member reads in complex expressions.
      - Literal values and raw expressions are not stored; pattern hashes, field names, operation names, and spans are emitted.
      - Reports may display safe derived query metadata and hashes, but must not display raw SQL text, literal values, or unsafe identifiers.

  - id: csharp.syntax.objectshape.v1
    name: C# syntax object shape
    description: Records object initializer and anonymous-object field shapes with field names, shape hashes, and source spans.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectShapeInferred
    limitations:
      - Object shape facts are review-routing evidence, not proof of DTO/schema contracts, serializer output, runtime object contents, or nullability.
      - Nested object contents, collection element shapes, conditional construction, and mutation after initialization are not expanded in this rule.
      - Raw object expressions are not stored; expression hashes and sorted field names are emitted.

  - id: csharp.semantic.propertyaccess.v1
    name: C# semantic property access
    description: Finds compiler-resolved property accesses using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - PropertyAccessed
    limitations:
      - Requires project load and enough references to resolve symbols.
      - Does not detect reflection-only access.
      - Member access syntax that does not bind to an IPropertySymbol is not emitted by this rule.

  - id: csharp.semantic.methodinvocation.v1
    name: C# semantic method invocation
    description: Finds compiler-resolved method invocations using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - MethodInvoked
    limitations:
      - Requires project load and enough references to resolve symbols.
      - Dynamic dispatch, reflection, and unresolved overload candidates are not emitted by this rule.

  - id: csharp.semantic.callgraph.v1
    name: C# semantic call graph
    description: Emits compiler-resolved caller-to-callee method and constructor call edges using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - CallEdge
    limitations:
      - Requires project load and enough references to resolve method symbols.
      - Does not model runtime polymorphism, delegate invocation targets, event subscribers, reflection, or async continuation flow.
      - A call edge records a syntactic call site, not proof that the path executes at runtime.

  - id: csharp.semantic.objectcreation.v1
    name: C# semantic object creation
    description: Emits compiler-resolved object creation facts with created type, constructor, caller, and assembly identity when available.
    evidenceTier: Tier1Semantic
    emits:
      - ObjectCreated
    limitations:
      - Requires project load and enough references to resolve created type symbols.
      - Does not model dependency injection container activations, reflection, deserialization-created instances, or factory-returned runtime types.
      - Assembly version is sourced from Roslyn assembly identity and may be 0.0.0.0 when a project does not set explicit version metadata.

  - id: csharp.semantic.valueflow.v1
    name: C# semantic argument value flow
    description: Maps resolved call-site arguments to callee parameters and records argument symbol/declaration evidence when available.
    evidenceTier: Tier1Semantic
    emits:
      - ArgumentPassed
    limitations:
      - Requires Roslyn semantic binding for the callee method or constructor.
      - Tracks direct call-site argument expressions only; it does not perform interprocedural alias analysis, mutation tracking, or runtime branch feasibility.
      - Raw argument expressions are not stored; expression hashes, expression kinds, resolved symbols, and declaration spans are emitted.
      - Lambda bodies, delegates, reflection, dynamic dispatch, dependency injection, and serializer-created values require later specialized flow rules.

  - id: csharp.semantic.localalias.v1
    name: C# semantic local alias
    description: Records simple local aliases and assignments where a local variable is assigned from another resolved symbol.
    evidenceTier: Tier1Semantic
    emits:
      - LocalAlias
    limitations:
      - Requires Roslyn semantic binding for the alias local and origin expression.
      - Tracks direct local declarations and simple assignments only, such as `var alias = value` and `alias = value`.
      - Does not model mutation of object contents, collection membership, tuple/deconstruction flow, property aliases, ref/out effects, closures, runtime branches, or alias invalidation after complex control flow.
      - Raw alias expressions are not stored; expression hashes, expression kinds, resolved symbols, and declaration spans are emitted.

  - id: csharp.semantic.fieldalias.v1
    name: C# semantic field alias
    description: Records simple field assignments where a field is assigned from another resolved symbol.
    evidenceTier: Tier1Semantic
    emits:
      - FieldAlias
    limitations:
      - Requires Roslyn semantic binding for the assigned field and origin expression.
      - Tracks simple field assignments only, such as `_cached = value`.
      - Parameter forwarding uses field aliases when the assignment and later argument usage are in the same containing method, or when exactly one constructor in the same containing type assigns the field from a parameter.
      - Does not infer arbitrary cross-method field lifetime, ambiguous multiple-constructor field initialization, dependency injection state, object mutation, property aliases, collection membership, ref/out effects, closures, runtime branches, or alias invalidation after complex control flow.
      - Raw assignment expressions are not stored; expression hashes, expression kinds, resolved symbols, and declaration spans are emitted.

  - id: csharp.semantic.parameterforwarding.v1
    name: C# semantic parameter forwarding
    description: Derives parameter-to-parameter forwarding edges from semantic argument-flow evidence, resolving simple same-method aliases and unique constructor field initialization when available.
    evidenceTier: Tier1Semantic
    emits:
      - ParameterForwardEdge
    limitations:
      - Requires an `ArgumentPassed` fact where the argument is resolved as a method parameter, as a local/field with alias evidence back to a parameter in the same containing method, or as a field with exactly one constructor assignment from a parameter in the same containing type.
      - Follows parameter forwarding, same-method alias chains up to 3 alias hops, and unique constructor field initialization only; it does not infer arbitrary cross-method field lifetime, mutations, runtime branches, dependency injection, reflection, dynamic dispatch, or serializer-created values.
      - Constructor field forwarding requires exactly one visible constructor assignment from a parameter in the analyzed containing type; multiple visible assignments or constructors suppress the derived edge.
      - Path reports are bounded by max depth and max path count, so large or cyclic graphs can be intentionally truncated.
      - Paths are evidence chains, not proof that a runtime request always reaches the terminal method.

  - id: csharp.semantic.symbolidentity.v1
    name: C# semantic symbol identity
    description: Adds deterministic C# symbol IDs to resolved semantic facts and derives SQLite symbol, occurrence, and fact-symbol rows from those facts.
    evidenceTier: Tier1Semantic
    emits:
      - sourceSymbolId property
      - targetSymbolId property
      - argumentSymbolId property
      - parameterSymbolId property
      - originSymbolId property
      - constructorSymbolId property
      - symbols table rows
      - symbol_occurrences table rows
      - fact_symbols table rows
    limitations:
      - Symbol IDs require Roslyn semantic symbols; syntax fallback facts do not receive compiler-backed IDs.
      - IDs include assembly identity, containing symbol, member name, arity, parameter types, and return/type information where available; local IDs include source location to disambiguate same-name locals.
      - IDs are deterministic for the same source, project load, target framework, and dependency graph, but may change when references, target frameworks, generated source, or compiler binding change.
      - These rows are derived indexes over facts, not independent conclusions; the originating fact rule ID and evidence span remain authoritative.
      - Relationship rows for inheritance, interface implementation, and overrides are emitted by `csharp.semantic.symbolrelationship.v1`.

  - id: csharp.semantic.symbolrelationship.v1
    name: C# semantic symbol relationships
    description: Records compiler-resolved relationships between C# symbols, including direct type inheritance, direct interface implementation or extension, member overrides, and interface member implementations.
    evidenceTier: Tier1Semantic
    emits:
      - SymbolRelationship
      - symbol_relationships table rows
    limitations:
      - Requires Roslyn semantic symbols; syntax fallback does not emit symbol relationships.
      - Type relationships are limited to direct base-list declarations in source. Transitive inheritance and inherited interfaces can be queried by graph traversal, but are not emitted as direct evidence rows.
      - Interface member implementation uses Roslyn `FindImplementationForInterfaceMember`; it records compiler-resolved implementations, not runtime dispatch targets.
      - Override relationships record direct overridden members exposed by Roslyn; deeper override chains require graph traversal.
      - Generic substitutions, default interface methods, explicit interface implementations, and partial types follow Roslyn binding for the loaded project/target framework and may differ when project references or target frameworks change.
      - These relationships prove compiler binding, not runtime reachability, branch execution, object allocation, or dependency injection dispatch.

  - id: csharp.semantic.flowboundary.v1
    name: C# semantic flow boundary
    description: Records deterministic evidence for runtime-sensitive flow boundaries such as DI resolution, deserialization, reflection, dynamic invocation, collection mutation, object mutation, branch conditions, callbacks, and async scheduling points.
    evidenceTier: Tier1Semantic
    emits:
      - DependencyResolved
      - DeserializedObject
      - ReflectionUsage
      - DynamicInvocation
      - CollectionMutation
      - ObjectMutation
      - BranchCondition
      - CallbackBoundary
      - AsyncBoundary
    limitations:
      - Requires Roslyn semantic binding except for dynamic invocations where Roslyn intentionally cannot bind a static callee.
      - Callback boundary facts cover syntactically visible lambdas, anonymous methods, delegate arguments on invocations and object creation, delegate creation, expression-tree lambdas, captured outer parameters/locals, and event subscriptions; they do not prove delegate invocation, event firing, subscriber ordering, callback target execution, closure lifetime, expression-tree execution, or mutation safety.
      - Async boundary facts cover syntactically visible `await`, `await foreach`, `await using`, task scheduling/continuation calls, thread-pool queueing calls, and iterator `yield` statements; they do not prove runtime scheduling, execution ordering, thread interleaving, task completion, async-stream enumeration, async disposal execution, or continuation reachability.
      - These facts mark review-routing boundaries and do not prove runtime execution, concrete runtime types, branch feasibility, collection contents, object identity, dependency injection registrations, reflection targets, serializer contract mappings, callback invocation, event firing, or async ordering.
      - Use `csharp.semantic.runtimeevidence.v1` facts for statically visible registrations, reflection targets, serializer member names, collection element inputs, mutation semantics, and simple branch feasibility evidence.
      - Raw expressions are not stored; expression hashes, expression kinds, resolved symbols, and line spans are emitted.
      - Specialized flow rules are still required before TraceMap can carry value provenance across these boundaries.

  - id: csharp.semantic.runtimeevidence.v1
    name: C# semantic runtime evidence
    description: Records statically provable runtime-adjacent evidence for DI registrations, serializer contract members, reflection targets, dynamic dispatch candidates, collection element inputs, mutation semantics, and simple branch feasibility.
    evidenceTier: Tier1Semantic
    emits:
      - DependencyRegistered
      - SerializerContractMember
      - ReflectionTarget
      - DynamicDispatchCandidate
      - CollectionElementFlow
      - MutationSemantics
      - BranchFeasibility
    limitations:
      - Requires Roslyn semantic analysis; when project load or binding is reduced, absence of these facts is not absence of runtime behavior.
      - Dependency registrations are limited to statically visible generic or `typeof(...)` registrations on common registration method names; container modules, scanning conventions, factories, configuration-driven registrations, and runtime conditional registrations are not expanded.
      - Serializer contract member facts cover common attribute-declared member names such as `JsonPropertyName`, Newtonsoft `JsonProperty`, and `DataMember`; naming policies, custom converters, serializer options, and reflection-based serializers are not resolved.
      - Reflection targets are emitted only for direct `typeof(T)` or direct `typeof(T)` arguments with literal or `nameof(...)` member names; string construction, variables, binding flags, overload resolution, and reflective invocation reachability are not inferred.
      - Dynamic dispatch candidates record the invoked member name and generic syntax when the receiver is `dynamic`; they do not resolve concrete runtime targets.
      - Collection element flow records syntactic inputs to add/insert/enqueue/push-like mutations; it does not model collection contents after removals, aliases, loops, branches, object identity, or mutation order.
      - Mutation semantics classify direct property/field assignments and increment/decrement operations; they do not model aliasing, thread interleavings, setter side effects, or downstream object state.
      - Branch feasibility is limited to compiler constant boolean expressions, direct null equality checks, and direct null patterns; it does not perform symbolic execution, path feasibility, range analysis, or branch probability.
      - Raw expressions are not stored; expression hashes, expression kinds, resolved symbols, and line spans are emitted.

  - id: csharp.semantic.contractmapping.v1
    name: C# semantic contract mapping
    description: Records deterministic contract-adjacent mapping evidence for HTTP route/action bindings, database table/column attributes, and configuration section binding calls.
    evidenceTier: Tier1Semantic
    emits:
      - HttpRouteBinding
      - DatabaseColumnMapping
      - ConfigBinding
    limitations:
      - Requires Roslyn semantic analysis; syntax fallback does not emit these mapping facts.
      - HTTP route binding is limited to attribute-declared route/http method metadata and parameter symbols visible in source. Route conventions, endpoint builders, middleware, filters, and runtime route transforms are not expanded.
      - Database mapping is limited to attribute-declared `Table` and `Column` mappings. EF fluent configuration, conventions, migrations, provider-specific naming policies, and runtime model mutation are not resolved.
      - Config binding is limited to direct `GetSection(\"...\").Bind(...)` and `GetSection(\"...\").Get<T>()` call chains with literal section names. Options registration, named options, validation, reload behavior, and provider precedence are not inferred.
      - These facts prove source mapping declarations or calls, not runtime request routing, database schema existence, config availability, or branch reachability.

  - id: csharp.semantic.declarations.v1
    name: C# semantic declarations
    description: Finds compiler-resolved type declarations using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - TypeDeclared
    limitations:
      - Requires project load and enough references to create a Roslyn compilation.
      - Generated source excluded from inventory is not reported.

  - id: csharp.semantic.workspace.v1
    name: C# semantic workspace gaps
    description: Records MSBuildWorkspace load, MSBuild registration, syntax tree, and compilation gaps during semantic extraction.
    evidenceTier: Tier4Unknown
    emits:
      - AnalysisGap
    limitations:
      - Workspace diagnostics can be environment-specific because they depend on installed SDKs and available project references.
      - Compilation gaps do not prevent syntax fallback facts from being emitted.

  - id: http.client.invocation.v1
    name: HTTP client invocation
    description: Finds outbound HTTP calls through common .NET HTTP APIs.
    evidenceTier: Tier1Semantic or Tier3SyntaxOrTextual
    emits:
      - HttpCallDetected
      - HttpClientCreated
    limitations:
      - Tier1 requires Roslyn symbol binding to known HTTP APIs.
      - Syntax fallback matches common method names and may include unrelated methods with the same name.
      - URL may not be fully resolvable if built dynamically or loaded from runtime configuration.

  - id: database.ef.v1
    name: Entity Framework style database surface
    description: Finds DbContext-like classes, DbSet properties, and SaveChanges calls.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - DbContextDeclared
      - DbSetDeclared
      - DbChangeSaved
    limitations:
      - Tier1 requires Roslyn symbol binding to EF or EF Core types.
      - Structural fallback uses class/base type/property type naming patterns and does not prove runtime EF usage.
      - SaveChanges syntax fallback is name-only and may include unrelated methods.

  - id: database.dapper.invocation.v1
    name: Dapper invocation
    description: Finds common Dapper Query and Execute calls.
    evidenceTier: Tier1Semantic or Tier3SyntaxOrTextual
    emits:
      - DapperCallDetected
    limitations:
      - Tier1 requires Roslyn symbol binding to Dapper SqlMapper APIs.
      - Syntax fallback is name-only for Query, QueryAsync, Execute, and ExecuteAsync and may include unrelated APIs.

  - id: database.sql.text.v1
    name: SQL text detection
    description: Finds ADO.NET SqlCommand construction, SQL-like files, and SQL-like string literals.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - SqlCommandDetected
      - SqlTextUsed
      - AnalysisGap
    limitations:
      - SQL text evidence stores hashes and lengths only; table and column guesses belong on database.sql.shape.v1 QueryPatternDetected facts.
      - C# syntax fallback may classify any complete SQL-like string literal whose first token is a supported SQL verb, even outside a recognized framework call shape.
      - Dynamic SQL construction emits reduced-coverage boundary evidence instead of complete SQL text.
      - Raw SQL text is not stored by default; hashes and spans are emitted instead.

  - id: database.sql.shape.v1
    name: Shared SQL shape detection
    description: Derives Python-v1-compatible SQL query shape hashes and safe operation/table/column metadata from simple static SQL text.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - QueryPatternDetected
    limitations:
      - The v1 queryShapeHash is the Python normalized masked SQL text hash, not a full SQL parser or dialect-aware structural hash.
      - Normalization strips comments before masking strings; `--` inside string literals follows the v1 reference behavior.
      - Double-quoted contents are masked like strings, so quoted SQL identifiers may be omitted or collapse until a parser-backed version exists.
      - Shape-hash-only facts are allowed for SQL-like WITH/CTE text and omit unsupported operation/table/column fields.
      - SELECT table extraction only claims visible top-level FROM/JOIN identifiers; subquery table positions may be left without table metadata to avoid overclaiming.
      - Static SQL shape evidence does not prove runtime execution, schema existence, dialect validity, generated SQL equivalence, permissions, transaction behavior, or branch feasibility.
      - Raw SQL text, predicate literal values, source snippets, connection strings, raw URLs, and unsafe identifiers are not rendered.

  - id: config.key.v1
    name: Configuration key extraction
    description: Parses appsettings*.json, Web.config, App.config, packages.config, and connection string entries.
    evidenceTier: Tier2Structural
    emits:
      - ConfigKeyDeclared
      - ConnectionStringDeclared
      - AnalysisGap
    limitations:
      - JSON line spans are best-effort key locations.
      - Runtime configuration providers, environment overrides, secrets stores, and transformed config files are not evaluated.
      - Raw config values and connection strings are not stored by default; hashes are emitted for sensitive values.

  - id: contract.delta.reduce.v1
    name: Contract delta reduction
    description: Matches changed contract type, property, and field names against indexed facts and classifies evidence-backed impact findings.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - ImpactFinding
    limitations:
      - Name matching is deterministic and approximate; it does not infer serialization aliases, reflection usage, or runtime contract mapping.
      - DefiniteImpact requires compiler-resolved type evidence or usage evidence for the changed member.
      - Syntax-only matches are classified as NeedsReview because symbol identity is not proven.
      - NoEvidenceFullCoverage depends on a successful full semantic scan at a known commit SHA; reduced scans only support NoEvidenceReducedCoverage.
      - UnknownAnalysisGap is emitted only when analysis-gap evidence names the changed contract element; unrelated reduced coverage is reported as NoEvidenceReducedCoverage.
      - Generic or high fan-out name matches are still reported when evidence exists, but warnings mark them as review-sensitive.

  - id: contract.delta.input.v2
    name: Contract delta v2 input validation
    description: Validates structured contract delta v2 changes and records selector/input gaps without echoing raw unsafe values.
    evidenceTier: Tier4Unknown
    emits:
      - ContractDeltaInputGap
      - SelectorNoMatch gap
    limitations:
      - Legacy v1 input is compatibility-mapped to type/property references only.
      - Unsupported kinds or change types fail closed before reduction.
      - Selector gaps describe query shape, not source-code impact evidence.

  - id: contract.delta.impact.v2
    name: Contract delta impact v2
    description: Matches structured contract delta references against single-index and combined-index TraceMap facts and emits evidence-backed static impact findings.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - ImpactFinding
      - ContractDeltaImpactGap
    limitations:
      - Findings describe deterministic static evidence, not runtime reachability, traffic, or business impact.
      - Endpoint, package, SQL, schema, and dependency-surface matches are limited to indexed static facts.
      - Generic, high fan-out, name-only, and syntax/text matches are review-sensitive.
      - NoEvidence and NoImpactEvidence classifications are coverage-relative and depend on scan identity, commit SHA, build status, and known gaps.
      - Raw SQL, literal values, connection strings, URLs, local absolute paths, and source snippets are not rendered in public reports.

  - id: contract.delta.context.v2
    name: Contract delta impact context v2
    description: Records bounded path or reverse-context availability for contract delta v2 findings when stable combined-index selectors can be derived.
    evidenceTier: Tier4Unknown
    emits:
      - PathContextUnavailable gap
      - ReverseContextUnavailable gap
    limitations:
      - Path and reverse context are optional bounded static context, not complete dependency coverage.
      - Context is emitted only when stable selectors are available without overclaiming.
      - Missing context is reported as an explicit gap rather than inferred impact or inferred safety.

  - id: typescript.project.v1
    name: TypeScript project loading
    description: Records explicit tsconfig project evidence and project-load gaps for the TypeScript scanner.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - ProjectDeclared
      - AnalysisGap
    limitations:
      - JavaScript, inferred config, and package-manager workspace discovery are follow-up work.
      - Missing dependencies reduce semantic coverage but do not stop syntax fallback.

  - id: typescript.package.v1
    name: TypeScript package metadata
    description: Reads package.json package identity, dependencies, and script key facts without storing raw script commands.
    evidenceTier: Tier2Structural
    emits:
      - ProjectDeclared
      - PackageReferenced
      - ConfigKeyDeclared
      - AnalysisGap
    limitations:
      - Package scripts are stored as hashes and key paths only.
      - Package metadata is structural evidence; it does not prove runtime loading.
      - Package dependency rows are static package.json declarations and do not prove install, lockfile resolution, bundler inclusion, import/use, or deployment.
      - Workspace resolution, registry metadata, package-manager execution, and transitive dependency solving are out of scope.

  - id: typescript.config.v1
    name: TypeScript config keys
    description: Parses JSON config files and emits deterministic key-path facts with value hashes.
    evidenceTier: Tier2Structural
    emits:
      - ConfigFileDeclared
      - ConfigKeyDeclared
      - AnalysisGap
    limitations:
      - JSON line spans are best-effort key locations.
      - Runtime configuration providers, environment overrides, and secrets stores are not evaluated.

  - id: typescript.syntax.declarations.v1
    name: TypeScript syntax declarations
    description: Finds recoverable TypeScript declaration names without requiring semantic project load.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - PropertyDeclared
      - ParameterDeclared
      - AnalysisGap
    limitations:
      - Does not prove symbol identity, overload resolution, structural type equivalence, or runtime implementation for .d.ts declarations.

  - id: typescript.syntax.memberaccess.v1
    name: TypeScript syntax member access
    description: Finds member access names from TypeScript syntax and hashes receiver expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
    limitations:
      - Name-only evidence may match unrelated members with the same name.

  - id: typescript.syntax.invocation.v1
    name: TypeScript syntax invocation
    description: Finds invocation names from TypeScript syntax without compiler binding.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - InvocationName
    limitations:
      - Receiver type, overload target, dynamic dispatch, and runtime reachability are not proven.

  - id: typescript.syntax.callgraph.v1
    name: TypeScript syntax call graph
    description: Emits syntax-only caller-to-callee edges from invocation expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - CallEdge
    limitations:
      - Caller and callee names are best-effort syntax names.

  - id: typescript.syntax.objectcreation.v1
    name: TypeScript syntax object creation
    description: Emits syntax-only object creation facts from new expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Constructor overload and package identity are not proven without semantic analysis.

  - id: typescript.syntax.logicshape.v1
    name: TypeScript syntax logic shape
    description: Emits deterministic syntax signals for calculation, branching, and boilerplate-like code.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - CalculationExpression
      - BranchingLogic
      - InfrastructureBoilerplate
    limitations:
      - Logic shape facts are review-routing signals, not proof of business intent.

  - id: typescript.syntax.objectshape.v1
    name: TypeScript syntax object shape
    description: Records object-literal field shapes with sorted field names, shape hashes, expression hashes, and source spans.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectShapeInferred
    limitations:
      - Object shape facts are syntax evidence only; they do not prove DTO schemas, serializer output, runtime object contents, or nullability.
      - Nested object semantics, spread contents, mutation after construction, and branch feasibility are not expanded in this rule.
      - Raw object expressions and literal values are not stored.

  - id: typescript.semantic.declarations.v1
    name: TypeScript semantic declarations
    description: Emits compiler-resolved declaration facts with TraceMap-native TypeScript symbol IDs.
    evidenceTier: Tier1Semantic
    emits:
      - TypeDeclared
      - MethodDeclared
      - PropertyDeclared
      - ParameterDeclared
    limitations:
      - Requires a loadable TypeScript program and enough dependencies/path mappings for binding.
      - Symbol IDs are stable for the same scan inputs but may change across file renames, package version changes, and compiler binding changes.

  - id: typescript.semantic.propertyaccess.v1
    name: TypeScript semantic property access
    description: Emits compiler-resolved property access facts with reducer-compatible property keys.
    evidenceTier: Tier1Semantic
    emits:
      - PropertyAccessed
    limitations:
      - Does not prove reflection, dynamic property construction, proxy behavior, or runtime branch reachability.

  - id: typescript.semantic.methodinvocation.v1
    name: TypeScript semantic method invocation
    description: Emits compiler-resolved function and method invocation facts with reducer-compatible method keys.
    evidenceTier: Tier1Semantic
    emits:
      - MethodInvoked
    limitations:
      - Dynamic dispatch targets, decorator effects, dependency injection, and runtime interface implementations are not inferred.

  - id: typescript.semantic.callgraph.v1
    name: TypeScript semantic call graph
    description: Emits compiler-resolved call-edge facts when TypeScript exposes callee symbols.
    evidenceTier: Tier1Semantic
    emits:
      - CallEdge
    limitations:
      - A call edge records a syntactic call site, not proof that the path executes at runtime.

  - id: typescript.semantic.objectcreation.v1
    name: TypeScript semantic object creation
    description: Emits compiler-resolved object creation facts with created type and caller evidence.
    evidenceTier: Tier1Semantic
    emits:
      - ObjectCreated
    limitations:
      - Does not model factory-returned runtime types, dependency-injection activations, or deserializer-created instances.

  - id: typescript.semantic.valueflow.v1
    name: TypeScript semantic argument value flow
    description: Records direct call-site argument-to-parameter facts with expression hashes and shared argument/parameter role metadata when compiler symbols are available.
    evidenceTier: Tier1Semantic
    emits:
      - ArgumentPassed
    limitations:
      - Tracks direct call-site arguments only; field/property aliases and interprocedural parameter-forward edges are follow-up work.
      - Parameter role metadata is emitted only when the TypeScript compiler resolves the call signature; unresolved syntax fallback remains lower-tier evidence.

  - id: typescript.semantic.localalias.v1
    name: TypeScript semantic local alias
    description: Records simple local aliases assigned from resolved symbols.
    evidenceTier: Tier1Semantic
    emits:
      - LocalAlias
    limitations:
      - Does not model mutation, closure capture, collection contents, property aliases, or alias invalidation through control flow.

  - id: typescript.semantic.symbolidentity.v1
    name: TypeScript semantic symbol identity
    description: Adds TraceMap-native TypeScript symbol IDs and symbol occurrence rows to semantic facts.
    evidenceTier: Tier1Semantic
    emits:
      - symbols table rows
      - symbol_occurrences table rows
      - fact_symbols table rows
    limitations:
      - TypeScript IDs are not SCIP-compatible and are not guaranteed stable across package/file/compiler identity changes.

  - id: typescript.semantic.symbolrelationship.v1
    name: TypeScript semantic symbol relationships
    description: Emits direct extends, implements, and explicit override relationships when TypeScript resolves the symbols.
    evidenceTier: Tier1Semantic
    emits:
      - SymbolRelationship
      - symbol_relationships table rows
    limitations:
      - Structural type compatibility, transitive relationships, and runtime dispatch are not inferred.
      - Overrides are emitted only for explicit TypeScript override syntax in this MVP.

  - id: typescript.integration.http.v1
    name: TypeScript HTTP integration
    description: Detects fetch and axios HTTP call shapes with hashed URL evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - HttpCallDetected
    limitations:
      - Dynamic URL construction, interceptor behavior, and runtime client configuration are not resolved.

  - id: typescript.integration.route.v1
    name: TypeScript route integration
    description: Detects Express-style route method calls with hashed route literals.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - HttpRouteBinding
    limitations:
      - Middleware, route composition, framework decorators, and runtime route registration are not expanded.

  - id: typescript.integration.serializer.v1
    name: TypeScript serializer integration
    description: Detects JSON.parse and JSON.stringify calls as serializer boundary evidence.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - SerializationLogic
    limitations:
      - Serializer options, replacers, revivers, and schema validation are not interpreted.

  - id: typescript.integration.database.v1
    name: TypeScript database integration
    description: Detects Prisma client call shapes as database boundary evidence.
    evidenceTier: Tier2Structural or Tier1Semantic
    emits:
      - DatabaseColumnMapping
    limitations:
      - Prisma schema files, migrations, query middleware, and runtime client extensions are not modeled in MVP.

  - id: typescript.integration.sql.v1
    name: TypeScript direct SQL integration
    description: Detects direct SQL client literals and tagged SQL templates, emitting hash-only SQL text evidence and SQL-shape query patterns when complete static SQL text is visible.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - SqlTextUsed
      - QueryPatternDetected
      - AnalysisGap
    limitations:
      - Detection is syntax-only for supported direct SQL call and tag shapes; supported method names are query, execute, raw, executeRaw, $queryRaw, and $executeRaw, and unrelated APIs with those names may be missed or require SQL-like first arguments to avoid overclaiming.
      - Template literals with non-static expressions emit dynamic-boundary gaps rather than complete SQL text evidence.
      - Prisma/Base44 query-builder facts remain under typescript.integration.querypattern.v1 and are not SQL-shape evidence unless direct SQL text is present.
      - The v1 queryShapeHash follows Python normalized masked SQL text semantics, including comment-before-string masking and double-quoted-content caveats.
      - Static SQL shape evidence does not prove runtime execution, schema existence, dialect validity, generated SQL equivalence, permissions, transaction behavior, or branch feasibility.
      - Raw SQL text, predicate literal values, source snippets, connection strings, raw URLs, and unsafe identifiers are not rendered.

  - id: typescript.integration.contractmapping.v1
    name: TypeScript contract mapping integration
    description: Detects Zod schema call shapes as structural contract mapping evidence.
    evidenceTier: Tier2Structural
    emits:
      - SerializerContractMember
    limitations:
      - Schema composition, refinements, transforms, and runtime validation paths are not fully expanded.

  - id: typescript.integration.boundary.v1
    name: TypeScript integration boundary
    description: Detects process.env reads and other MVP boundary shapes without claiming runtime state.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ConfigKeyDeclared
    limitations:
      - Environment variable availability, provider precedence, and deployment configuration are not proven.

  - id: typescript.integration.querypattern.v1
    name: TypeScript integration query pattern
    description: Records Prisma-style and Base44-style entity query call shapes with where, orderBy, select, include, data, filter, sort, and mutation field names plus hashed patterns.
    evidenceTier: Tier2Structural
    emits:
      - QueryPatternDetected
    limitations:
      - Structural query evidence does not prove generated SQL, runtime execution, database schema existence, or branch feasibility.
      - Prisma/Base44 query-builder facts are not SQL-shape facts and do not emit sqlSourceKind.
      - Only statically visible object-literal and simple string sort arguments are inspected in MVP; variables, spreads, helper-built filters, and dynamic keys need later flow rules.
      - Literal values and raw object text are not stored; field names, operation names, hashes, and spans are emitted.
      - Reports may display safe derived query metadata and hashes, but must not display raw SQL text, literal values, or unsafe identifiers.

  - id: typescript.integration.angular-httpclient.v1
    name: TypeScript Angular HttpClient integration
    description: Detects Angular HttpClient calls, hashes raw URL expressions, and stores normalized route templates/keys when statically visible.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - HttpCallDetected
    limitations:
      - Static extraction does not prove runtime interceptor rewrites, proxy configuration, deployment base paths, auth state, CORS behavior, or whether a call executes.
      - Environment base URL values are not stored raw; only hash evidence and cleartext relative path suffixes such as /api are stored for matching.
      - Variables, helper functions, destructured methods, indirect receivers, and complex URL expressions are marked dynamic and require review.

  - id: csharp.syntax.aspnetroute.v1
    name: C# ASP.NET syntax route fallback
    description: Extracts ASP.NET controller attribute route bindings from C# syntax and normalizes route templates without requiring framework references.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - HttpRouteBinding
    limitations:
      - Syntax fallback does not prove runtime route registration, middleware ordering, conventional routes, minimal APIs, endpoint filters, route groups, or custom route attributes.
      - Supports literal controller/method route attributes and common Http* attributes; non-literal route constants and advanced routing are not guessed.
      - Route constraints and optional segments are retained as evidence, but runtime constraint behavior is not evaluated.

  - id: endpoint.alignment.v1
    name: Cross-index endpoint alignment
    description: Derives a report by matching client HttpCallDetected facts to server HttpRouteBinding facts by HTTP method and normalized route key.
    evidenceTier: Derived report over source evidence
    emits:
      - endpoint-report.md
      - endpoint-report.json
    limitations:
      - Endpoint findings are derived report rows, not source facts.
      - Matching is static and coverage-relative; client-only findings are not proof of broken calls and server-only findings are not proof of dead or unused endpoints.
      - Does not prove runtime reachability, reverse proxy behavior, auth policies, feature flags, branch feasibility, deployment routing, or generated OpenAPI behavior.
      - MVP compares one client index and one server index; N-way combined dependency analysis and endpoint diffs are follow-up work.

  - id: jvm.file.inventory.v1
    name: JVM file inventory
    description: Records deterministic inventory facts for supported Java, Kotlin, Maven, Gradle, config, XML, JSON, YAML, and SQL files.
    evidenceTier: Tier2Structural
    emits:
      - FileInventoried
    limitations:
      - File presence is structural evidence only and does not prove build or runtime usage.
      - Generated output, build output, dependency caches, and TraceMap output directories are excluded by default.

  - id: jvm.buildfile.v1
    name: JVM build file metadata
    description: Extracts local Maven and literal Gradle module/dependency metadata without running build tools.
    evidenceTier: Tier2Structural
    emits:
      - ProjectDeclared
      - PackageReferenced
      - AnalysisGap
    limitations:
      - Maven parent POMs are resolved only when local files are present.
      - Gradle extraction is literal-only; version catalogs, convention plugins, buildSrc, composite builds, and interpolation are reduced-coverage gaps.
      - Dependency metadata is structural and does not prove the dependency is resolved on the scanner classpath.
      - JVM package facts do not prove Maven/Gradle execution, dependency cache contents, transitive dependency resolution, runtime class loading, or deployment.

  - id: jvm.config.v1
    name: JVM config files
    description: Extracts config file declarations and key paths from properties, JSON, YAML, XML, and env-like config files with hashed values.
    evidenceTier: Tier2Structural
    emits:
      - ConfigFileDeclared
      - ConfigKeyDeclared
      - AnalysisGap
    limitations:
      - Config precedence, profile activation, environment overrides, and runtime availability are not evaluated.
      - Values are hashed and not stored raw.

  - id: jvm.java.syntax.declarations.v1
    name: Java syntax declarations
    description: Finds Java package, type, method, field, parameter, annotation, and simple relationship syntax without relying on compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - FieldDeclared
      - ParameterDeclared
      - AttributeUsed
      - SymbolRelationship
    limitations:
      - Syntax evidence does not prove symbol identity, overload resolution, generated code, or runtime dispatch.
      - Relationship targets are syntax names when semantic binding is unavailable.

  - id: jvm.java.syntax.invocation.v1
    name: Java syntax invocation
    description: Finds Java member access and invocation names without resolving receiver types or overloads.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
      - InvocationName
      - ArgumentPassed
    limitations:
      - Does not prove receiver type, overload target, extension/framework behavior, reflection, or runtime dispatch.
      - Argument flow is call-site shape evidence only when semantic binding is unavailable.

  - id: jvm.java.syntax.callgraph.v1
    name: Java syntax call graph
    description: Emits syntax-only caller-to-callee edges from Java invocation expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - CallEdge
      - ArgumentPassed
    limitations:
      - Caller/callee symbols are best-effort source names, not compiler-resolved symbols.
      - Dynamic dispatch, lambdas, reflection, method references, and async/thread behavior are not modeled.

  - id: jvm.java.syntax.objectcreation.v1
    name: Java syntax object creation
    description: Emits syntax-only object creation facts from Java constructor expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Created type and constructor are syntax names and may not be fully qualified.
      - Constructor overload and dependency-injection activation are not proven.

  - id: jvm.java.syntax.logicshape.v1
    name: Java syntax logic shape
    description: Emits deterministic syntax signals for calculation, branching, and boilerplate-like Java code.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - CalculationExpression
      - BranchingLogic
      - InfrastructureBoilerplate
    limitations:
      - Logic shape facts are review-routing heuristics, not proof of business intent.
      - Raw expressions are not stored; expression hashes and spans are emitted.

  - id: jvm.java.semantic.declarations.v1
    name: Java semantic declarations
    description: Emits compiler-resolved Java type, method, field, and parameter declaration facts using JDK compiler APIs.
    evidenceTier: Tier1Semantic
    emits:
      - TypeDeclared
      - MethodDeclared
      - FieldDeclared
      - ParameterDeclared
    limitations:
      - Requires a JDK compiler and enough classpath/source context for symbols to resolve.
      - Annotation processors are disabled; generated declarations are not created during scan.

  - id: jvm.java.semantic.memberaccess.v1
    name: Java semantic member access
    description: Emits compiler-resolved Java field/member access facts with reducer-friendly plain symbol names.
    evidenceTier: Tier1Semantic
    emits:
      - PropertyAccessed
    limitations:
      - Requires compiler symbol resolution.
      - Does not infer reflection, dynamic proxies, Lombok-generated accessors, or runtime dispatch targets.

  - id: jvm.java.semantic.invocation.v1
    name: Java semantic invocation
    description: Emits compiler-resolved Java method invocation facts.
    evidenceTier: Tier1Semantic
    emits:
      - MethodInvoked
    limitations:
      - Requires compiler symbol resolution.
      - Does not model runtime polymorphism, reflection targets, dependency injection, method references, or async/thread execution.

  - id: jvm.java.semantic.callgraph.v1
    name: Java semantic call graph
    description: Emits compiler-resolved Java caller-to-callee call edges.
    evidenceTier: Tier1Semantic
    emits:
      - CallEdge
    limitations:
      - Records syntactic call sites, not proof that a branch executes at runtime.
      - Dynamic dispatch, callbacks, reflection, and framework wiring are not expanded.

  - id: jvm.java.semantic.objectcreation.v1
    name: Java semantic object creation
    description: Emits compiler-resolved Java object creation facts.
    evidenceTier: Tier1Semantic
    emits:
      - ObjectCreated
    limitations:
      - Does not model dependency-injection-created instances, reflection-created objects, deserialization, or factory-return runtime types.

  - id: jvm.java.semantic.valueflow.v1
    name: Java semantic argument value flow
    description: Maps resolved Java call-site argument expressions to callee parameter names with shared argument/parameter role metadata and records simple local aliases when the initializer resolves to a symbol.
    evidenceTier: Tier1Semantic
    emits:
      - ArgumentPassed
      - LocalAlias
    limitations:
      - Tracks direct call-site arguments only.
      - Argument role metadata is emitted only when javac resolves the argument expression to a symbol.
      - Local aliases are limited to direct local variable initializers with a resolved origin symbol.
      - Does not perform interprocedural aliasing, field aliasing, mutation tracking, collection contents, branch feasibility, or async/callback flow.

  - id: jvm.java.semantic.relationship.v1
    name: Java semantic relationships
    description: Emits compiler-resolved Java extends and implements relationships.
    evidenceTier: Tier1Semantic
    emits:
      - SymbolRelationship
    limitations:
      - Missing dependencies, generated sources, or annotation processors reduce relationship coverage.
      - Runtime proxies and dependency injection substitutions are not modeled.

  - id: jvm.kotlin.syntax.declarations.v1
    name: Kotlin syntax declarations
    description: Finds Kotlin package, type, function, and annotation syntax without Kotlin compiler semantic analysis.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - AttributeUsed
    limitations:
      - Kotlin MVP support is syntax-only; symbol identity, overload resolution, extension dispatch, compiler plugins, and generated members are not proven.

  - id: jvm.kotlin.syntax.invocation.v1
    name: Kotlin syntax invocation
    description: Finds Kotlin member access, invocation names, and syntax call edges.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
      - InvocationName
      - CallEdge
      - HttpRouteBinding
    limitations:
      - Does not prove receiver type, Ktor runtime installation, extension dispatch, coroutine behavior, or overload target.

  - id: jvm.kotlin.syntax.objectcreation.v1
    name: Kotlin syntax object creation
    description: Emits syntax-only object creation facts for Kotlin constructor-like calls.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Constructor-like syntax can also be ordinary function calls; semantic Kotlin extraction is required for stronger evidence.

  - id: jvm.integration.http.route.v1
    name: JVM HTTP route integration
    description: Detects Spring, JAX-RS, and syntax-only Ktor route evidence and stores normalized route keys.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - HttpRouteBinding
    limitations:
      - Static extraction does not prove runtime route registration, middleware/filter behavior, profiles, reverse proxies, auth, or deployment base paths.
      - Ktor route evidence is syntax/structural only until Kotlin semantic extraction exists.

  - id: jvm.integration.sql.v1
    name: JVM SQL integration
    description: Detects SQL resources, JDBC SQL literals, and JPA query literals with hashed SQL evidence.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - SqlFileDeclared
      - SqlTextUsed
      - QueryPatternDetected
    limitations:
      - SQL text hashes and SQL-shape hashes do not prove runtime execution, database schema existence, generated SQL, dialect validity, permissions, transaction behavior, or branch feasibility.
      - The v1 queryShapeHash follows Python normalized masked SQL text semantics, including comment-before-string masking and double-quoted-content caveats.
      - SQL-like WITH/CTE text may emit shape-hash-only QueryPatternDetected without operation/table/column metadata.
      - Dynamic or concatenated SQL literals are not complete SQL text evidence.
      - JDBC/JPA literal detection is conservative and may miss overloaded calls with trailing non-SQL arguments when the visible SQL shape cannot be isolated safely.
      - When JVM query-pattern facts are emitted, reports may display safe derived query metadata and hashes, but must not display raw SQL text, literal values, or unsafe identifiers.

  - id: jvm.integration.jpa.v1
    name: JVM JPA mapping integration
    description: Detects JPA entity and column mapping annotations as persistence boundary evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - DatabaseColumnMapping
    limitations:
      - Naming conventions and annotation presence do not prove runtime entity manager configuration, migrations, generated schema, or lazy-loading behavior.

  - id: jvm.integration.serializer.v1
    name: JVM serializer integration
    description: Detects Jackson explicit serializer contract members and broad serializer logic.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - SerializerContractMember
      - SerializationLogic
    limitations:
      - Serializer runtime configuration, modules, mixins, naming policies, and profile-specific behavior are not evaluated.
      - SerializationLogic is report/export evidence; SerializerContractMember is the reducer-probable serializer fact.

  - id: jvm.integration.configuse.v1
    name: JVM config usage integration
    description: Detects Spring @Value, Environment/System property reads, and environment variable access with hashed/static key evidence.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - ConfigKeyDeclared
    limitations:
      - Runtime config providers, precedence, environment contents, profiles, and secret availability are not proven.

  - id: python.package.metadata.v1
    name: Python package metadata
    description: Emits Python package dependency facts from pyproject.toml, setup.cfg, setup.py literals, and requirements files.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - PackageReferenced
      - AnalysisGap
    limitations:
      - setup.py is parsed for literal dependency lists only and is never executed.
      - Dependency resolution, extras, lockfile solving, environment markers, and installed package versions are not proven.
      - Direct URLs, editable installs, local paths, and dynamic declarations are represented as hash-only metadata or gaps; raw values are not rendered.

  - id: python.ast.declarations.v1
    name: Python AST declarations
    description: Emits syntax-level class, function, field, and parameter declaration facts from Python AST.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - FieldDeclared
      - ParameterDeclared
    limitations:
      - Python MVP does not run a type checker or import user code.
      - Dynamic class creation, monkey patching, decorators that add members, and runtime annotations are not expanded.

  - id: python.ast.imports.v1
    name: Python AST imports
    description: Tracks import roots used to classify bounded Python integration patterns.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - AnalysisGap
    limitations:
      - Import aliases help classify local syntax only; imported module contents and runtime side effects are not loaded.

  - id: python.ast.invocation.v1
    name: Python AST invocation
    description: Emits syntax-level member access and invocation-name facts.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
      - InvocationName
    limitations:
      - Receiver type, overload target, dynamic dispatch, monkey patching, decorators, and runtime bindings are not proven.

  - id: python.ast.callgraph.v1
    name: Python AST call graph
    description: Emits syntax-level caller-to-callee call-edge facts from call expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - CallEdge
    limitations:
      - Callee names are syntax names and may be local functions, methods, constructors, or callable objects.
      - Branch feasibility, callbacks, async scheduling, decorators, dynamic dispatch, and framework wiring are not modeled.

  - id: python.ast.objectcreation.v1
    name: Python AST object creation
    description: Emits syntax-level object creation facts for constructor-like calls.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Constructor-like syntax can be ordinary callable invocation in Python.
      - Factory return types, dependency injection, deserialization, and runtime metaclass behavior are not proven.

  - id: python.ast.argumentflow.v1
    name: Python AST argument flow
    description: Emits direct parameter-to-call argument flow, simple local alias facts, and direct self-field alias facts with shared role metadata where AST-visible names are available.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ArgumentPassed
      - LocalAlias
      - FieldAlias
    limitations:
      - Tracks direct same-function call arguments, local aliases, and self-field assignments only.
      - Callee parameters are ordinal placeholders unless a future Python semantic layer resolves callable signatures.
      - Does not model transitive aliasing, mutation, collection contents, interprocedural return values, branch feasibility, async/callback flow, or dynamic kwargs expansion.

  - id: python.ast.relationships.v1
    name: Python AST symbol relationships
    description: Emits syntax-level class inheritance relationships.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - SymbolRelationship
    limitations:
      - Base names are syntax names and may not be fully qualified.
      - MRO, metaclasses, protocols, mixins loaded dynamically, and runtime base mutation are not evaluated.

  - id: python.ast.dynamic-boundary.v1
    name: Python dynamic boundary
    description: Emits analysis gaps and syntax-only boundary evidence for Python constructs that require runtime context.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AnalysisGap
      - HttpRouteBinding
    limitations:
      - Dynamic routes, dynamic SQL, dynamic config keys, importlib targets, and unparsable files remain review evidence rather than resolved facts.

  - id: python.integration.fastapi.v1
    name: Python FastAPI integration
    description: Detects FastAPI and APIRouter route decorator bindings with normalized route keys.
    evidenceTier: Tier2Structural
    emits:
      - HttpRouteBinding
    limitations:
      - Static extraction does not prove runtime router inclusion, dependency overrides, middleware, auth, deployment prefixes, or generated OpenAPI output.

  - id: python.integration.flask.v1
    name: Python Flask integration
    description: Detects Flask route decorator bindings with normalized route keys.
    evidenceTier: Tier2Structural
    emits:
      - HttpRouteBinding
    limitations:
      - Static extraction does not prove app factory behavior, blueprint registration, middleware, auth, reverse proxies, or runtime route mutation.

  - id: python.integration.pydantic.v1
    name: Python Pydantic integration
    description: Emits serializer contract member evidence for classes deriving from BaseModel.
    evidenceTier: Tier2Structural
    emits:
      - SerializerContractMember
    limitations:
      - Field aliases, validators, computed fields, runtime config, model serializers, and version-specific behavior are not fully evaluated in MVP.

  - id: python.integration.dataclass.v1
    name: Python dataclass integration
    description: Emits serializer-like structural member evidence for dataclass fields.
    evidenceTier: Tier2Structural
    emits:
      - SerializerContractMember
    limitations:
      - Runtime serializers, custom encoders, post-init mutation, default factories, and inheritance behavior are not proven.

  - id: python.integration.sqlalchemy.v1
    name: Python SQLAlchemy integration
    description: Detects SQLAlchemy declarative column mapping syntax.
    evidenceTier: Tier2Structural
    emits:
      - DatabaseColumnMapping
    limitations:
      - Runtime engine configuration, migrations, generated schema, hybrid properties, relationships, naming conventions, and lazy-loading behavior are not proven.

  - id: python.integration.sql.v1
    name: Python SQL integration
    description: Detects SQL files and direct SQL text literals used by common DB-API or SQLAlchemy call shapes, and derives lightweight query-pattern metadata when statically visible.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - SqlFileDeclared
      - SqlTextUsed
      - QueryPatternDetected
      - AnalysisGap
    limitations:
      - SQL text is hashed and operation-shaped; raw SQL text and literal values are not stored by default.
      - Query-pattern extraction is best-effort for simple static SQL operation, table, and column shapes; full SQL parsing, dialect behavior, schema existence, generated SQL, and runtime execution are not proven.
      - The v1 queryShapeHash is the Python normalized masked SQL text reference; comment-before-string masking and double-quoted-content masking are known caveats.
      - SQL-like WITH/CTE text may emit shape-hash-only QueryPatternDetected without operation/table/column metadata.
      - Reports may display safe derived table, column, source-kind, and shape-hash metadata, but must not display raw SQL text, literal values, or unsafe identifiers.
      - Quoted identifiers may be treated conservatively as string literals by lightweight SQL shape extraction and missed until a shared SQL parser exists.
      - Tier2 query patterns are structural evidence only; Tier3 query patterns are review-routing evidence and should not be treated as semantic database proof.

  - id: python.integration.config.v1
    name: Python config integration
    description: Detects config files, Python config module assignments, and static os.environ/os.getenv key reads.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - ConfigFileDeclared
      - ConfigKeyDeclared
      - AnalysisGap
    limitations:
      - Runtime config providers, environment contents, secret availability, precedence, profiles, and dynamic key construction are not proven.

  - id: python.integration.httpclient.v1
    name: Python HTTP client integration
    description: Detects requests and httpx HTTP calls with normalized static URL path keys when literals are present.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - HttpCallDetected
    limitations:
      - Runtime base URLs, sessions, auth, retries, proxies, redirects, and dynamically constructed URLs are not resolved.

  - id: python.boilerplate.v1
    name: Python boilerplate shape
    description: Reserved for deterministic Python infrastructure or boilerplate classification.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - InfrastructureBoilerplate
    limitations:
      - Boilerplate classification is a review-routing heuristic and not proof of business intent.

  - id: release.review.rollup.v1
    name: Release review rollup
    description: Emits deterministic release-review summary classifications from underlying TraceMap findings and gaps.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewSummary
    limitations:
      - Rollups summarize static evidence only and are not release approval, CI policy, runtime risk prediction, or production usage proof.
      - Rollup strength is bounded by source identity, commit SHA availability, coverage, truncation, and unavailable workflow gaps.
      - Underlying classifications, rule IDs, evidence tiers, and limitations remain authoritative.

  - id: release.review.checklist.v1
    name: Release review checklist
    description: Emits deterministic checklist items derived only from release-review findings and gaps.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewChecklistItem
    limitations:
      - Checklist items are review-routing prompts, not generated advice or release decisions.
      - Items are derived from static findings and gaps and may omit runtime, deployment, and business context.

  - id: release.review.source.v1
    name: Release review source identity and coverage
    description: Emits source pairing, commit SHA, identity, and coverage gaps for release-review comparisons.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewSourceCoverage
      - ReleaseReviewGap
    limitations:
      - Repository identity is hash-based and cannot prove ownership or runtime deployment equivalence.
      - Missing or reduced coverage makes absence of evidence coverage-relative.
      - Unknown commit SHAs prevent history-completeness claims.

  - id: release.review.section.v1
    name: Release review section status
    description: Emits unavailable, deferred, unsupported-mode, and workflow-status gaps for release-review sections.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewGap
    limitations:
      - Unavailable or deferred sections are explicit analysis gaps, not clean results.
      - Section status does not imply an underlying workflow ran unless the status is available with findings or gaps from that workflow.

  - id: release.review.selector.v1
    name: Release review selector handling
    description: Emits gaps when release-review selectors are ignored or cannot apply to enabled scopes.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewGap
    limitations:
      - Selector no-match or ignored-selector output reflects static indexed evidence only.
      - Dynamic routes, generated configuration, reduced coverage, or unavailable sections can hide otherwise relevant evidence.

  - id: release.review.truncation.v1
    name: Release review truncation
    description: Emits gaps when release-review caps omit findings, path rows, reverse rows, checklist items, or gaps.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewGap
    limitations:
      - Truncated reports are incomplete by construction and must not be interpreted as comprehensive.
      - Omitted counts are deterministic for the selected scope and caps, but not evidence of lower importance.

  - id: portfolio.identity.v1
    name: Portfolio source identity
    description: Emits portfolio source identity rows and gaps from TraceMap scan metadata, commit SHAs, labels, and manifest expectations.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioSource
      - PortfolioGap
    limitations:
      - Repository identity is hash-based and cannot prove runtime deployment, ownership, or service equivalence.
      - Duplicate source identity is excluded from cross-source grouping to avoid double-counting evidence.
      - Manifest expected identity is a validation hint, not a replacement for indexed source provenance.

  - id: portfolio.coverage.v1
    name: Portfolio coverage summary
    description: Emits portfolio source coverage rows from analysis level, build status, commit SHA availability, and known analysis gaps.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioSourceCoverage
      - PortfolioGap
    limitations:
      - Reduced coverage makes absence of evidence coverage-relative.
      - Coverage is static analysis coverage, not runtime exercise or test coverage.

  - id: portfolio.schema.v1
    name: Portfolio schema gap
    description: Emits portfolio gaps when an input index lacks required or optional TraceMap schema objects.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Missing schema prevents only the affected portfolio section from making stronger claims.
      - Schema gaps are not evidence that dependencies are absent.

  - id: portfolio.endpoint.alignment.v1
    name: Portfolio endpoint alignment
    description: Emits cross-source endpoint findings by reusing TraceMap static method/path matching over indexed HTTP client and route facts.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - PortfolioEndpointFinding
    limitations:
      - Endpoint alignment is static method/path evidence and does not prove runtime traffic, deployment paths, auth, proxy, CORS, or reachability.
      - Dynamic or unnormalized URLs are review-tier evidence only.
      - Source-local ambiguity prevents stronger endpoint conclusions.

  - id: portfolio.surface.inventory.v1
    name: Portfolio dependency surface inventory
    description: Emits source-scoped portfolio dependency surface rows from indexed HTTP, SQL, package, config, resource, and persistence evidence.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - PortfolioSurface
    limitations:
      - Surface rows are static evidence and do not prove runtime use, compatibility, schema existence, package restore, or deployment topology.
      - Raw SQL, snippets, config values, URLs, local paths, and secret-looking values must be omitted, redacted, or hashed.

  - id: portfolio.surface.group.v1
    name: Portfolio shared surface grouping
    description: Groups safe portfolio surface identities across sources while preserving all supporting source evidence.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - PortfolioSharedSurface
    limitations:
      - Shared surface identity does not prove runtime coupling, ownership, traffic, or business dependency.
      - Tier3, dynamic, hash-only, duplicate, or reduced-coverage support keeps the group review-tier.

  - id: portfolio.edge.inventory.v1
    name: Portfolio dependency edge inventory
    description: Emits source-scoped static call, object creation, symbol relationship, argument-flow, and parameter-forwarding edge rows.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - PortfolioEdge
    limitations:
      - Static edges do not prove dynamic dispatch targets, runtime DI registrations, reflection targets, branch feasibility, or collection contents.

  - id: portfolio.diff.v1
    name: Portfolio source diff
    description: Emits source-level before/after portfolio comparison rows from manifest labels and source identity evidence.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioDiffRow
    limitations:
      - V1 source diff does not replace combined diff, impact, path, or reverse workflows.
      - Identity ambiguity downgrades comparisons to review-tier evidence.

  - id: portfolio.impact.context.v1
    name: Portfolio impact context status
    description: Emits portfolio impact context status and deferred/unavailable gaps when impact composition is requested but not available in v1.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Deferred impact context is an explicit analysis gap, not a clean result.
      - Portfolio impact does not introduce a competing impact classifier.

  - id: portfolio.optional-context.v1
    name: Portfolio optional context status
    description: Emits path, reverse, and release-review context statuses for portfolio reports.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Not-requested sections did not run and must not be interpreted as no evidence.
      - Deferred or unavailable sections are explicit analysis gaps for that context.

  - id: portfolio.selector.v1
    name: Portfolio selector handling
    description: Emits portfolio selector no-match and ignored-selector gaps for source, group, surface, and surface-name filters.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Selector no-match reflects indexed static evidence only.
      - Dynamic evidence, reduced coverage, or unavailable sections can hide otherwise relevant evidence.

  - id: portfolio.truncation.v1
    name: Portfolio truncation
    description: Emits gaps and omitted counts when portfolio row caps truncate sources, endpoints, surfaces, edges, groups, diffs, paths, roots, or gaps.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Truncated portfolio reports are incomplete by construction.
      - Omitted counts are deterministic for selected caps and scope, but not evidence of lower importance.

  - id: portfolio.redaction.v1
    name: Portfolio redaction
    description: Documents portfolio safe-rendering behavior for paths, URLs, SQL, snippets, config values, and secret-looking metadata.
    evidenceTier: Tier4Unknown
    emits:
      - RedactedValue
      - UnsafePropertyOmitted
    limitations:
      - Redaction preserves review safety at the cost of losing raw values.
      - Hashes are comparison aids only and must not be treated as decoded or verified secrets.

  - id: api.dto.contract.diff.endpoint.v1
    name: API/DTO endpoint contract diff
    description: Compares indexed static endpoint route and route-shape evidence between two TraceMap snapshots.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - ApiDtoContractDiffRow
    limitations:
      - Endpoint rows compare static method/path/handler/route metadata only and do not prove runtime traffic, deployment base paths, proxies, auth, CORS, or reachability.
      - Path-only, display-only, syntax-only, duplicate, or identity-unverified endpoints are review-tier.
      - Handler changes under a stable route identity are changed static evidence, not proof of runtime dispatch.

  - id: api.dto.contract.diff.dto.v1
    name: API/DTO type and member contract diff
    description: Compares indexed DTO/type/member/method evidence between two TraceMap snapshots.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - ApiDtoContractDiffRow
    limitations:
      - DTO rows compare only metadata indexed by language adapters and do not prove OpenAPI completeness, runtime serializer mapping, binary compatibility, generated code coverage, or runtime object mutation.
      - Missing declared type, nullability, requiredness, containing type, alias, assembly, package, or module metadata downgrades affected rows.
      - Generic property-only identities such as id, type, name, and status are review-tier unless containing type identity is available.

  - id: api.dto.contract.diff.attachment.v1
    name: API/DTO request-response attachment diff
    description: Compares endpoint-to-DTO request/response attachment evidence where adapters emit credible attachment facts; otherwise emits explicit attachment gaps.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - ApiDtoContractDiffRow
      - ApiDtoContractDiffGap
    limitations:
      - Absence of endpoint-to-DTO attachment evidence is an analysis gap, not proof that request or response contracts did not change.
      - Status-code and response-kind behavior is preserved only when explicitly indexed and is not inferred from framework conventions.
      - Runtime serializer, model binding, dependency injection, filters, and dynamic response behavior are not resolved.

  - id: api.dto.contract.diff.identity.v1
    name: API/DTO contract diff source and stable identity
    description: Emits source identity, duplicate contract identity, and stable-key downgrade gaps for API/DTO contract diffs.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractSourcePair
      - ApiDtoContractDiffGap
    limitations:
      - Repository identity is hash-based and cannot prove ownership, deployment equivalence, or branch ancestry.
      - Duplicate stable identities are preserved as review-tier evidence and TraceMap does not pick an arbitrary winner.
      - Missing source identity, language identity, commit SHA, assembly, package, or module metadata downgrades comparisons.

  - id: api.dto.contract.diff.coverage.v1
    name: API/DTO contract diff coverage
    description: Emits reduced coverage, no-diff evidence, and coverage-relative API/DTO contract diff gaps.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractDiffGap
    limitations:
      - Reduced scan coverage makes absence of evidence coverage-relative.
      - NoDiffEvidence means no comparable static evidence matched the selected scope, not proof that no runtime contract changed.
      - Build failures, syntax fallback, unavailable generated artifacts, and missing adapter precision can hide otherwise relevant evidence.

  - id: api.dto.contract.diff.schema.v1
    name: API/DTO contract diff schema gap
    description: Emits gaps when required or optional TraceMap index schema objects needed by API/DTO contract diff are absent.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractDiffGap
    limitations:
      - Missing schema prevents only the affected evidence projection from making stronger claims.
      - Schema gaps are not evidence that endpoints, DTOs, properties, methods, or attachments are absent.

  - id: api.dto.contract.diff.selector.v1
    name: API/DTO contract diff selector handling
    description: Emits selector no-match and ignored-selector metadata for API/DTO contract diff queries.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractDiffGap
    limitations:
      - Selector no-match reflects indexed static evidence only.
      - Dynamic routes, generated contracts, reduced coverage, unavailable attachment evidence, or unsupported adapter metadata can hide otherwise relevant evidence.

  - id: api.dto.contract.diff.truncation.v1
    name: API/DTO contract diff truncation
    description: Emits gaps when API/DTO contract diff row or gap caps truncate deterministic output.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractDiffGap
    limitations:
      - Truncated reports are incomplete by construction and must not be interpreted as comprehensive.
      - Omitted counts and retained rows are deterministic for selected scopes and caps, but not evidence of lower importance.

  - id: package.upgrade.impact.v1
    name: Package upgrade static impact report
    description: Matches package-delta.v1 changes against indexed PackageReferenced/package-config static evidence in single or combined TraceMap indexes.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - PackageImpactFinding
      - PackageImpactGap
    limitations:
      - Package findings are static package declaration evidence only and do not prove package restore, installed versions, transitive dependency resolution, runtime loading, deployment, or API compatibility.
      - Lockfile, import/usage, and package-call evidence is adapter-dependent and is only included when deterministic package identity facts with documented limitations exist.
      - Version values are descriptive and safely rendered or hashed; TraceMap does not interpret semantic versioning, changelog impact, or compatibility.
      - Missing package evidence under reduced coverage is an analysis gap, not proof that a package is absent.
      - Exact package-name matching can miss aliases, relocated packages, shaded dependencies, generated manifests, imported build files, and dynamically declared dependencies.
      - No vulnerability database, registry, changelog, license, LLM, embedding, vector, or prompt-based analysis is used.
