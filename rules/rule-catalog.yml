rules:
  - id: explorer.input.unsupported-schema.v1
    name: Static HTML explorer unsupported input schema
    description: Records generated artifacts that the local static HTML evidence explorer discovered but cannot safely parse in the current implementation slice.
    evidenceTier: Tier4Unknown
    emits:
      - explorer generation gap
      - unsupported artifact row
    limitations:
      - Unsupported input gaps describe explorer compatibility only and do not prove that the artifact lacks evidence.
      - The explorer must not merge unsupported generated artifacts silently or render raw unsupported content.

  - id: explorer.input.provenance-conflict.v1
    name: Static HTML explorer provenance conflict
    description: Records commit, source identity, schema, or claim-level conflicts between generated artifacts selected for the same explorer output.
    evidenceTier: Tier4Unknown
    emits:
      - explorer generation gap
      - partial section label
    limitations:
      - Provenance conflicts make affected explorer sections partial or unavailable; they do not prove source changes, runtime impact, or evidence absence.
      - Conflict rows must identify the conflict kind using safe artifact IDs or closed labels rather than raw paths, remotes, hosts, or private names.
      - PR 1 records commit conflicts with a closed gapKind; claim-level weakening, schema mismatch, and identity mismatch subtypes are deferred and must remain explicit limitations until implemented.

  - id: explorer.input.missing-commit.v1
    name: Static HTML explorer missing commit metadata
    description: Records missing, unknown, or unusable commit SHA metadata in generated TraceMap artifacts used by the explorer.
    evidenceTier: Tier4Unknown
    emits:
      - explorer source identity gap
      - partial coverage label
    limitations:
      - Missing commit metadata limits provenance and history-completeness language but does not prove source changes are present or absent.
      - The explorer may surface safe commit SHA values when available, but it must not expose raw remotes, local paths, or private repository names.

  - id: explorer.render.redacted-display-value.v1
    name: Static HTML explorer redacted display value
    description: Records unsafe or non-public display values that were replaced with safe hashes, stable IDs, or closed placeholders before explorer rendering.
    evidenceTier: Tier4Unknown
    emits:
      - explorer redaction row
      - safe display value
    limitations:
      - Redacted values preserve safety and provenance shape but may reduce human readability and must not be interpreted as concrete source identities.
      - Redaction rows do not authorize publishing raw snippets, raw SQL, config values, remotes, endpoint addresses, hostnames, secrets, or local absolute paths.

  - id: explorer.render.omitted-unsafe-value.v1
    name: Static HTML explorer omitted unsafe value
    description: Records unsafe values or categories omitted from explorer visible UI, embedded data, downloadable data, or generated README output.
    evidenceTier: Tier4Unknown
    emits:
      - explorer omission count
      - explorer limitation or gap
    limitations:
      - Omitted unsafe values make affected sections partial and must not be treated as evidence that no source behavior exists.
      - Omission diagnostics must report rule ID, safe category, and generated artifact scope without printing the unsafe raw value.
      - PR 1 intentionally omits raw fact property values and raw scan manifest identity fields; raw SQL property classification beyond existing unsafe categories is deferred.

  - id: explorer.render.catalog-unavailable.v1
    name: Static HTML explorer rule catalog unavailable
    description: Records that a compatible rule catalog artifact was unavailable, so the explorer can show observed rule IDs and built-in explorer rule stubs only.
    evidenceTier: Tier4Unknown
    emits:
      - explorer rule catalog gap
    limitations:
      - Catalog-unavailable gaps affect rule descriptions and limitations only; they do not delete or strengthen underlying evidence rows.
      - The explorer must continue showing rule IDs from evidence rows even when full catalog metadata is unavailable.

  - id: explorer.render.no-network-assets.v1
    name: Static HTML explorer local no-network assets
    description: Documents that the generated explorer uses bundled local HTML, CSS, JavaScript, and data files with no remote scripts, fonts, images, stylesheets, telemetry, or service calls.
    evidenceTier: Tier2Structural
    emits:
      - explorer validation result
      - bundled asset metadata
    limitations:
      - No-network validation covers generated explorer assets and does not prove anything about the scanned repository's runtime behavior.
      - Generated assets must fail validation or omit features rather than falling back to remote assets.

  - id: explorer.render.partial-section.v1
    name: Static HTML explorer partial section
    description: Marks explorer sections as partial, unavailable, not provided, or unsupported when compatible generated artifacts are missing or intentionally not rendered in the current slice.
    evidenceTier: Tier4Unknown
    emits:
      - explorer generation gap
      - partial section label
    limitations:
      - Partial sections are compatibility and coverage labels, not proof of evidence absence or runtime safety.
      - The explorer must distinguish not-provided, unsupported, and no-evidence-under-credible-coverage states when enough input metadata is available.

  - id: explorer.render.section-status.v1
    name: Static HTML explorer section status
    description: Records deterministic section availability labels derived from compatible generated artifacts, safe view models, and rule-backed explorer gaps.
    evidenceTier: Tier4Unknown
    emits:
      - explorer section status row
      - generated coverage table row
    limitations:
      - Section status rows describe explorer rendering coverage only and do not prove runtime behavior, source reachability, production use, or absence of evidence outside compatible inputs.
      - First-slice not-rendered or not-provided labels must stay visibly partial and must not be converted into no-evidence conclusions.
      - Support IDs must use stable artifact IDs, rule IDs, or generated data paths rather than raw source paths, remotes, hostnames, or private repository names.

  - id: explorer.validation.generated-file-stale.v1
    name: Static HTML explorer stale generated file guard
    description: Prevents overwriting stale or unverified generated explorer files without explicit operator intent.
    evidenceTier: Tier4Unknown
    emits:
      - explorer validation failure
    limitations:
      - Generated-file validation protects output directories only and does not validate scanner or reducer conclusions.
      - Failure messages must use generated artifact paths and rule IDs without printing unsafe source values.

  - id: explorer.validation.user-file-collision.v1
    name: Static HTML explorer user file collision guard
    description: Prevents overwriting user-authored files in the requested explorer output directory.
    evidenceTier: Tier4Unknown
    emits:
      - explorer validation failure
    limitations:
      - Collision validation is an output safety guard and does not prove anything about input artifact quality.
      - Force options may replace TraceMap-generated explorer output, but must not silently overwrite user-authored files.

  - id: explorer.validation.unsafe-value-rejected.v1
    name: Static HTML explorer unsafe generated value rejected
    description: Fails explorer generation when post-render safety validation finds unsafe material in HTML, CSS, JavaScript, JSON data, manifest, README, metadata, or generated paths.
    evidenceTier: Tier4Unknown
    emits:
      - explorer validation failure
    limitations:
      - Safety rejection proves only that generated explorer output failed the selected safety profile; it does not classify source code behavior.
      - Rejection diagnostics must identify the safety rule and generated artifact location without printing the unsafe raw value.

  - id: message.surface.publish.v1
    name: Static message publisher surface
    description: Records deterministic static publish, send, produce, or enqueue evidence for broker-backed or external message surfaces when a safe destination identity is visible.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MessagePublisherSurface
    limitations:
      - Publisher evidence is static only and does not prove broker connectivity, runtime delivery, topic existence, production traffic, retries, ordering, auth, retention, dead-letter behavior, deployment reachability, or payload compatibility.
      - Individual publisher facts may carry Tier1Semantic or Tier2Structural source evidence when available, but the catalog rule is capped at Tier3SyntaxOrTextual because v1 includes syntax fallback extraction.
      - Dynamic, ambiguous, wildcard, unsafe, or unsupported destinations must emit message.surface.gap.v1 AnalysisGap evidence instead of guessed concrete destinations.

  - id: message.surface.consume.v1
    name: Static message consumer surface
    description: Records deterministic static consume, subscribe, receive, handler, or trigger evidence for broker-backed or external message surfaces when a safe destination identity is visible.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MessageConsumerSurface
    limitations:
      - Consumer evidence is static only and does not prove live subscriptions, consumer liveness, runtime delivery, broker topology, production traffic, auth, ordering, retries, retention, dead-letter behavior, or payload compatibility.
      - Individual consumer facts may carry Tier1Semantic or Tier2Structural source evidence when available, but the catalog rule is capped at Tier3SyntaxOrTextual because v1 includes syntax fallback extraction.
      - In-process mediator or notification patterns are excluded from broker-backed message surfaces in v1.

  - id: message.surface.binding.v1
    name: Static message binding declaration
    description: Records deterministic static binding, declaration, attribute, or config evidence for message destinations that is not by itself a publisher or consumer claim.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MessageBindingDeclared
    limitations:
      - Binding evidence does not prove runtime binding creation, broker topology, deployment reachability, permissions, traffic, delivery, subscription activity, or payload compatibility.
      - Individual binding facts may carry Tier2Structural source evidence for framework/config patterns, but the catalog rule is capped at Tier3SyntaxOrTextual because v1 includes syntax fallback extraction.
      - Binding-only evidence remains visible as a surface row when identity is safe and otherwise becomes an explicit message gap.

  - id: message.surface.identity.v1
    name: Message destination identity normalization
    description: Normalizes safe static queue, topic, subscription, exchange, stream, event, and channel identities and hashes unsafe raw destination values with full lowercase SHA-256.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - message destination identity metadata
    limitations:
      - Identity normalization does not expand environment interpolation, expression languages, reflection, runtime variables, wildcard subscriptions, pattern topics, or broker aliases.
      - Identity metadata may be derived from Tier2Structural or Tier3SyntaxOrTextual source evidence, but the catalog rule is capped at Tier3SyntaxOrTextual because v1 preserves safe static strings and hashes unsupported values.
      - Rendered reports may show shortened hash prefixes, but persisted destinationHash values and stable-key inputs use full 64-character lowercase SHA-256.

  - id: message.surface.combine.v1
    name: Combined message surface projection
    description: Projects message publisher, consumer, and binding facts into combined dependency surface summaries and safe report rows.
    evidenceTier: Tier4Unknown
    emits:
      - combined message surface row
    limitations:
      - Combined projection preserves static source evidence only and does not prove runtime delivery, topology, traffic, compatibility, or deployment reachability.
      - Projected rows preserve the source message fact evidence tier in row metadata, but the projection rule itself is Tier4Unknown because it does not independently prove source behavior.
      - Hashed, dynamic, ambiguous, unsafe, reduced-coverage, or syntax-only rows remain review-tier context.

  - id: message.surface.candidate-edge.v1
    name: Static message publish-consume candidate edge
    description: Adds report-level async candidate edge rows when publisher and consumer message surfaces share the same safe static destination identity.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - message-publish-consume
    limitations:
      - Candidate edges are static destination-level evidence only; they are not call edges and do not prove runtime delivery, subscription topology, consumer liveness, ordering, exactly-once behavior, or payload compatibility.
      - Candidate edge rows preserve the weakest supporting message evidence tier in row metadata, but the catalog rule is capped at Tier3SyntaxOrTextual because v1 can be derived from syntax fallback message facts.
      - Dynamic, hashed, ambiguous, or unsafe omitted identities do not create candidate edges in v1.

  - id: message.surface.paths.v1
    name: Message surfaces in path and reverse selectors
    description: Allows message surface kinds to participate as terminal dependency surfaces in path and reverse queries where existing graph evidence reaches the surface fact.
    evidenceTier: Tier4Unknown
    emits:
      - paths message surface node
      - reverse message selected surface
    limitations:
      - Path and reverse evidence is bounded static graph evidence only; it does not prove runtime ordering, delivery, broker routing, consumer liveness, branch feasibility, or request/response behavior.
      - Path and reverse rows preserve attached source evidence tiers in row metadata, but this selector rule is Tier4Unknown because reachability context depends on graph completeness.
      - Direction filtering is limited to explicit message surface directions publish, consume, bind, and declare; it filters static surface evidence only and does not prove runtime broker flow.

  - id: message.surface.reducer.v1
    name: Message context for reducer workflows
    description: Documents how reducer workflows may use message surfaces as conservative context when stable destination, handler, publisher, DTO, package, config, or bounded path evidence exists.
    evidenceTier: Tier4Unknown
    emits:
      - reducer message context
    limitations:
      - Message context does not prove payload compatibility, deserialization success, schema compatibility, runtime consumer breakage, topology, traffic, or deployment reachability.
      - Reducer findings must preserve their supporting evidence tiers separately; this context rule is Tier4Unknown because it documents conservative use of message evidence rather than proving impact by itself.
      - Name-only, syntax-only, dynamic, hashed, ambiguous, generic, or high-fan-out evidence must downgrade to review-needed or gap-aware classifications.

  - id: message.surface.gap.v1
    name: Message surface analysis gap
    description: Records unsupported, dynamic, wildcard, ambiguous, unsafe, missing destination, or reduced-coverage message-surface evidence as AnalysisGap facts.
    evidenceTier: Tier4Unknown
    emits:
      - AnalysisGap
    limitations:
      - Gap facts preserve uncertainty and must not be read as evidence that no publisher, consumer, binding, route, topology, or runtime delivery exists.
      - Gap reasons include dynamic-destination, wildcard-pattern-destination, missing-destination-identity, unsupported-framework, unsafe-omitted, ambiguous-destination, and direction-filter-not-supported.

  - id: review.priority.component.v1
    name: Deterministic review priority component
    description: Emits ordinal-only review-priority components over already-built report rows such as release-review findings, gaps, and checklist items while preserving source classifications and rule IDs.
    evidenceTier: Tier4Unknown
    emits:
      - review priority component
      - review priority row
    limitations:
      - Review priority is deterministic static review prioritization only; it is not runtime risk prediction, release approval, vulnerability scanning, compliance, business criticality, production impact, or AI judgment.
      - V1 emits ordinal severityHint and attentionLevel values only; priorityScore and componentValue remain null and no numeric weights, bands, learned tuning, or environment-specific scoring are used.
      - Components preserve supporting report evidence tiers in component metadata, but the component rule itself is Tier4Unknown because it is prioritization metadata rather than source-code proof.
      - Components may raise review attention only from existing TraceMap evidence such as classifications, evidence tiers, public-surface sections, bounded path or reverse context, source counts, and checklist provenance.
      - V1 component kinds include report_aggregation, static_change_evidence, evidence_tier_strength, public_surface, cross_repo_reach, path_context, reverse_context, checklist_attention, no_actionable_evidence, and analysis_gap where the release-review row or gap supplies matching evidence.
      - The fan_out component kind is reserved for a follow-up release-review slice with explicit deterministic fan-out inputs; v1 does not infer fan-out from row count or source count alone.

  - id: review.priority.aggregate.v1
    name: Deterministic review priority aggregation
    description: Aggregates row-level review-priority components into closed-vocabulary severityHint and attentionLevel values with deterministic ordering and visible completeness limits.
    evidenceTier: Tier4Unknown
    emits:
      - review priority summary
      - review priority ordering
    limitations:
      - Aggregation preserves underlying report classifications and cannot relabel a source row into a stronger product conclusion.
      - Aggregation components may be derived from Tier2Structural or Tier4Unknown source evidence, but the aggregate rule itself is capped at Tier4Unknown because completeness gaps can make the report-level priority incomplete.
      - Unknown, unavailable, reduced, or truncated evidence can make report-level priority incomplete or unknown; low attention is emitted only under credible coverage for the requested evidence.
      - Tie-breaking is deterministic by completeness, severity, source classification, evidence tier, source label, section, stable safe path or line span, and stable row ID.

  - id: review.priority.downgrade.v1
    name: Review priority downgrade and cap
    description: Emits visible cap or downgrade components when evidence quality prevents a stronger ordinal review-priority hint.
    evidenceTier: Tier4Unknown
    emits:
      - review priority downgrade component
      - review priority cap component
    limitations:
      - Tier3, syntax-only, textual, hash-only, ambiguous, duplicate, name-only, fallback, coverage-relative, and noisy fan-out evidence is capped at review-tier priority unless separate documented non-noisy evidence supports a stronger hint.
      - Downgrade components may be triggered by Tier3SyntaxOrTextual or Tier4Unknown source evidence, but the downgrade rule itself is capped at Tier4Unknown because it records evidence-quality limits rather than source-code proof.
      - Downgrades do not delete positive evidence; the positive component and cap component must remain visible together.

  - id: review.priority.coverage.v1
    name: Review priority coverage limitation
    description: Records reduced or coverage-relative analysis as a scoring cap or unknown component rather than clean absence or high-confidence change evidence.
    evidenceTier: Tier4Unknown
    emits:
      - review priority coverage component
    limitations:
      - Reduced before coverage makes newly observed after evidence coverage-relative rather than definite new risk.
      - Reduced after coverage makes missing after evidence coverage-relative rather than definite removal.
      - Coverage gaps preserve uncertainty and do not prove absence of source behavior or low review attention.

  - id: review.priority.identity.v1
    name: Review priority source identity limitation
    description: Records missing, duplicated, unverified, one-sided, or conflicting source identity as a scoring cap or unknown component.
    evidenceTier: Tier4Unknown
    emits:
      - review priority identity component
    limitations:
      - Missing or conflicting source identity prevents history-completeness and cross-source comparability claims.
      - Source labels and identity hashes are static report evidence only and do not infer ownership, deployment topology, runtime coupling, or business reach.

  - id: review.priority.commit.v1
    name: Review priority commit identity limitation
    description: Records missing or unknown commit SHA evidence as a scoring gap for rows or reports that depend on before/after history comparison.
    evidenceTier: Tier4Unknown
    emits:
      - review priority commit component
    limitations:
      - Unknown commit SHA limits history-completeness language and must not be treated as a clean comparable snapshot.
      - Commit gaps do not prove source changes are present or absent.

  - id: review.priority.schema.v1
    name: Review priority schema limitation
    description: Records required or optional schema availability limits carried by the underlying report workflow.
    evidenceTier: Tier4Unknown
    emits:
      - review priority schema component
    limitations:
      - Required schema gaps make affected scoring unavailable or unknown using sanitized section or table names only.
      - Optional precision schema gaps cap affected priority and do not prove absence of evidence.

  - id: review.priority.truncation.v1
    name: Review priority truncation limitation
    description: Records row, gap, checklist, path, reverse, or section cap truncation as incomplete scoring evidence.
    evidenceTier: Tier4Unknown
    emits:
      - review priority truncation component
    limitations:
      - Truncated scoring is partial and must not be read as exhaustive prioritization or evidence absence.
      - Omitted counts and cap metadata are report bounds, not source complexity or runtime behavior claims.

  - id: review.priority.workflow.v1
    name: Review priority unavailable workflow limitation
    description: Records requested or represented report sections that are unavailable or deferred as explicit scoring uncertainty.
    evidenceTier: Tier4Unknown
    emits:
      - review priority unavailable-workflow component
    limitations:
      - Deferred or unavailable workflow sections are not treated as low priority or no evidence.
      - The component describes static report workflow availability only and does not infer source behavior, deployment readiness, or release safety.

  - id: review.priority.selector.v1
    name: Review priority selector outcome
    description: Records selector no-match, ignored-selector, ambiguity, or unsafe-selector outcomes for review-priority scoring.
    evidenceTier: Tier4Unknown
    emits:
      - review priority selector component
    limitations:
      - Selector no-match is informational only under credible requested coverage and identity.
      - Selector no-match under reduced, unknown, or unavailable coverage remains uncertain and does not prove absence of evidence.

  - id: docs-export.chunk.source-overview.v1
    name: Docs export source overview chunk
    description: Packages indexed source identity, commit, coverage, build, language, extractor, artifact, gap, and limitation metadata into deterministic evidence documentation.
    evidenceTier: Tier2Structural
    emits:
      - docs-export source-overview chunk
    limitations:
      - Source overview chunks summarize static index metadata only; they do not prove runtime behavior, deployment, release approval, ownership, traffic, vulnerability status, service reachability, or business impact.
      - Unknown commit identity, reduced coverage, failed build status, or schema gaps remain visible gaps and must not be upgraded by documentation export.

  - id: docs-export.chunk.endpoint.v1
    name: Docs export endpoint chunk
    description: Packages existing HTTP route, HTTP client, route template, dynamic selector, and endpoint-alignment evidence into deterministic citation-bearing chunks.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export endpoint chunk
    limitations:
      - Endpoint chunks preserve static evidence only and do not prove runtime routing, service reachability, production traffic, authorization, deployment, or ownership.
      - Raw URLs, hosts, query strings, endpoint addresses, snippets, and credentials are omitted, redacted, or rejected by docs-export safety gates.

  - id: docs-export.chunk.route-flow.v1
    name: Docs export route-flow chunk
    description: Packages existing route-flow or compatible path report evidence into static route-centered documentation chunks.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export route-flow chunk
    limitations:
      - Route-flow chunks do not prove runtime request execution, branch feasibility, dependency-injection target selection, database execution, production traffic, or service reachability.
      - Missing stable report IDs, selector gaps, schema gaps, truncation, and reduced coverage remain gaps.

  - id: docs-export.chunk.property-flow.v1
    name: Docs export property-flow chunk
    description: Packages existing property/value-origin facts and report rows into deterministic documentation chunks.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export property-flow chunk
    limitations:
      - Property-flow chunks do not prove full taint, runtime values, object identity, collection contents, callback execution, serializer behavior, or branch feasibility.
      - Syntax-only, fallback, ambiguous, reduced-coverage, and high-fan-out evidence is preserved at its weaker tier.

  - id: docs-export.chunk.dependency-surface.v1
    name: Docs export dependency-surface chunk
    description: Packages existing dependency surface evidence such as calls, object creation, HTTP, persistence, package, config, event, and message evidence into documentation chunks.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export dependency-surface chunk
    limitations:
      - Dependency-surface chunks do not prove runtime topology, compatibility, vulnerability status, ownership, service reachability, deployment, production usage, or business impact.
      - Unsafe surface values are omitted, redacted, or rejected by safety validation.

  - id: docs-export.chunk.data-surface.v1
    name: Docs export data-surface chunk
    description: Packages existing data, legacy data model descriptor, project, file, build, and structural surface evidence into deterministic documentation chunks.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export data-surface chunk
    limitations:
      - Data-surface chunks describe static evidence availability and do not prove runtime data access, database existence, production data, ownership, or deployment.
      - Legacy data descriptor chunks cite static metadata and projection rules only; they do not prove SQL execution, provider runtime selection, live schema existence, migrations, or production database usage.

  - id: docs-export.chunk.package-config.v1
    name: Docs export package and config chunk
    description: Packages existing package, target-framework, config key, and config surface metadata using safe identifiers or redaction records.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export package-config chunk
    limitations:
      - Package/config chunks do not prove package compatibility, vulnerability status, license status, runtime loading, deployment, or production configuration.
      - Raw config values, connection strings, secrets, raw URLs, and credentials are forbidden.

  - id: docs-export.chunk.query-sql-shape.v1
    name: Docs export query and SQL-shape chunk
    description: Packages existing query-shape, SQL-shape, persistence, table, column, source-kind, operation, and safe-hash metadata.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export query-sql-shape chunk
    limitations:
      - Query/SQL-shape chunks do not prove SQL execution, database existence, query correctness, production usage, or data sensitivity.
      - Raw SQL and production data are rejected or omitted.

  - id: docs-export.chunk.legacy.v1
    name: Docs export legacy evidence chunk
    description: Packages existing WebForms, WinForms, WCF, service-reference, ASMX/SOAP, remoting, legacy data, build diagnostic, baseline, or evidence-pack metadata.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export legacy chunk
    limitations:
      - Legacy chunks do not prove runtime UI events, service reachability, deployment, branch feasibility, SQL execution, traffic, or production behavior.
      - Unsafe service URLs, SOAP actions, schemas, config values, remotes, snippets, and local paths are omitted, redacted, or rejected.

  - id: docs-export.chunk.release-review.v1
    name: Docs export release-review chunk
    description: Packages existing release-review report sections, checklist provenance, static classifications, gaps, and limitations into deterministic chunks.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export release-review chunk
    limitations:
      - Release-review chunks are static evidence packets and are not release approval, merge approval, risk acceptance, vulnerability conclusions, or business-impact decisions.

  - id: docs-export.chunk.impact-summary.v1
    name: Docs export impact-summary chunk
    description: Packages existing static impact or reducer summaries while preserving underlying rule IDs, tiers, classifications, gaps, and limitations.
    evidenceTier: Inherits weakest supporting evidence tier
    emits:
      - docs-export impact-summary chunk
    limitations:
      - Impact-summary chunks preserve static classifications only and do not prove business impact, runtime impact, deployment impact, or release safety.

  - id: docs-export.chunk.gap.v1
    name: Docs export gap chunk
    description: Emits first-class gap chunks for unavailable, reduced, hidden, incompatible, unsupported, truncated, or missing-provenance evidence.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export gap chunk
    limitations:
      - Gap chunks preserve uncertainty and must not be read as absence findings or source behavior conclusions.

  - id: docs-export.chunk.limitation.v1
    name: Docs export limitation chunk
    description: Emits first-class limitation chunks for rule, schema, safety, claim-level, generated-file, and external-ingestion boundaries.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export limitation chunk
    limitations:
      - Limitation chunks document boundaries only and do not add evidence about source behavior.

  - id: docs-export.validation.generated-file-stale.v1
    name: Docs export stale generated file validation
    description: Rejects stale, hand-edited, malformed, or hash-invalid generated docs-export files unless force is supplied and all non-overridable safety gates pass.
    evidenceTier: Tier4Unknown
    emits:
      - generated-file stale diagnostic
    limitations:
      - This validation protects generated output integrity only; it does not prove anything about source code behavior.

  - id: docs-export.validation.user-file-collision.v1
    name: Docs export user-file collision validation
    description: Rejects non-generated files or directories that would be overwritten by docs-export output.
    evidenceTier: Tier4Unknown
    emits:
      - user-file collision diagnostic
    limitations:
      - Force does not bypass user-file collisions.
      - Diagnostics are sanitized and do not echo unsafe file contents.

  - id: docs-export.validation.unsafe-value-rejected.v1
    name: Docs export unsafe value rejection
    description: Rejects local paths, raw remotes, raw SQL, raw config values, connection strings, URLs, endpoint addresses, credentials, tokens, snippets, private identifiers, production data, stack traces, and unsafe Markdown in generated output.
    evidenceTier: Tier4Unknown
    emits:
      - unsafe-value validation diagnostic
    limitations:
      - Diagnostics identify category and output-relative location only; they do not echo the unsafe value.

  - id: docs-export.validation.prohibited-claim-wording.v1
    name: Docs export prohibited claim wording validation
    description: Rejects generated wording that claims unsupported runtime execution, production traffic, release approval, vulnerability, ownership, deployment, reachability, or business impact.
    evidenceTier: Tier4Unknown
    emits:
      - prohibited-claim wording diagnostic
    limitations:
      - Boundary and limitation text may name prohibited domains when clearly negating or scoping the claim.

  - id: docs-export.gap.schema-incompatible.v1
    name: Docs export schema compatibility gap
    description: Records when an input cannot be read through a documented TraceMap index, report, vault, evidence-pack, or claim-catalog schema.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export schema-incompatible gap
    limitations:
      - Schema gaps describe export compatibility only and do not prove evidence absence.

  - id: docs-export.gap.claim-level-hidden.v1
    name: Docs export hidden claim-level gap
    description: Records when requested demo/public filtering omits hidden evidence or cannot be satisfied by stable source identity proof.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export claim-level-hidden gap
    limitations:
      - Display names alone cannot promote evidence.
      - Hidden claim-level gaps are safety records, not source behavior conclusions.

  - id: docs-export.gap.claim-level-unmatched.v1
    name: Docs export unmatched claim catalog gap
    description: Records source-claim catalog entries that do not match a stable source identity in supplied evidence.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export claim-level-unmatched gap
    limitations:
      - Unmatched catalog entries do not promote evidence and do not prove absence.

  - id: docs-export.gap.hidden-evidence-omitted.v1
    name: Docs export hidden evidence omission gap
    description: Records when explicit claim-level filtering removes hidden chunks, citations, metadata, links, gaps, or summaries that affect interpretation.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export hidden-evidence-omitted gap
    limitations:
      - Filtered outputs are partial; summary counts are not evidence substitutes.

  - id: docs-export.gap.duplicate-stable-identity.v1
    name: Docs export duplicate stable identity gap
    description: Records chunk identity collisions so docs export does not choose an arbitrary winner.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export duplicate-stable-identity gap
    limitations:
      - Duplicate identity gaps may omit unsafe details and retain only category-level diagnostics.

  - id: docs-export.gap.unsupported-family.v1
    name: Docs export unsupported family gap
    description: Records requested chunk families that are supported by the CLI vocabulary but unavailable or unsupported for the supplied input schema.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export unsupported-family gap
    limitations:
      - Unsupported-family gaps describe exporter/input compatibility only; they do not prove source evidence absence.

  - id: docs-export.gap.unsupported-question-family.v1
    name: Docs export unsupported question-family gap
    description: Records additive question-oriented docs-export views that cannot be generated from the supplied input schema without synthesizing unsupported evidence.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export unsupported-question-family gap
    limitations:
      - Unsupported question-family gaps apply only to additive presentation views such as snapshot-change, weak-evidence, gap, or limitation views; unsupported canonical CLI chunk families remain covered by docs-export.gap.unsupported-family.v1.
      - The gap describes exporter/input compatibility only and does not prove source evidence absence or runtime behavior.

  - id: docs-export.gap.missing-provenance.v1
    name: Docs export missing provenance gap
    description: Records missing stable fact, edge, report, file-span, source, or commit provenance required for stable chunk identity or citation.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export missing-provenance gap
    limitations:
      - Missing provenance prevents stronger documentation claims and does not prove absence.

  - id: docs-export.gap.unknown-analysis.v1
    name: Docs export unknown analysis gap
    description: Records reduced coverage, unknown commit identity, truncation, selector gaps, extractor unavailability, dynamic boundaries, serializer boundaries, reflection boundaries, generated-code boundaries, or other analysis gaps carried into docs export.
    evidenceTier: Tier4Unknown
    emits:
      - docs-export unknown-analysis gap
    limitations:
      - Unknown-analysis gaps preserve uncertainty and do not prove no evidence or no impact.

  - id: property-flow.root.v1
    name: Property flow selected root
    description: Records deterministic selected root rows for UI field, control, binding, model, DTO, symbol, or fact selectors over a combined index.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - property-flow selected root row
    limitations:
      - Selected roots are static evidence anchors; they do not prove runtime UI visibility, submission, authorization, feature-flag state, or production use.
      - Generic or ambiguous names such as id, name, value, state, or status remain review-tier unless narrowed by source, type, symbol, or fact identity.
      - Root rows preserve source fact rule IDs and tiers; derived root classification does not replace source evidence.

  - id: property-flow.edge.v1
    name: Property flow derived edge
    description: Records deterministic report-time lineage edges derived from available combined facts and path graph evidence.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - property-flow edge row
      - property-flow root-to-graph gap
      - route-flow no-property-context gap
    limitations:
      - Derived edges are bounded static composition and do not prove runtime mutation, callback execution, dependency-injection target selection, reflection behavior, serializer configuration, branch feasibility, or SQL execution.
      - Syntax-only and same-name edges are review-tier unless a stronger rule-backed source fact supports the hop.
      - Missing edges are analysis gaps under reduced coverage, not proof that no lineage exists.
      - Route-flow context is additive only when tied to the selected property through rule-backed value-origin, payload, model-binding, assignment, mapping, or equivalent property-specific evidence.

  - id: property-flow.path.v1
    name: Property flow static path classification
    description: Classifies bounded property-lineage paths as strong, probable, or needs-review static evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - property-flow path row
    limitations:
      - Path classifications are evidence-strength labels, not model judgment and not runtime proof.
      - A path does not prove a field is rendered, visible to every user, submitted, validated successfully, persisted, executed in production, or authorized.
      - Dynamic UI, callbacks, async boundaries, mutation, runtime DI, serializer behavior, reflection, and branch feasibility can downgrade or stop traversal.

  - id: property-flow.selector.v1
    name: Property flow selector result
    description: Records selector parsing, no-match, ambiguity, and unsafe-selector outcomes for property-flow queries.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - selector no-match gap
      - ambiguous selector gap
      - unsafe selector rejection
    limitations:
      - Selector matching is deterministic and coverage-relative; no match does not prove absence when contributing evidence is reduced or unsupported.
      - Unsafe selector diagnostics are sanitized and must not echo local paths, raw URLs, snippets, secrets, credentials, connection strings, or private values.

  - id: property-flow.coverage.v1
    name: Property flow coverage conclusion
    description: Records coverage-relative no-lineage or unknown-analysis conclusions for property-flow reports.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - no-lineage evidence gap
      - reduced coverage gap
    limitations:
      - Reduced coverage, unknown commit identity, failed build, missing optional evidence, or source analysis gaps prevent clean absence conclusions.
      - No-lineage evidence is scoped to available deterministic static evidence and does not prove a property is unused, unsubmitted, unmapped, unvalidated, or not persisted at runtime.

  - id: property-flow.schema.v1
    name: Property flow schema availability
    description: Records required and optional combined-index schema availability for property-flow.
    evidenceTier: Tier4Unknown
    emits:
      - missing required schema rejection
      - missing optional schema gap
      - route-flow unavailable gap
      - unsupported route-flow schema gap
    limitations:
      - Schema gaps describe evidence availability only; they do not prove source behavior or source evidence absence.
      - Missing optional route-flow schema prevents route-flow-specific promotion but does not discard existing combined path evidence.
      - Unsupported route-flow schema means property-flow could not find the normalized route key contract it needs for route-flow-specific context; it does not prove route-flow evidence is absent.

  - id: property-flow.truncation.v1
    name: Property flow truncation
    description: Records deterministic root, path, depth, frontier, inventory, or gap cap truncation.
    evidenceTier: Tier4Unknown
    emits:
      - truncation gap
    limitations:
      - Truncated reports are partial and must not be read as exhaustive lineage or absence evidence.
      - Caps are report bounds, not evidence about repository complexity or runtime behavior.

  - id: property-flow.observed-evidence.v1
    name: Property flow optional observed evidence boundary
    description: Reserved rule for optional browser/computer-use observed evidence metadata that may accompany property-flow reports.
    evidenceTier: Tier4Unknown
    emits:
      - observed evidence metadata row
      - observed evidence discrepancy gap
    limitations:
      - Observed DOM/browser metadata is demo validation metadata only and cannot upgrade static lineage classifications by itself.
      - Workflows requiring credentials, production login, private data capture, live secret-bearing HTTP, or captured secrets are rejected for public/default artifacts.

  - id: typescript.angular.template-binding.v1
    name: Angular template binding evidence
    description: Extracts safe Angular interpolation, property binding, and two-way binding property-path metadata from checked-in templates and inline component templates.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - UiTemplateBinding
      - UiBindingGap
    limitations:
      - Template binding evidence does not prove runtime rendering, visibility, change-detection outcome, user access, submitted values, handler execution, auth, role, feature-flag state, or production use.
      - Function calls, pipes, bracket notation, dynamic property names, unsupported directive semantics, and ambiguous expressions are gaps or review-tier evidence.
      - Raw template snippets are not stored; expression hashes and safe property paths are stored instead.

  - id: typescript.angular.form-binding.v1
    name: Angular form binding evidence
    description: Extracts safe Angular form-control metadata such as formControlName, formGroup/formArrayName, template-driven name/ngModel controls, and control names.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - UiFormControlBinding
      - UiBindingGap
    limitations:
      - Form-control evidence is static structure only and does not prove a value is submitted, enabled, visible, validated, or reachable in every runtime state.
      - Same-name control/property links remain review-tier unless value-origin or assignment facts support the hop.

  - id: typescript.angular.event-binding.v1
    name: Angular event binding evidence
    description: Extracts safe Angular event-binding metadata and static handler names when visible in templates.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - UiEventBinding
      - UiBindingGap
    limitations:
      - Event binding evidence does not prove runtime event firing, handler execution, browser state, authorization, or branch feasibility.
      - Dynamic handler expressions and unsupported callback semantics are gaps or review-tier evidence.

  - id: typescript.angular.template-variable.v1
    name: Angular template variable evidence
    description: Extracts safe Angular template variable names and export aliases where statically visible.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - UiTemplateVariable
    limitations:
      - Template variables are syntax-visible evidence and do not by themselves prove property identity, runtime rendering, directive semantics, or submitted values.

  - id: typescript.angular.binding-gap.v1
    name: Angular binding analysis gap
    description: Records unsupported or dynamic Angular template expressions encountered by the template binding extractor.
    evidenceTier: Tier4Unknown
    emits:
      - UiBindingGap
    limitations:
      - Binding gaps identify unsupported static analysis boundaries only; they do not prove that a field, binding, event, or property is absent.
      - Diagnostics store expression hashes and category labels, not raw snippets or unsafe literal values.

  - id: csharp.razor.binding.v1
    name: Razor binding evidence
    description: Extracts safe Razor asp-for and Html.*For model-property binding metadata from checked-in .cshtml files.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - RazorBinding
      - RazorBindingGap
    limitations:
      - Razor binding evidence does not prove runtime rendering, route selection, model-binding success, auth, role visibility, feature flags, validation outcome, or browser submission.
      - Dynamic models, ViewBag/ViewData, partial templates, custom tag helpers, and generated Razor uncertainty remain gaps or review-tier evidence.

  - id: csharp.razor.form-target.v1
    name: Razor form target evidence
    description: Extracts safe static Razor form target metadata from asp-action, asp-controller, asp-page, asp-page-handler, and method attributes.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - RazorFormTarget
    limitations:
      - Form target evidence is static markup metadata and does not prove runtime routing, handler execution, antiforgery behavior, auth, model binding success, or submitted values.
      - Page paths and unsafe target-like values are hashed or omitted rather than rendered raw.

  - id: csharp.razor.model-binding.v1
    name: Razor model-binding target evidence
    description: Reserved rule for static Razor Pages/MVC model-binding target evidence such as handlers, action parameters, BindProperty, FromBody, and FromForm metadata.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - RazorModelBindingTarget
    limitations:
      - Model-binding target evidence does not prove runtime binding success, serializer behavior, validation outcome, route selection, auth, or branch feasibility.
      - Convention-only or syntax-only model-binding evidence remains review-tier unless semantic facts support the link.
      - Convention-based ViewModel/InputModel/FormModel type-name matching emits review-tier RazorModelBindingTarget facts for matching type properties without requiring a proven route, action parameter, handler parameter, or model directive.
      - Syntax fallback only expands action and handler parameter types declared in the same syntax file; unresolved cross-file parameter types emit RazorBindingGap facts instead of hidden target winners.
      - Duplicate simple type names in the same syntax file are treated as ambiguous for parameter property expansion and emit RazorBindingGap facts instead of merging properties across candidate types.

  - id: csharp.razor.binding-gap.v1
    name: Razor binding analysis gap
    description: Records dynamic Razor model/view-data/partial/template constructs that prevent precise static field/property lineage.
    evidenceTier: Tier4Unknown
    emits:
      - RazorBindingGap
    limitations:
      - Razor binding gaps are static analysis boundaries and do not prove that a binding, form, handler, or model property is absent.
      - Diagnostics are sanitized and must not render source snippets, raw form values, raw URLs, local paths, secrets, or private data.

  - id: vault-export.gap.schema-incompatible.v1
    name: Vault export schema compatibility gap
    description: Records when a vault export input cannot be read through a documented combined-index, paths-report, reverse-report, or claim-catalog schema.
    evidenceTier: Tier4Unknown
    emits:
      - vault export schema gap
    limitations:
      - Schema gaps describe export compatibility only; they do not prove that source evidence is absent.
      - Diagnostics are category-based and must not echo local paths, raw report internals, SQL/config values, snippets, remotes, or secrets.

  - id: vault-export.gap.claim-level-hidden.v1
    name: Vault export hidden claim-level gap
    description: Records when requested demo/public filtering cannot be satisfied by stable source identity proof.
    evidenceTier: Tier4Unknown
    emits:
      - hidden claim-level gap
    limitations:
      - Hidden claim-level gaps are safety gates, not conclusions about repository behavior or business impact.
      - Display names alone cannot promote source evidence; stable source identity proof is required.

  - id: vault-export.gap.claim-level-unmatched.v1
    name: Vault export unmatched claim catalog entry
    description: Records reviewed claim catalog entries that do not match a stable source identity in the supplied evidence.
    evidenceTier: Tier4Unknown
    emits:
      - unmatched claim catalog gap
    limitations:
      - Unmatched catalog entries do not promote evidence and do not prove the referenced source is absent from other artifacts.
      - The emitted diagnostic is sanitized and does not render the unmatched raw catalog value.

  - id: vault-export.gap.hidden-evidence-omitted.v1
    name: Vault export hidden evidence omission gap
    description: Records when explicit claim-level filtering omits hidden nodes or edges from a generated vault.
    evidenceTier: Tier4Unknown
    emits:
      - hidden evidence omission gap
    limitations:
      - Omission gaps make filtered graph interpretation partial; summary counts are not evidence substitutes.
      - The gap does not identify hidden source labels, file paths, endpoints, symbols, SQL, config values, snippets, or remotes.

  - id: vault-export.gap.duplicate-stable-identity.v1
    name: Vault export duplicate stable identity gap
    description: Reserved rule for duplicate or ambiguous vault export node or edge identities.
    evidenceTier: Tier4Unknown
    emits:
      - duplicate stable identity gap
    limitations:
      - Duplicate identity gaps prevent arbitrary merging and do not choose a winner.
      - The exporter may omit unsafe duplicate details and retain only category-level diagnostics.

  - id: vault-export.gap.unsafe-symbol-omitted.v1
    name: Vault export unsafe symbol gap
    description: Records when symbol evidence is category-labeled or omitted because source identity is hidden or symbol display is not safe to expose.
    evidenceTier: Tier4Unknown
    emits:
      - unsafe symbol gap
    limitations:
      - Symbol safety gaps are redaction decisions and do not prove the symbol is unreachable, unused, or impacted.
      - Private namespaces and source-derived identifiers are not rendered without explicit demo/public proof.

  - id: vault-export.validation.generated-file-stale.v1
    name: Vault export generated file stale validation
    description: Validates generated Markdown and graph manifests using TraceMap sentinels and deterministic content hashes.
    evidenceTier: Tier4Unknown
    emits:
      - stale generated file rejection
    limitations:
      - Stale-file validation protects generated output integrity; it does not validate source repository completeness.
      - The `--force` option may replace stale generated files only after all other safety validations pass.

  - id: vault-export.validation.user-file-collision.v1
    name: Vault export user file collision validation
    description: Rejects overwriting non-generated user-authored files in a vault export directory.
    evidenceTier: Tier4Unknown
    emits:
      - user file collision rejection
    limitations:
      - Collision diagnostics are path-category based and must not leak local absolute output paths.
      - User-authored notes are never overwritten by this validation rule.

  - id: vault-export.validation.unsafe-value-rejected.v1
    name: Vault export unsafe value validation
    description: Rejects generated Markdown or graph JSON string leaves that contain unsafe local paths, remotes, SQL/config values, endpoint URLs, credentials, snippets, diagnostics, or secret-like values.
    evidenceTier: Tier4Unknown
    emits:
      - unsafe value rejection
    limitations:
      - Redaction validation is conservative and may require category labels or reviewed claim metadata.
      - Rejection diagnostics include category and location only; they must not echo the unsafe value.

  - id: vault-export.gap.hidden-safe-context-omitted.v1
    name: Vault export hidden safe-context limitation
    description: Records when hidden/local vault output keeps a bounded safe-context value that contains a sensitive word only for local navigation.
    evidenceTier: Tier4Unknown
    emits:
      - hidden safe-context limitation
    limitations:
      - Hidden safe-context handling preserves local navigation evidence only; it does not prove the value is public-safe or demo-safe.
      - Public-safe and demo-safe vault exports still reject or filter the same sensitive-word values unless separately reviewed and promoted.
      - Gap diagnostics use categories and stable IDs only; they must not echo raw secrets, local absolute paths, remotes, URLs, SQL, snippets, or credentials.

  - id: vault-export.gap.unsafe-id-component-omitted.v1
    name: Vault export unsafe stable identity component gap
    description: Records when a vault graph node or edge is omitted because a source-derived component failed safety validation before stable ID construction.
    evidenceTier: Tier4Unknown
    emits:
      - unsafe stable identity component omission gap
    limitations:
      - The gap proves only that TraceMap refused to construct an output identity from an unsafe component; it does not prove the omitted code is unreachable or unimportant.
      - Diagnostics include only a closed category and safe output scope; raw values, local absolute paths, remotes, URLs, SQL, snippets, and credentials are never rendered.

  - id: public.demo.summary.v1
    name: Public demo summary section
    description: Records public demo workflow section status, coverage labels, artifact references, and deterministic counts produced by checked-in validation scripts.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - demo summary section row
    limitations:
      - Demo summary rows describe validation workflow status and generated artifact availability; they are not scanner facts and do not prove runtime execution, deployment, production traffic, release approval, vulnerability, or compatibility.
      - Deferred, unavailable, and failed sections are explicit analysis gaps and remain Tier4Unknown.
      - Artifact paths are output-root-relative and public-shareable summaries must not render local absolute paths, raw SQL, source snippets, raw secrets, or credential-bearing URLs.

  - id: legacy.validation.summary.v1
    name: Legacy codebase validation summary
    description: Records local-only validation summary rows for operator-provided old or large .NET codebases using neutral sample labels and deterministic counts.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - legacy validation summary row
      - redaction failure category
    limitations:
      - Validation samples are operator-provided local inputs and are not committed fixtures.
      - Summary rows intentionally omit local absolute paths, raw remotes, private repository names, raw SQL, config values, connection strings, source snippets, and secrets.
      - Public claim level remains hidden until a redacted summary is reviewed and intentionally promoted.

  - id: legacy.validation.environment.v1
    name: Legacy environment evidence probe
    description: Summarizes static project/config indicators such as target frameworks, old-style project files, packages.config, binding redirects, and MSBuild ToolsVersion values.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - legacy environment indicator count
      - legacy environment limitation
    limitations:
      - Environment indicators are static clues, not guaranteed remediation instructions.
      - Missing SDK/runtime/build-tool guidance is evidence-backed only when surfaced by scan artifacts or project/config indicators.
      - Failed project load is reduced coverage and must not be treated as a clean scan.

  - id: legacy.validation.ui-events.v1
    name: Legacy UI event static evidence probe
    description: Summarizes whether current facts expose WinForms/WebForms-style event wiring, handler-like symbols, call edges, or dependency surfaces without rendering source snippets.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - UI event evidence summary
      - UI event evidence gap
    limitations:
      - Static wiring evidence does not prove that a control exists at runtime, that a handler executes, that a user can reach the event, or that backend behavior occurred.
      - No event evidence is a scanner evidence gap, not proof that legacy UI events are absent.
      - Syntax/text matches remain review-tier evidence when semantic call or dependency facts cannot establish a chain.

  - id: legacy.validation.bounds.v1
    name: Legacy validation bounds and truncation
    description: Records local validation timeout, output-size, artifact-existence, and bounded-failure outcomes for old or large repositories.
    evidenceTier: Tier4Unknown
    emits:
      - timeout/deferred limitation
      - artifact-size limitation
      - missing artifact limitation
    limitations:
      - Timeout and artifact-size truncation make the validation result partial.
      - Output-size and duration limits are validation harness bounds, not repository complexity conclusions.
      - Bounded failure preserves available evidence but must not be interpreted as complete scan coverage.

  - id: legacy.sample-smoke-catalog.entry.v1
    name: Legacy sample smoke catalog entry
    description: Validates neutral legacy sample catalog rows with safe sample labels, claim levels, source classification, pinned identity category, and documented limitations.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - catalog entry validation row
      - duplicate label rejection
    limitations:
      - Catalog entries describe expected static evidence families and do not replace scan evidence, evidence packs, baselines, or reducer findings.
      - Hidden, private, local, or unreviewed samples cannot support public claims through catalog metadata alone.
      - Validation failures are sanitized categories and pointers; unsafe planted values are not echoed.

  - id: legacy.sample-smoke-catalog.source-identity.v1
    name: Legacy sample smoke catalog source identity
    description: Validates source classification, safe aliases, tracked commit identity kind, reviewed public SHA rules, fixture versions, and category-only SHA presence flags.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - source identity validation row
      - claim-level cap rejection
      - tracked commit identity rejection
    limitations:
      - Private, local, unknown, or category-only identities stay redacted and are not hashed into tracked output.
      - Public SHA values are allowed only for reviewed public repository or archive sources.
      - Fixture versions are deterministic catalog pins, not source-control remotes.

  - id: legacy.sample-smoke-catalog.family-expectation.v1
    name: Legacy sample smoke catalog family expectation
    description: Validates closed evidence family IDs, expected exact rule IDs, evidence tiers, coverage labels, extractor IDs or gap codes, allowed states, and family limitations.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - family expectation validation row
      - unknown family or rule rejection
    limitations:
      - Family expectations are smoke coverage targets and do not prove feature absence when unsupported, deferred, reduced, truncated, or blocked by an analysis gap.
      - Syntax fallback expectations remain review-tier unless a separate semantic extractor emits compiler-resolved evidence.
      - Large-repository expectations use timeout and artifact-size buckets rather than raw file lists or identifying counts.

  - id: legacy.sample-smoke-catalog.validation-command.v1
    name: Legacy sample smoke catalog validation command
    description: Validates sanitized validation command templates, placeholders, command modes, closed command input kinds, expected artifact classes, gates, timeout buckets, and artifact-size buckets.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - validation command template row
      - unsafe command template rejection
    limitations:
      - Command templates show reproducible shape only; operator-specific paths, labels, branches, remotes, dates, and artifact identifiers must use placeholders.
      - Literal option values are limited to fixed booleans and documented closed vocabularies.
      - Operator-local commands remain hidden unless reviewed public or demo-safe substitutes exist.

  - id: legacy.sample-smoke-catalog.relationship.v1
    name: Legacy sample smoke catalog relationship
    description: Validates safe references to related legacy validation, baseline, comparison, and evidence-pack summaries using schema names, neutral artifact IDs, claim levels, and validation status.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - relationship validation row
      - raw artifact reference rejection
    limitations:
      - Relationship rows do not copy raw artifacts, raw summaries, raw baselines, raw evidence packs, analyzer logs, SQLite indexes, reports, or file lists.
      - Deferred references coordinate future workflows and cannot serve as public-safe proof by themselves.
      - Relationship validation does not require sibling schemas or artifacts to exist in the current checkout.

  - id: legacy.sample-smoke-catalog.safety-validation.v1
    name: Legacy sample smoke catalog safety validation
    description: Validates catalog redaction, prohibited claim wording, deterministic canonical JSON, generated Markdown hash sentinels, top-level claim floor, tracked-root promotion, and ignored local scratch boundaries.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - redaction validation row
      - generated Markdown sentinel rejection
      - tracked-root rejection
    limitations:
      - Safety validation is a catalog metadata gate and does not inspect raw sample repositories or raw scan outputs.
      - Redaction scanning is conservative and may require operators to recast identity-bearing values as categories or placeholders.
      - Deterministic hashes are used only for catalog JSON generation and stale Markdown detection, not for private or source-derived secret-like values.

  - id: legacy.wcf.config.v1
    name: Legacy WCF serviceModel config evidence
    description: Extracts WCF client and service endpoint declarations from local config files using safe endpoint metadata and hashed addresses.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - WcfClientEndpointDeclared
      - WcfServiceEndpointDeclared
      - AnalysisGap
    limitations:
      - Endpoint config is static evidence and does not prove deployment, reachability, service activation, DNS, authentication, authorization, binding compatibility, or runtime endpoint selection.
      - Endpoint addresses are hashed or omitted; raw addresses and config values are not rendered.
      - Config transforms, environment-specific overrides, and dynamically selected endpoints are not evaluated.

  - id: legacy.wcf.contract.v1
    name: Legacy WCF service contract and generated client evidence
    description: Extracts service contract, operation contract, and generated service-client declarations from C# syntax and generated-code patterns.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WcfServiceContractDeclared
      - WcfOperationContractDeclared
      - WcfGeneratedClientDeclared
      - AnalysisGap
    limitations:
      - Syntax-only contract evidence does not prove WSDL compatibility, generated proxy freshness, service deployment, or runtime invocation.
      - Generated-client detection requires WCF ClientBase-style inheritance and can miss custom proxies or nonstandard generated clients.
      - Missing generated files or unsupported service-reference shapes are analysis gaps, not proof that no service dependency exists.

  - id: legacy.wcf.host.v1
    name: Legacy WCF service host evidence
    description: Extracts safe WCF ServiceHost declarations from .svc directive-style files. Older indexes may contain historical ASMX WebService directive evidence under WcfServiceHostDeclared; new indexes use legacy.asmx.host.v1 for .asmx hosts.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - WcfServiceHostDeclared
      - AnalysisGap
    limitations:
      - Host declarations are static file evidence and do not prove IIS configuration, deployment, route reachability, service activation, or runtime factory behavior.
      - Malformed or unsupported host declarations are emitted as gaps rather than absence of service evidence.
      - Historical ASMX-under-WCF rows require a migration limitation and must not be interpreted as clean ASMX absence in older indexes.

  - id: legacy.wcf.metadata.v1
    name: Legacy WCF checked-in metadata evidence
    description: Extracts safe service-reference metadata and WSDL portType operation declarations from checked-in .svcmap, gated .wsdl, .disco, and .xsd files.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - WcfServiceReferenceMetadataDeclared
      - WcfMetadataOperationDeclared
      - AnalysisGap
    limitations:
      - Checked-in service-reference metadata is static design-time evidence and does not prove runtime reachability, deployment, service activation, generated proxy freshness, service version compatibility, authorization, or binding compatibility.
      - TraceMap does not fetch remote WSDL, DISCO, schema imports, service URLs, or endpoint addresses.
      - Raw URLs, SOAP actions, schema locations, namespace URIs, local absolute paths, raw schemas, and source snippets are hashed or omitted.
      - WSDL/DISCO/XSD inventory is gated to service-reference folders or files co-located with .svcmap metadata to avoid unrelated schemas and vendor specifications.
      - Malformed or rejected XML is emitted as `MalformedWcfMetadata` rather than treated as clean absence of metadata.

  - id: legacy.wcf.operation-normalization.v1
    name: Legacy WCF operation name normalization
    description: Applies conservative deterministic generated-client operation aliases such as FooAsync to Foo and BeginFoo/EndFoo to Foo when WCF evidence corroborates the alias.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WcfServiceReferenceMapping
      - AnalysisGap
    limitations:
      - Normalization is case-sensitive deterministic name handling only; it does not use fuzzy matching, edit distance, stemming, prompts, embeddings, LLM calls, or runtime service behavior.
      - Async suffix aliases require WCF-generated client evidence and corroboration from connected checked-in WSDL metadata, a same-contract sync sibling, or an aligned service operation.
      - Begin/End aliases require both members on the same generated client or operation contract; lone Begin or End methods are not normalized.
      - Lifecycle methods such as Open, Close, Abort, Dispose, OpenAsync, CloseAsync, and Begin/End lifecycle pairs are excluded unless an exact metadata operation is explicitly present.

  - id: legacy.wcf.mapping.v1
    name: Legacy WCF service-reference mapping evidence
    description: Emits probable static mappings from generated service-client methods to service operation contracts when method names, checked-in metadata, normalization, and config/contract metadata align.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WcfServiceReferenceMapping
      - AnalysisGap
    limitations:
      - Mappings are static evidence and do not prove runtime execution, endpoint reachability, generated proxy freshness, or backend implementation selection.
      - Name-only and generated-code-only normalized matches remain review-tier evidence.
      - Metadata-backed normalized mappings require generated client contract, normalized operation name, connected WSDL operation metadata, and service contract evidence; a random repository-level WSDL operation name is not sufficient.
      - Without aligned config endpoint evidence, metadata-backed mappings are capped at Tier3SyntaxOrTextual even when supporting metadata is Tier2Structural.
      - Multiple matching endpoints, hosts, contracts, metadata identities, or distinct logical operations are ambiguity gaps/review-tier evidence; TraceMap does not choose an arbitrary winner.

  - id: legacy.asmx.host.v1
    name: Legacy ASMX host directive evidence
    description: Extracts checked-in .asmx WebService directive candidates with safe service class, language, and code-behind metadata.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - AsmxHostDeclared
      - AnalysisGap
    limitations:
      - ASMX host declarations are static checked-in file evidence only and do not prove ASP.NET hosting, IIS configuration, route availability, deployment, service activation, SOAP execution, authentication, authorization, reachability, or impact.
      - Directive values that are paths, URLs, config-like values, unsupported expressions, credentials, tokens, or unsafe text are reduced to safe basenames, omitted, or represented by context-separated non-secret hashes where allowed; raw snippets are not stored.
      - Malformed, missing, generated, or unsupported directives are emitted as AnalysisGap rows rather than clean absence.

  - id: legacy.asmx.service.v1
    name: Legacy ASMX service class evidence
    description: Extracts C# ASMX/SOAP service class attributes such as WebService, WebServiceBinding, ScriptService, SoapDocumentService, and SoapRpcService.
    evidenceTier: Tier1Semantic, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - AsmxServiceClassDeclared
      - AnalysisGap
    limitations:
      - Service class evidence is static attribute evidence only and does not prove service activation, WSDL compatibility, endpoint deployment, runtime calls, authorization, or impact.
      - Syntax-only rows are review-tier because aliases, project-defined lookalike attributes, inactive build configurations, and unresolved framework references can reduce confidence without semantic resolution.
      - Comments, string literals, XML docs, arbitrary source text, and disabled preprocessor regions are not ASMX service evidence.

  - id: legacy.asmx.operation.v1
    name: Legacy ASMX and SOAP operation evidence
    description: Extracts C# WebMethod declarations and SOAP operation-shape attributes such as SoapDocumentMethod and SoapRpcMethod while keeping public operation and SOAP binding evidence distinct.
    evidenceTier: Tier1Semantic, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - AsmxOperationDeclared
      - AsmxSoapOperationDeclared
      - AnalysisGap
    limitations:
      - Operation rows are static declarations only and do not prove a SOAP request was sent, a method is reachable, a binding is compatible, auth succeeds, endpoint configuration is selected, deployment exists, or runtime impact occurred.
      - SOAP action, namespace, binding, endpoint, config, credential, token, local path, and source-snippet values are hashed or omitted; credential-like values are omitted rather than hashed.
      - Syntax-only rows remain review-tier when compiler symbols cannot disambiguate framework attributes from aliases or project-defined lookalikes.

  - id: legacy.asmx.client.v1
    name: Legacy ASMX generated SOAP client evidence
    description: Extracts generated SOAP proxy/client classes and operations from SoapHttpClientProtocol inheritance, generated web-reference files, SOAP method attributes, and Invoke/BeginInvoke/EndInvoke wrapper patterns.
    evidenceTier: Tier1Semantic, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - AsmxGeneratedClientDeclared
      - AsmxClientOperationDeclared
      - AnalysisGap
    limitations:
      - Generated client evidence is static proxy-shape evidence only and does not prove runtime endpoint selection, generated proxy freshness, service reachability, deployment, authentication, authorization, or impact.
      - Dynamic proxy factories, runtime URL assignment, custom base classes, unsupported generated formats, and missing checked-in metadata are gaps or review-tier evidence.
      - Raw endpoint addresses, SOAP actions, config values, namespaces, local paths, source snippets, credentials, and tokens are omitted or hashed according to ASMX redaction rules.

  - id: legacy.asmx.metadata.v1
    name: Legacy ASMX checked-in SOAP metadata evidence
    description: Extracts safe structural evidence from checked-in ASMX/SOAP web-reference metadata such as WSDL, DISCO, DISCOMAP, and proxy map files when owned by old Web References-style paths.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - AsmxProxyMetadataDeclared
      - AnalysisGap
    limitations:
      - Metadata rows describe checked-in design-time metadata only; TraceMap does not fetch remote WSDL, follow external imports, resolve schemas, activate services, or prove runtime reachability.
      - .svcmap-gated WCF service-reference metadata remains WCF-owned; ambiguous generic .map or source-map files are ignored or emitted as gaps rather than duplicated across families.
      - Endpoint addresses, SOAP actions, target namespaces, import locations, schema locations, hostnames, local paths, raw XML snippets, credentials, and tokens are omitted or represented by context-separated non-secret hashes where allowed; credential-like values are omitted.

  - id: legacy.asmx.config.v1
    name: Legacy ASMX/SOAP config evidence
    description: Extracts ASMX/SOAP-relevant checked-in config structures such as system.web/webServices and generated proxy URL appSettings keys with sanitized values.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - AsmxConfigDeclared
      - AnalysisGap
    limitations:
      - Config rows are checked-in static configuration evidence only and do not prove transform selection, machine.config state, runtime mutation, endpoint reachability, credential validity, or impact.
      - Credentials, tokens, connection strings, secret-like values, local operator paths, raw endpoint URLs, and raw config values are omitted; allowed non-secret endpoint-ish values may be context-hashed.
      - Config evidence can support review-tier mapping only when aligned with static proxy or metadata identifiers; hash equality alone does not prove client-to-server reachability.

  - id: legacy.asmx.mapping.v1
    name: Legacy ASMX service-reference mapping evidence
    description: Emits probable static generated SOAP client-to-ASMX operation mappings when operation names, checked-in metadata, or service operation declarations align without ambiguity.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AsmxServiceReferenceMapping
      - AnalysisGap
    limitations:
      - Mappings are probable static evidence only and do not prove SOAP request execution, endpoint selection, deployment, reachability, authorization, generated proxy freshness, or backend impact.
      - Name-only or metadata-backed mappings without stronger semantic/config evidence remain review-tier and are capped by the weakest required evidence leg.
      - Duplicate operation candidates, missing metadata, dynamic proxy factories, and ambiguous service-reference ownership emit gaps rather than choosing an arbitrary backend.

  - id: legacy.remoting.api.v1
    name: Legacy .NET Remoting API evidence
    description: Extracts System.Runtime.Remoting namespace imports, fully-qualified references, and known Remoting API type references from C# syntax and compiler-resolved symbols when available.
    evidenceTier: Tier1Semantic, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - RemotingApiUsageDeclared
      - AnalysisGap
    limitations:
      - API usage is static reference evidence only and does not prove service hosting, activation, runtime reachability, deployment, network availability, exploitability, security posture, or production usage.
      - Syntax-only evidence is capped at review-tier because aliases, using-static forms, and project-defined lookalike names may be ambiguous without compiler symbols.
      - Comments, string literals, XML doc text, and inactive preprocessor regions are not Remoting evidence.
      - Unsupported Remoting API shapes are emitted as gaps or omitted rather than guessed.

  - id: legacy.remoting.marshal-by-ref.v1
    name: Legacy .NET Remoting MarshalByRefObject evidence
    description: Extracts classes that directly inherit from MarshalByRefObject and preserves safe object-shape metadata for Remoting-capable boundary candidates.
    evidenceTier: Tier1Semantic, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - RemotingMarshalByRefObjectDeclared
      - AnalysisGap
    limitations:
      - MarshalByRefObject inheritance is object-shape evidence only; it does not prove hosting, registration, activation, object lifetime, runtime reachability, deployment, network availability, exploitability, security posture, or production usage.
      - Indirect inheritance is not promoted without Remoting-specific repository, file, registration, or config context because broad framework and desktop types can inherit from MarshalByRefObject.
      - Syntax-only base-list evidence may be ambiguous with aliases or project-defined lookalikes.
      - Generated-code status is recorded only when existing safe file-name detection supports it; unsupported generated-code shapes remain unclaimed.

  - id: legacy.remoting.channel.v1
    name: Legacy .NET Remoting channel evidence
    description: Extracts TcpChannel, HttpChannel, IpcChannel, server/client channel variants, and ChannelServices.RegisterChannel calls from C# syntax with narrow deterministic construction-to-registration linking.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - RemotingChannelDeclared
      - RemotingChannelRegistered
      - AnalysisGap
    limitations:
      - Channel construction and registration are static code evidence only and do not prove runtime channel opening, endpoint reachability, deployment, network availability, exploitability, security posture, or production usage.
      - Constructor arguments, ports, URLs, names, provider values, config-backed values, and arbitrary channel properties are hashed or omitted.
      - V1 links only inline construction and same-method single unreassigned local registrations; fields, properties, factories, dependency injection, reflection, branches, collections, and cross-method flows remain gaps or independent review-tier facts.

  - id: legacy.remoting.registration.v1
    name: Legacy .NET Remoting registration and activation evidence
    description: Extracts RemotingConfiguration registration/configure calls and gated Activator.GetObject client activation evidence.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - RemotingServiceTypeRegistered
      - RemotingClientTypeRegistered
      - RemotingClientActivationDeclared
      - RemotingApiUsageDeclared
      - AnalysisGap
    limitations:
      - Registration and activation calls are static evidence only and do not prove service availability, endpoint reachability, deployment, network availability, exploitability, security posture, or production usage.
      - URLs, object URIs, config file values, arbitrary strings, ports, local paths, remotes, source snippets, and secret-looking values are hashed or omitted.
      - Dynamic target types, dynamic modes, overload ambiguity, reflection, factory helpers, and unsupported activated-registration argument extraction reduce coverage.
      - Activator.GetObject is promoted only with same-file Remoting context or compiler-resolved MarshalByRefObject evidence; otherwise it remains a review gap.

  - id: legacy.remoting.config.v1
    name: Legacy .NET Remoting config evidence
    description: Extracts checked-in system.runtime.remoting XML sections, channels, service/client declarations, and providers using safe XML parsing and hashed config values.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - RemotingConfigSectionDeclared
      - RemotingConfigChannelDeclared
      - RemotingConfigServiceDeclared
      - RemotingConfigClientDeclared
      - RemotingConfigProviderDeclared
      - AnalysisGap
    limitations:
      - Config evidence is checked-in XML only and does not prove config transform selection, machine.config contents, deployment, runtime mutation, service availability, network reachability, exploitability, security posture, or production usage.
      - URLs, object URIs, application names, ports, provider properties, channel names, arbitrary config values, local paths, remotes, source snippets, and secret-looking values are hashed or omitted.
      - External includes, encrypted sections, malformed XML, unsupported custom sections, and unresolved transforms are reduced-coverage gaps rather than clean absence.

  - id: legacy.data.metadata.inventory.v1
    name: Legacy data metadata inventory
    description: Inventories checked-in DBML, EDMX, typed DataSet XSD, TableAdapter, generated designer, config, and old ORM descriptor files with safe static metadata.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataMetadataDeclared
      - AnalysisGap
    limitations:
      - Metadata inventory is static repository evidence and does not prove runtime data access, database existence, provider compatibility, deployment, or production usage.
      - Arbitrary XSD files are gated; unrelated schemas are not treated as typed DataSet metadata.
      - Malformed, unsupported, too-large, or parser-rejected metadata is emitted as an analysis gap rather than clean absence.
      - Safe properties include metadataKind, metadataHash, inventoryKind, repo-relative path, coverage, and limitation.
      - Raw SQL, connection strings, config values, URLs, remotes, local absolute paths, source snippets, and secrets are hashed or omitted.

  - id: legacy.data.dbml.v1
    name: Legacy LINQ to SQL DBML metadata
    description: Extracts safe DBML entity, table, column, association, and routine descriptor evidence from checked-in metadata.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataEntityDeclared
      - LegacyDataStorageObjectDeclared
      - LegacyDataColumnDeclared
      - LegacyDataMappingDeclared
      - AnalysisGap
    limitations:
      - DBML metadata is static design-time evidence and does not prove database existence, LINQ runtime behavior, routine existence, lazy loading, query execution, or provider compatibility.
      - Generated-code linkage is separate evidence and does not upgrade metadata descriptor tier.
      - Safe reducer-facing properties include entityName, typeName, tableName, storageObjectName, propertyName, fieldName, columnName, mappingKind, and hash variants for unsafe identifiers.
      - Unsafe names, provider metadata, database names, connection names, and routine identifiers are hashed or omitted when required.

  - id: legacy.data.edmx.v1
    name: Legacy Entity Framework EDMX metadata
    description: Extracts safe CSDL, SSDL, and unambiguous MSL entity/storage/property mapping evidence from checked-in EDMX metadata.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataEntityDeclared
      - LegacyDataStorageObjectDeclared
      - LegacyDataColumnDeclared
      - LegacyDataMappingDeclared
      - AnalysisGap
    limitations:
      - EDMX metadata is static design-time evidence and does not prove EF runtime model loading, lazy loading, change tracking, query execution, provider compatibility, migrations, or schema existence.
      - Complex, inherited, split, conditional, many-to-many, duplicate-container, and provider-extension mappings are gaps unless a future spec defines deterministic handling.
      - Safe reducer-facing properties include entityName, typeName, tableName, storageObjectName, propertyName, fieldName, columnName, mappingKind, and hash variants for unsafe identifiers.
      - Namespace URIs, provider details, unsafe identifiers, and raw metadata content are hashed or omitted.

  - id: legacy.data.typed-dataset.v1
    name: Legacy typed DataSet and TableAdapter metadata
    description: Extracts safe typed DataSet table/column/relation, TableAdapter, command descriptor, and complete static command-text hash/shape evidence.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataEntityDeclared
      - LegacyDataStorageObjectDeclared
      - LegacyDataColumnDeclared
      - LegacyDataMappingDeclared
      - SqlTextUsed
      - QueryPatternDetected
      - AnalysisGap
    limitations:
      - Typed DataSet metadata is static design-time evidence and does not prove adapter execution, stored-procedure existence, command reachability, SQL execution, provider compatibility, or database schema existence.
      - Raw SQL command text is never stored; complete static command text may produce only existing hash/length and safe shape evidence.
      - Safe reducer-facing properties include entityName, typeName, tableName, storageObjectName, propertyName, fieldName, columnName, mappingKind, textHash, textLength, queryShapeHash, and hash variants for unsafe identifiers.
      - Unrelated XSD files, dynamic commands, incomplete schemas, unsupported provider metadata, and stale or missing generated code remain gaps or unsupported evidence.

  - id: legacy.data.config.v1
    name: Legacy data provider and connection config metadata
    description: Extracts safe provider, connection-name, provider factory, Entity Framework provider, and ORM config metadata from checked-in config files.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyDataProviderConfigDeclared
      - AnalysisGap
    limitations:
      - Config metadata is static checked-in evidence and does not prove runtime environment selection, transform application, secret availability, provider installation, database reachability, or production usage.
      - Raw connection strings, usernames, passwords, server names, catalog names, file paths, URLs, secret-looking values, and config values are hashed or omitted.
      - Safe reducer-facing properties include configKind, connectionName, providerName, connectionNameHash, providerNameHash, valueHash, coverage, and limitation.
      - Encrypted sections, external config includes, transforms, and code-built connections are reduced-coverage gaps.

  - id: legacy.data.generated-link.v1
    name: Legacy data generated-code linkage
    description: Links DBML, EDMX, and typed DataSet metadata descriptors to checked-in generated files or compiler-resolved generated symbols when deterministic evidence exists.
    evidenceTier: Tier2Structural
    emits:
      - LegacyDataGeneratedCodeLinked
      - AnalysisGap
    limitations:
      - Generated-code linkage is static evidence and does not prove generated files are fresh, runtime code paths execute, query execution occurs, or database access happens.
      - Global short-name matching is not allowed; ambiguous or missing generated-code candidates are gaps.
      - Safe reducer-facing properties include linkKind, symbolRole, metadataFormat, stableModelKey, typeName, generatedCodeFileName, sourceMetadataFactId, supportingFactIds, coverageLabel, limitations, and hash variants for unsafe identifiers.
      - Explicit generated-file links are Tier2Structural; scoped syntax fallback rows are Tier3SyntaxOrTextual; gaps such as missing or ambiguous generated code are Tier4Unknown; future compiler-resolved semantic links require a documented implementation update.
      - Linkage tier is recorded separately and does not upgrade the descriptor tier of the metadata evidence.

  - id: legacy.data.model.identity.v1
    name: Legacy data model identity projection
    description: Documents normalized identity semantics for legacy data model descriptors derived from existing DBML, EDMX, typed DataSet, TableAdapter, generated-code, or old ORM source evidence.
    evidenceTier: Tier2Structural
    emits:
      - AnalysisGap
    limitations:
      - This rule owns derived identity semantics and availability gaps; existing DBML, EDMX, typed DataSet, config, and generated-link source facts keep their source rule IDs.
      - Model identities are static checked-in metadata evidence and do not prove runtime data access, query execution, database schema existence, generated-code freshness, deployment, provider compatibility, lazy loading, change tracking, migrations, or production usage.
      - Descriptor conclusions are capped at the weakest supporting source evidence and are not upgraded by generated-code linkage.
      - Descriptor tier ceilings are enforced; Tier1Semantic generated-code links do not upgrade Tier2Structural metadata descriptor facts or downstream classifications by themselves.
      - Safe properties include modelKind, metadataFormat, descriptorRole, stableModelKey, safe display labels or hashes, sourceMetadataFactId, supportingFactIds, coverageLabel, and limitation codes.
      - Ambiguous, duplicate, unsupported, reduced-coverage, malformed, parser-rejected, or too-large metadata is emitted as a gap rather than an inferred identity.
      - Raw SQL, source snippets, connection strings, config values, URLs, remotes, local absolute paths, schema/catalog/provider values, private labels, and secrets are hashed or omitted.

  - id: legacy.data.model.relationship.v1
    name: Legacy data model relationship projection
    description: Documents deterministic relationship semantics derived from legacy data mapping evidence while preserving source mapping rule IDs and mappingKind values.
    evidenceTier: Tier2Structural
    emits:
      - AnalysisGap
    limitations:
      - This rule owns derived relationship semantics and availability gaps; source extractors continue to emit LegacyDataMappingDeclared under their source rule IDs.
      - Relationship evidence is static descriptor metadata and does not prove database constraints, runtime navigation, lazy loading, cascade behavior, query execution, schema existence, deployment, provider compatibility, or production usage.
      - Existing source mappingKind values such as association, relation, entity-storage, property-column, adapter-command, orm-class, and orm-property remain stable; model relationship semantics are additive.
      - Bidirectional relationships require deterministic endpoints; unidirectional, ambiguous, duplicate, inherited, split, conditional, many-to-many, provider-specific, or unsupported shapes are gaps or needs-review evidence.
      - Descriptor conclusions are capped at the weakest supporting source evidence and are not upgraded by generated-code linkage.
      - Unsafe endpoint names, SQL-like text, config values, source snippets, connection strings, URLs, remotes, local absolute paths, private labels, and secrets are hashed or omitted.

  - id: legacy.data.orm.nhibernate.v1
    name: Legacy NHibernate mapping metadata
    description: Extracts safe static descriptor evidence from checked-in NHibernate hbm.xml mapping files without loading NHibernate or provider runtimes.
    evidenceTier: Tier2Structural
    emits:
      - LegacyDataMetadataDeclared
      - LegacyDataEntityDeclared
      - LegacyDataStorageObjectDeclared
      - LegacyDataColumnDeclared
      - LegacyDataMappingDeclared
      - AnalysisGap
    limitations:
      - NHibernate mapping evidence is checked-in XML metadata only and does not prove session factory loading, runtime mapping validity, lazy loading, cascade behavior, dirty tracking, query execution, database schema existence, provider compatibility, deployment, or production usage.
      - XML parsing uses the legacy data safe parser bounds and rejects DTDs, external entities, malformed input, oversized input, excessive node count, and excessive depth as reduced-coverage gaps.
      - Safe properties include metadataFormat, modelKind, descriptorRole, stableModelKey, mappingKind, modelRelationshipKind when deterministic, safe display labels or hashes, supportingFactIds, coverageLabel, and limitation codes.
      - Schema, catalog, formula, filter, SQL, query, dialect, connection, provider-specific values, raw mapping content, URLs, remotes, local absolute paths, private labels, and secrets are hashed or omitted.
      - Inheritance, joined or union subclass mappings, composite IDs, dynamic components, custom SQL, filters, named queries, custom user types, provider extensions, and ambiguous mapping shapes are gaps unless a future rule documents deterministic handling.
      - Per-class descriptor and relationship emission is capped deterministically; skipped descriptors produce too-large or truncation gaps rather than clean absence.

  - id: legacy.data.orm.unsupported.v1
    name: Unsupported legacy ORM descriptor gap
    description: Records safe gaps for recognized old ORM descriptor families outside the deterministic MVP parser scope.
    evidenceTier: Tier4Unknown
    emits:
      - AnalysisGap
    limitations:
      - Unsupported ORM evidence is a static coverage gap and does not prove data access, runtime mapping validity, query execution, database schema existence, provider compatibility, deployment, or production usage.
      - Recognized family labels are public-safe descriptors only; raw mapping content, SQL, config values, connection strings, URLs, remotes, local absolute paths, private labels, and secrets are hashed or omitted.
      - LLBLGen, SubSonic, iBATIS.NET/MyBatis.NET, Castle ActiveRecord, Fluent-only mappings, and project-local mapping DSLs remain unsupported unless a future rule defines deterministic parser behavior.
      - Project-local mapping DSLs are not detected unless they use recognized public family signals; absence of this gap is not absence of ORM metadata.
      - Unsupported descriptors produce gaps, not invented entity, table, column, relationship, or generated-code facts.

  - id: legacy.data.model.generated-link.v1
    name: Legacy data model generated-code linkage
    description: Reserves model-normalized generated-code linkage semantics for deterministic descriptor-to-symbol evidence beyond the existing source generated-link rule.
    evidenceTier: Tier1Semantic
    emits:
      - LegacyDataGeneratedCodeLinked
      - AnalysisGap
    limitations:
      - Existing generated-code linkage remains under legacy.data.generated-link.v1 unless a model-normalized link needs this distinct rule ID.
      - Linkage is static repository evidence and does not prove generated files are fresh, runtime code paths execute, database access occurs, query execution occurs, deployment, provider compatibility, or production usage.
      - Global short-name matching is not allowed; semantic links require scoped compiler-resolved symbols, structural links require scoped metadata/file evidence, and syntax fallback remains reduced coverage.
      - Syntax fallback links only ordinary namespace-qualified type names; nested generic or provider-specific type identity syntax remains unsupported unless future semantic resolution proves it.
      - Ambiguous, stale, missing, duplicate, or reduced-coverage generated-code candidates are gaps rather than arbitrary links.
      - Linkage tier is recorded separately and does not upgrade descriptor facts above their descriptor tier ceiling.
      - Safe properties include linkKind, symbolRole, metadataFormat, stableModelKey, mappedTypeName, sourceMetadataFactId, generatedCodeFileName, supportingFactIds, coverageLabel, limitations, and hash variants for unsafe identifiers; source snippets, raw paths, URLs, remotes, config values, and secrets are omitted.

  - id: legacy.data.model.surface.v1
    name: Legacy data model surface projection
    description: Owns derived legacy-data report and export surface rows for safe model descriptors and availability gaps; it is not a scan-time source fact rule.
    evidenceTier: Tier2Structural
    emits:
      - AnalysisGap
      - unknown-vocabulary schema gap
    limitations:
      - This rule projects the existing legacy-data surface kind with surfaceSubtype data-model; it does not introduce a LegacyDataModelSurfaceProjected scan fact or a parallel legacy-data-model surface kind.
      - Surface rows are static report/export context and do not prove runtime database use, query execution, schema existence, reachability, dependency impact, deployment, provider compatibility, or production usage.
      - AnalysisGap facts under legacy.data.* rules are excluded from terminal surface projection and remain gaps, caveats, or limitations.
      - Already-derived projection rows are not re-consumed by prefix-based legacy data fact readers.
      - AmbiguousLegacyDataModelSelector gaps are emitted when a downstream selector matches multiple legacy-data model surfaces and cannot identify one model without additional source or stable-evidence scope.
      - DuplicateIdentity gaps with reason duplicate-surface are emitted when downstream projection cannot distinguish duplicate stable model identities without additional evidence.
      - Unknown vocabulary values for descriptor role, metadata format, or source artifact type produce an unknown-vocabulary schema gap under this rule rather than being rendered as free-form display strings; implementations should register a narrower rule ID when a specific unknown vocabulary has a distinct gap cause.
      - Safe properties include surfaceKind, surfaceSubtype, modelKind, metadataFormat, stableSurfaceKey, safeDisplayName or hash label, sourceRuleIds, supportingFactIds, supportingEdgeIds, coverageLabel, and limitations.
      - Surface classification is capped for syntax-only, ambiguous, high fan-out, missing generated-code, unsupported, or reduced-coverage evidence.
      - Raw SQL, source snippets, connection strings, config values, URLs, remotes, local absolute paths, schema/catalog/provider values, private labels, and secrets are hashed or omitted.

  - id: legacy.webforms.inventory.v1
    name: Legacy WebForms file and page inventory
    description: Inventories WebForms markup, code-behind, designer files, directives, static server controls, and safe page linkage metadata.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WebFormsPageDeclared
      - WebFormsControlDeclared
      - AnalysisGap
    limitations:
      - Markup and file inventory are static repository evidence and do not prove IIS configuration, page activation, runtime control tree construction, event firing, deployment, or production usage.
      - Directive paths and linkage attributes are kept only as safe relative filenames or omitted; raw local paths, URLs, config values, snippets, and unsafe expressions are not stored.
      - Malformed or unreadable markup is an analysis gap, not proof that no WebForms page, control, or handler exists.

  - id: legacy.webforms.event-binding.v1
    name: Legacy WebForms markup event binding evidence
    description: Extracts supported static WebForms server-control event attributes such as OnClick, OnCommand, OnLoad, and OnInit with control IDs, handler names, and line spans.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - WebFormsEventBindingDeclared
      - AnalysisGap
    limitations:
      - Event bindings are static declarations and do not prove that a control exists at runtime, a user can reach the event, event bubbling occurs, or the handler executes.
      - Unsupported event-like attributes, dynamic wiring, generated controls, data-bound command names, and unsafe handler values are needs-review or gap evidence rather than guessed handlers.
      - Duplicate controls or duplicate bindings are preserved as separate evidence rows with deterministic IDs; TraceMap does not collapse them into a single runtime control.

  - id: legacy.webforms.handler-resolution.v1
    name: Legacy WebForms code-behind handler resolution
    description: Resolves markup event handlers to linked code-behind partial methods by semantic source-symbol evidence when available, otherwise by scoped structural or syntax fallback.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WebFormsHandlerResolved
      - AnalysisGap
    limitations:
      - Handler resolution is static evidence and does not prove runtime event execution, page lifecycle order, postback behavior, authorization, deployment, or production usage.
      - Syntax and structural fallback depend on directive/linkage and partial class names; missing builds, generated code, stale files, partial classes, overloads, and event subscriptions can reduce confidence.
      - Ambiguous methods or partial classes are emitted as gaps and TraceMap does not choose an arbitrary winner.
      - Auto-event-wireup MVP evidence is limited to Page_Load and Page_Init and requires explicit enabled evidence; false, unknown, or contradictory evidence remains Tier4Unknown.

  - id: legacy.webforms.designer-control.v1
    name: Legacy WebForms designer control field evidence
    description: Extracts designer-generated partial-class control fields and links them as supporting evidence for matching markup control IDs.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WebFormsDesignerControlDeclared
      - AnalysisGap
    limitations:
      - Designer files can be generated, missing, stale, hand-edited, or mismatched with markup; designer evidence is supporting evidence only.
      - Designer fields do not classify code as business logic and do not prove runtime control creation or page compilation.

  - id: legacy.webforms.event-flow.v1
    name: Legacy WebForms event-to-backend static flow projection
    description: Projects resolved WebForms handlers to directly connected call, WCF/service-reference, HTTP, SQL/query, config, or dependency-surface evidence while preserving supporting fact IDs and coverage labels.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WebFormsEventFlowProjected
      - AnalysisGap
    limitations:
      - Event-flow projection is static evidence and does not prove runtime event firing, branch feasibility, dynamic dispatch, delegate invocation, reflection targets, event bubbling, generated-code freshness, service reachability, SQL execution, database state, or production usage.
      - MVP projection prefers direct handler-to-evidence facts and can miss multi-hop call chains, dependency injection, reflection, generated code, unsupported frameworks, or ORM metadata.
      - Reduced semantic coverage, missing call edges, ambiguous generated clients, or unavailable terminal evidence produce partial or unknown classifications rather than clean absence claims.

  - id: legacy.webforms.logic-signal.v1
    name: Legacy WebForms static logic and UI-boilerplate signals
    description: Emits bounded deterministic handler-level signals for visible calculations, branches, service/database calls, domain object construction, and UI-only assignments or data binding.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WebFormsLogicSignalDetected
      - AnalysisGap
    limitations:
      - Logic signals are deterministic static heuristics, not proof of business logic, code quality, risk, runtime behavior, or production usage.
      - UI-boilerplate signals are lower-strength syntax evidence and do not prove that a handler is safe, irrelevant, or free of backend effects.
      - Generated code, partial methods, reflection, dynamic dispatch, branch feasibility, and indirect helper calls can hide or dilute signals.

  - id: legacy.winforms.inventory.v1
    name: Legacy WinForms file and surface inventory
    description: Inventories static WinForms form, user-control, control, component, application-context, designer, startup, and linked resource surface evidence from checked-in files.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WinFormsSurfaceDeclared
      - AnalysisGap
    limitations:
      - WinForms surface inventory is static repository evidence and does not prove runtime form creation, visibility, user reachability, authorization, deployment, or production usage.
      - Syntax and designer fallback can be reduced by failed MSBuild load, stale generated files, missing partial classes, malformed C#, duplicate type identities, or unsupported generated shapes.
      - File paths are repo-relative; raw source snippets, local absolute paths, raw remotes, resource values, config values, URLs, endpoint addresses, and secrets are omitted.

  - id: legacy.winforms.control.v1
    name: Legacy WinForms control and component evidence
    description: Extracts deterministic static WinForms control and component field/object-creation evidence from designer and code files.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WinFormsControlDeclared
      - AnalysisGap
    limitations:
      - Control/component rows do not prove runtime parentage, control-tree construction, layout, visibility, enabled state, data binding result, localization result, role gating, user access, or production usage.
      - Dynamic controls, collection lookups, factories, dependency injection, generated designer drift, and runtime state are reduced-coverage gaps rather than guessed controls.
      - Raw snippets, resource values, local absolute paths, raw remotes, endpoint values, config values, and secrets are not stored.

  - id: legacy.winforms.event-binding.v1
    name: Legacy WinForms static event binding evidence
    description: Extracts explicit static WinForms event subscriptions such as Click, grid events, BackgroundWorker callbacks, and Timer ticks from designer and code files.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WinFormsEventBindingDeclared
      - AnalysisGap
    limitations:
      - Event bindings are static declarations and do not prove that a control exists at runtime, that a user can reach the event, that a handler executes, or that backend behavior occurred.
      - Lambdas, anonymous delegates, custom brokers, reflection, dependency injection, runtime subscription, duplicate handlers, ambiguous partial classes, and unsupported subscription shapes are needs-review or gap evidence.
      - TraceMap preserves direct evidence and does not choose arbitrary winners when multiple handlers, controls, or partial classes could match.

  - id: legacy.winforms.handler-resolution.v1
    name: Legacy WinForms handler resolution
    description: Resolves static WinForms event bindings to scoped partial-class handler methods using semantic evidence when available and structural or syntax fallback when not.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WinFormsHandlerResolved
      - AnalysisGap
    limitations:
      - Handler resolution is static evidence and does not prove runtime event execution, scheduling, branch feasibility, authorization, deployment, or production usage.
      - Generated designer drift, missing partial classes, overloaded handlers, ambiguous duplicate methods, failed semantic analysis, dynamic wiring, reflection, and dependency injection can reduce confidence.
      - Handler names are scoped to visible form/control/component partial classes and are not matched globally across the repository.

  - id: legacy.winforms.navigation.v1
    name: Legacy WinForms static navigation evidence
    description: Records deterministic static Application.Run, Show, ShowDialog, owner/parent, and MDI navigation or containment evidence from checked-in C#.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WinFormsNavigationEdgeDeclared
      - AnalysisGap
    limitations:
      - Navigation rows do not prove that a form opens at runtime, that a user can reach it, that auth/role checks allow it, that the window is visible, or that navigation occurs in production.
      - Dynamic factories, dependency injection, reflection, branch gating, role/user-state checks, runtime state, duplicate candidates, and unresolved construction targets are gaps or needs-review classifications.
      - Navigation evidence remains separate from event binding, handler, call, and object-creation evidence and cites supporting IDs where available.

  - id: legacy.winforms.callback-boundary.v1
    name: Legacy WinForms callback boundary evidence
    description: Records static BackgroundWorker, timer, UI marshalling, async/delegate, and callback-boundary evidence linked to WinForms event handlers where possible.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WinFormsCallbackBoundaryDeclared
      - AnalysisGap
    limitations:
      - Callback rows do not prove scheduling, execution order, cancellation, progress semantics, thread affinity, race freedom, completion, service reachability, SQL execution, or production usage.
      - Unknown receivers, anonymous delegates, async callbacks, thread scheduling, runtime state, and reduced semantic coverage cap confidence and remain boundary-limited evidence.

  - id: legacy.winforms.handler-flow.v1
    name: Legacy WinForms handler-to-backend static flow projection
    description: Projects resolved WinForms handlers to directly connected call, object-creation, WCF, ASMX, remoting, legacy data, SQL/query, HTTP, config, or dependency-surface evidence from the same scan.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - WinFormsHandlerFlowProjected
      - AnalysisGap
    limitations:
      - Handler-flow projection is static direct evidence and does not prove runtime execution, branch feasibility, dynamic dispatch, dependency injection targets, callback ordering, service reachability, SQL execution, database existence, or production usage.
      - The projected tier is capped by the weakest required handler/path/terminal evidence; reduced semantic coverage, missing call/value-flow/backend facts, generated-code drift, reflection, and dynamic dispatch produce partial or unknown classifications.
      - Terminal names that are unsafe for cleartext are hashed using stable TraceMap digest conventions; raw SQL, endpoint addresses, config values, source snippets, local paths, remotes, and secrets are omitted.

  - id: legacy.winforms.resource-metadata.v1
    name: Legacy WinForms safe resource metadata
    description: Records conservative .resx presence, culture suffix, safe key hashes, and resource kind labels linked to WinForms surfaces when safe deterministic evidence exists.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - WinFormsResourceMetadataDeclared
      - AnalysisGap
    limitations:
      - Resource rows do not store raw strings, binary payloads, images, icons, file paths, URLs, config-looking values, secrets, localization results, runtime text, layout, or user-facing behavior.
      - DTD/entity expansion, external references, malformed XML, unsupported resource kinds, ambiguous linkage, and too-large resources are parser/security gaps rather than partial raw output.

  - id: legacy.aspnet.surface.v1
    name: Legacy ASP.NET static surface inventory
    description: Inventories classic ASP.NET application and handler files, directive metadata, and supporting designer-file gaps while reusing WebForms inventory facts for page/control/master evidence.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AspNetSurfaceDeclared
      - AnalysisGap
    limitations:
      - Surface rows are static checked-in file evidence only and do not prove IIS deployment, runtime compilation, page activation, application startup, authorization, reachability, or production usage.
      - Existing WebFormsPageDeclared, WebFormsControlDeclared, and WebFormsDesignerControlDeclared facts remain authoritative for page/control/master/event evidence; this rule does not duplicate those identities as ASP.NET surface facts.
      - Designer files are supporting identity/linkage evidence only; orphan designer files are gaps rather than standalone page, control, route, handler, or navigation surfaces.
      - Directive values are stored only as safe identifiers, safe repository-relative descriptors, context-separated hashes, or omissions; raw local paths, URLs, hostnames, snippets, remotes, config values, credentials, endpoint values, and secrets are forbidden.
      - Malformed, unreadable, generated, stale, or unsupported files are analysis gaps, not absence findings.

  - id: legacy.aspnet.route.v1
    name: Legacy ASP.NET static route registration evidence
    description: Extracts supported classic ASP.NET route registration candidates such as MapPageRoute and simple RouteCollection.Add PageRouteHandler shapes from checked-in C#.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AspNetRouteDeclared
      - AnalysisGap
    limitations:
      - Route rows are static registration candidates and do not prove route table execution, ASP.NET request matching, URL rewriting, deployment, authorization, reachability, handler selection, or runtime impact.
      - Dynamic route construction, config-backed patterns, reflection, loops over unknown data, custom route subclasses, custom route handlers, and unsupported route registration shapes are review-tier evidence or gaps, not invented endpoints.
      - Route names, patterns, defaults, constraints, data tokens, and mapped pages are stored only as safe descriptors, presence flags, context-separated hashes, or omissions.
      - Syntax-only fallback is capped below semantic confidence when compiler-resolved System.Web.Routing symbols are unavailable or coverage is reduced.

  - id: legacy.aspnet.config.v1
    name: Legacy ASP.NET checked-in config surface evidence
    description: Extracts safe structures from checked-in ASP.NET config sections for handlers, modules, pages, controls, namespaces, urlMappings, compilation, and location-scoped settings.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - AspNetConfigSurfaceDeclared
      - AnalysisGap
    limitations:
      - Config rows describe checked-in XML only and do not prove runtime transform selection, external include loading, machine.config inheritance, IIS pipeline behavior, deployment, authorization, reachability, or production configuration.
      - Raw config values, connection strings, app settings, machine keys, endpoint addresses, hostnames, local physical paths, URLs, credentials, and secret-looking values are omitted or hashed and never emitted raw.
      - Encrypted sections, external configSource/file references, transforms, custom sections, machine.config dependencies, runtime mutations, and unsupported providers are gaps.
      - Matching hashes alone cannot prove page, route, navigation, or runtime reachability.

  - id: legacy.aspnet.handler.v1
    name: Legacy ASP.NET static handler evidence
    description: Detects .ashx directives, IHttpHandler/IHttpAsyncHandler implementations, handler factories, and config-backed handler declarations as static handler surface candidates.
    evidenceTier: Tier1Semantic or Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AspNetHandlerDeclared
      - AnalysisGap
    limitations:
      - Handler rows are static declarations and do not prove request execution, factory output, pipeline ordering, authorization, deployment, reachability, or production usage.
      - Handler factories without compiler-resolved static target types remain review-tier evidence with unresolved factory target metadata.
      - Syntax fallback can confuse framework interfaces or attributes with project-defined lookalikes; ambiguous targets are capped or emitted as gaps.
      - Handler paths, class names, and config values are stored only as safe identifiers, safe descriptors, context-separated hashes, or omissions.

  - id: legacy.aspnet.page-method.v1
    name: Legacy ASP.NET PageMethod and ScriptMethod evidence
    description: Detects WebForms PageMethod, WebMethod, ScriptMethod, and ScriptService attribute evidence from checked-in C# without reclassifying it as ASMX unless independent ASMX host evidence exists.
    evidenceTier: Tier1Semantic or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AspNetPageMethodDeclared
      - AnalysisGap
    limitations:
      - PageMethod rows are static attribute evidence and do not prove AJAX execution, serialization behavior, script generation, authorization, page rendering, deployment, reachability, or runtime impact.
      - PageMethod and ScriptMethod facts remain distinct from ASMX host/operation facts unless a separate ASMX rule supplies host evidence.
      - Syntax fallback is capped for framework-attribute lookalikes, non-static methods, missing linked page evidence, generated code, partial classes, and reduced semantic coverage.
      - Raw source snippets, URLs, hostnames, remotes, config values, endpoint values, credentials, and secrets are forbidden.

  - id: legacy.aspnet.navigation.v1
    name: Legacy ASP.NET static navigation reference evidence
    description: Extracts deterministic static navigation references from markup, checked-in sitemap XML, and supported C# APIs, and emits conservative target edges only when non-hash checked-in target evidence exists.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AspNetNavigationReferenceDeclared
      - AspNetNavigationEdgeDeclared
      - AnalysisGap
    limitations:
      - Navigation rows are static reference candidates and do not prove browser behavior, JavaScript execution, data-bound menu materialization, role trimming, master-page or nested-control composition, authorization, reachability, page rendering, form posting, or runtime impact.
      - JavaScript-generated, resource-driven, data-bound, database-backed, localized, concatenated, role-filtered, runtime master/control-tree, URL-rewritten, and auth-dependent navigation stays review-tier or gap evidence.
      - Target edges require checked-in page, route, config, or handler evidence with non-hash support; route/config/navigation hash equality alone cannot synthesize an edge.
      - Raw URLs, hostnames, query strings, fragments, config values, endpoint values, local paths, remotes, snippets, credentials, and secret-looking values are hashed or omitted.

  - id: legacy.flow.input-availability.v1
    name: Legacy flow input availability
    description: Records whether legacy flow composition could read expected WebForms, API, WCF, HTTP, SQL, legacy data, call graph, parameter-forwarding, coverage, and analysis-gap evidence from an index.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - legacy flow availability gap
      - SchemaMissing gap
      - ExtractorUnavailable gap
    limitations:
      - Availability rows describe static index contents only; they do not prove that missing evidence is absent from the repository.
      - Older indexes and disabled extractors produce explicit gaps that cap absence claims.
      - Missing optional parameter-forwarding or legacy data metadata evidence must not be interpreted as clean absence of value or data paths.

  - id: legacy.flow.root-selection.v1
    name: Legacy flow static root selection
    description: Selects static legacy roots from WebForms handler resolution, supported event binding, approved auto-wireup lifecycle evidence, HTTP/API route evidence, and service facts.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - legacy flow root node
      - UnresolvedRoot gap
      - NoRootsFound gap
    limitations:
      - WebForms event and lifecycle roots are static declarations and do not prove user action, page lifecycle execution, postback state, event bubbling, deployment, authorization, or production use.
      - Name-only, syntax-only, ambiguous, missing code-behind, missing designer, and generated-code-limited roots remain review-tier or gap evidence.
      - Arbitrary method names, raw markup strings, and unsupported event-like text are not roots without rule-backed entry-point facts.

  - id: legacy.flow.static-traversal.v1
    name: Legacy flow static traversal
    description: Assembles bounded deterministic paths from selected roots through existing call, creation, symbol relationship, WCF/service-reference, HTTP, SQL/query, legacy data, dependency-surface, and optional parameter-forward evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - legacy static flow path
      - traversal truncation gap
    limitations:
      - Composed paths are static evidence, not runtime execution proof, reachability proof, production traffic, service deployment, branch feasibility, user behavior, or permission proof.
      - Call edges may miss reflection, dynamic dispatch, delegates, runtime DI, partial methods, generated code, serializer behavior, event bubbling, collection contents, and branch-dependent behavior.
      - WCF operation nodes are terminals in v1; traversal does not continue through service-side implementation or downstream service-side evidence.
      - Traversal is bounded by depth, path, and frontier limits; truncated output is partial.

  - id: legacy.flow.parameter-forward-unavailable.v1
    name: Legacy flow parameter-forwarding availability gap
    description: Records that optional parameter-forwarding evidence is unavailable because the index schema predates it or the feature was not enabled.
    evidenceTier: Tier4Unknown
    emits:
      - ParameterForwardEvidenceUnavailable gap
    limitations:
      - Missing parameter-forwarding evidence caps value-flow conclusions and does not prove that values are not forwarded.
      - Paths assembled without parameter-forwarding evidence use only available call, object, symbol, and fact evidence.

  - id: legacy.flow.classification.v1
    name: Legacy flow conservative classification
    description: Assigns StrongStaticPath, ProbableStaticPath, NeedsReviewStaticPath, NoBackendEvidence, ReducedCoverage, or AnalysisGap based on the weakest required evidence tier, coverage, ambiguity, high fan-out, and terminal evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - legacy flow classification
    limitations:
      - Syntax-only, name-only, ambiguous, generated-code-uncertain, high fan-out, or partial-terminal evidence cannot produce StrongStaticPath.
      - Reduced coverage and missing extractors produce ReducedCoverage or AnalysisGap rather than clean absence.
      - The v1 high fan-out threshold is five or more inbound candidate paths from distinct roots to one terminal identity, or generic ambiguous terminal keys such as status, id, name, value, result, or response. This conservative placeholder requires calibration against redacted legacy validation data, including false-positive and false-negative metrics by terminal kind.

  - id: legacy.flow.gap-propagation.v1
    name: Legacy flow gap propagation
    description: Propagates schema, extractor, coverage, cross-source stitching, unresolved-root, cycle, and terminal-evidence gaps into legacy flow results.
    evidenceTier: Tier4Unknown
    emits:
      - legacy flow analysis gap
      - CrossSourceStitchingUnavailable gap
      - CycleDetected gap
    limitations:
      - A propagated gap means the static composition cannot prove or disprove a path under available evidence.
      - Cross-source traversal is allowed only through explicit persisted endpoint or dependency alignment evidence.
      - Cycle pruning and bounded traversal preserve termination but may omit possible static paths.

  - id: legacy.flow.redaction.v1
    name: Legacy flow report redaction
    description: Hashes or omits unsafe display values in legacy flow Markdown and JSON outputs while preserving source fact IDs, rule IDs, tiers, and safe spans.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - legacy flow redaction note
    limitations:
      - Raw local absolute paths, private repository names, raw remotes, URLs, WSDL or SOAP addresses, raw SQL, config values, connection strings, source snippets, and secret-looking values are omitted or replaced with stable hashes.
      - Redaction can reduce readability and does not change the underlying evidence tier or classification.

  - id: legacy.flow.report.v1
    name: Legacy static flow report
    description: Writes deterministic versioned legacy-flow Markdown and JSON reports from static composed evidence.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - legacy-flow.v1 JSON report
      - legacy static flow Markdown report
    limitations:
      - Reports describe possible static paths and no-backend-evidence findings under available coverage only; absence is not proven.
      - Reports do not prove runtime execution, guaranteed backend reachability, SQL execution, database existence, service deployment, production dependency, or impact.
      - JSON schema version legacy-flow.v1 preserves stable property names; future breaking changes require a new schema version.

  - id: snapshot.diff.source.v1
    name: Snapshot diff source comparison
    description: Compares source inventory and source metadata between two TraceMap snapshots by exact source label and stable source identity metadata.
    evidenceTier: Tier2Structural
    emits:
      - source diff row
      - SourceOnlyOnOneSide gap
    limitations:
      - Source pairing is exact-label based and does not infer renamed repositories, source labels, branches, or merge ancestry.
      - Source diffs compare static scan metadata and do not prove code behavior changed.
      - Single-index snapshots use the synthetic source label `single`.

  - id: snapshot.diff.coverage.v1
    name: Snapshot diff coverage comparison
    description: Compares source-level scan coverage, build status, analysis level, known gaps, and commit SHA credibility between paired TraceMap snapshot sources.
    evidenceTier: Tier4Unknown
    emits:
      - coverage diff row
      - ReducedCoverage gap
      - UnknownCommitSha gap
    limitations:
      - Coverage is source-level unless language adapters emit more precise gap metadata.
      - Reduced coverage makes absence of evidence coverage-relative, not proof that evidence was removed.
      - Unknown commit SHAs prevent history-dependent conclusions.

  - id: snapshot.diff.evidence.v1
    name: Snapshot diff evidence comparison
    description: Carries deterministic snapshot-diff evidence rows and selector/truncation gaps for implemented static evidence sections.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - extractor version diff row
      - SelectorNoMatch gap
      - TruncatedByLimit gap
    limitations:
      - Extractor version changes describe scanner metadata only and do not prove source-code behavior changed.
      - Selector gaps describe the current static evidence and query bounds only.
      - Truncated output is intentionally partial and must not be treated as complete evidence coverage.

  - id: snapshot.diff.identity.v1
    name: Snapshot diff source identity validation
    description: Validates comparable source identity for snapshot diffs and emits review-tier or unknown gaps when identity is missing, partial, or conflicting.
    evidenceTier: Tier4Unknown
    emits:
      - SourceIdentityConflict gap
      - SourceOnlyOnOneSide gap
    limitations:
      - Repository identity is hash-based and omits raw remote URLs, raw repository names, and local absolute paths.
      - Identity validation cannot prove two differently labeled or renamed repositories are equivalent.
      - Conflicting identity fails by default unless the caller explicitly allows review-tier mismatch output.

  - id: snapshot.diff.schema.v1
    name: Snapshot diff schema and availability gap
    description: Emits gaps when snapshot-diff evidence sections are unavailable because required precision tables or implementation slices are absent.
    evidenceTier: Tier4Unknown
    emits:
      - UnavailableEvidence gap
    limitations:
      - Availability gaps explicitly mark partial analysis and must not be interpreted as no changes.
      - Missing optional precision tables can reduce comparison precision and downgrade conclusions.

  - id: combined.diff.source.v1
    name: Combined dependency diff source comparison
    description: Compares source inventory and source metadata between two combined indexes by exact source label and stable source identity metadata.
    evidenceTier: Tier2Structural
    emits:
      - source diff row
      - SourceIdentityChanged gap
    limitations:
      - Source pairing is exact-label based and does not infer renamed sources.
      - Source identity metadata may be incomplete; unverifiable identity is review-tier evidence.
      - Source diffs compare static scan metadata and do not prove code behavior changed.

  - id: combined.diff.coverage.v1
    name: Combined dependency diff coverage comparison
    description: Compares scan coverage, build status, commit SHA credibility, and known coverage warnings between paired sources.
    evidenceTier: Tier4Unknown
    emits:
      - coverage diff row
      - coverage caveat
    limitations:
      - Coverage is source-level unless adapters emit more precise gap metadata.
      - Reduced coverage makes absence of evidence coverage-relative, not proof that a dependency was removed.

  - id: combined.diff.endpoint.v1
    name: Combined dependency diff endpoint comparison
    description: Compares combined endpoint alignment evidence between two snapshots using static method/path keys and side-specific endpoint provenance.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - endpoint diff row
    limitations:
      - Endpoint diffs are static method/path evidence and do not prove runtime traffic, auth behavior, proxies, deployment base paths, CORS behavior, or reachability.
      - Dynamic, ambiguous, optional, and method-mismatch evidence remains review-tier.

  - id: combined.diff.surface.v1
    name: Combined dependency diff surface comparison
    description: Compares dependency surfaces such as SQL query/persistence, HTTP, package, and config evidence using safe structured metadata.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - surface diff row
    limitations:
      - Surface diffs do not prove runtime SQL execution, database schema existence, config loading, package loading, generated SQL equivalence, or branch feasibility.
      - Raw SQL, URLs, config values, connection strings, and source snippets are not rendered by default.
      - Hash-only SQL text surfaces emit a HashOnlyEvidence caveat and remain review-tier evidence.
      - SQL surfaces that fall back to fact-hash identity emit a VolatileIdentity caveat and remain review-tier evidence.
      - Package surface diffs compare static manifest metadata only; they do not prove package restore, installation, loading, import/use, vulnerability, exploitability, deployment, or transitive dependency impact.
      - Package version values that resemble URLs, local paths, or environment-expanded values are rendered as hashes with redaction caveats.
      - Package identity is ecosystem- and manifest-scoped; matching package names across ecosystems does not imply cross-language identity.

  - id: combined.diff.edge.v1
    name: Combined dependency diff edge comparison
    description: Compares combined dependency edge evidence such as calls, object creations, relationships, and parameter-forwarding edges using stable source/target metadata.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - edge diff row
    limitations:
      - Edge diffs are static evidence and do not prove dynamic dispatch, runtime DI registrations, reflection targets, branch feasibility, or collection contents.
      - Syntax-only or name-only edge evidence remains review-tier.

  - id: combined.diff.identity.v1
    name: Combined dependency diff stable identity
    description: Constructs stable identity keys for diffing and emits duplicate identity gaps when multiple records share the same stable key.
    evidenceTier: Tier4Unknown
    emits:
      - DuplicateIdentity gap
    limitations:
      - Stable identity is label-and-metadata based; renamed labels are not inferred as the same source.
      - Duplicate identity within one snapshot means diff comparison for affected records is review-tier only.
      - Identity construction depends on combined fact metadata quality; malformed or incomplete metadata degrades identity.

  - id: combined.diff.path.v1
    name: Combined dependency diff path comparison
    description: Compares opt-in dependency path signatures produced by the combined path query engine.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - path diff row
    limitations:
      - Path diffing is bounded by depth, path, and frontier limits and must not be treated as complete dependency coverage when truncated.
      - Path evidence is a static trail, not runtime execution or full taint analysis.

  - id: combined.diff.selector.v1
    name: Combined dependency diff selector handling
    description: Emits selector gaps when user-supplied source, endpoint, surface, or path filters match no comparable evidence.
    evidenceTier: Tier4Unknown
    emits:
      - SelectorNoMatch gap
    limitations:
      - Selector gaps describe the current static evidence and query bounds only.

  - id: combined.diff.schema.v1
    name: Combined dependency diff schema gap
    description: Emits gaps when optional combined-index precision tables are missing and diff comparison falls back to weaker evidence.
    evidenceTier: Tier4Unknown
    emits:
      - SchemaMissing gap
    limitations:
      - Schema gaps can reduce comparison precision and may downgrade added/removed claims.

  - id: combined.diff.truncation.v1
    name: Combined dependency diff truncation gap
    description: Emits gaps when diff row or gap caps truncate report output.
    evidenceTier: Tier4Unknown
    emits:
      - TruncatedByLimit gap
    limitations:
      - Truncated output is intentionally partial and must not be treated as complete evidence coverage.

  - id: combined.impact.source.v1
    name: Combined change impact source item
    description: Projects combined source diff rows into static change-impact source items with source identity, coverage, and rule-backed evidence.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - source impact item
      - NoImpactEvidence gap
    limitations:
      - Source impact items describe changed static source metadata, not runtime behavior.
      - Source pairing is exact-label based and does not infer renamed sources.
      - Missing or conflicting source identity metadata downgrades confidence.

  - id: combined.impact.coverage.v1
    name: Combined change impact coverage item
    description: Projects combined coverage diff rows into static change-impact coverage items so reduced scans and build-status changes are visible in impact reports.
    evidenceTier: Tier4Unknown
    emits:
      - coverage impact item
    limitations:
      - Coverage is source-level unless adapters emit more precise gap metadata.
      - Reduced coverage makes absence of impact evidence coverage-relative, not proof that a dependency was unaffected.

  - id: combined.impact.endpoint.v1
    name: Combined change impact endpoint item
    description: Projects combined endpoint diff rows into static change-impact endpoint items using method/path keys and side-specific endpoint provenance.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - endpoint impact item
    limitations:
      - Endpoint impact items do not prove runtime traffic, auth behavior, proxies, deployment base paths, CORS behavior, or reachability.
      - Dynamic, ambiguous, optional, and method-mismatch evidence remains review-tier.

  - id: combined.impact.surface.v1
    name: Combined change impact dependency surface item
    description: Projects dependency-surface diff rows into static change-impact items for SQL query/persistence, HTTP, package, and config surfaces using safe structured metadata.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - surface impact item
    limitations:
      - Surface impact items do not prove runtime SQL execution, database schema existence, config loading, package loading, generated SQL equivalence, or branch feasibility.
      - Raw SQL, URLs, config values, connection strings, and source snippets are not rendered by default.
      - HashOnlyEvidence and VolatileIdentity caveats from combined.diff.surface.v1 carry through as review-tier impact evidence.

  - id: combined.impact.edge.v1
    name: Combined change impact dependency edge item
    description: Projects dependency-edge diff rows into static change-impact items for calls, object creations, relationships, and parameter-forwarding evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - edge impact item
    limitations:
      - Edge impact items do not prove dynamic dispatch, runtime dependency injection registrations, reflection targets, branch feasibility, or collection contents.
      - Syntax-only or name-only edge evidence remains review-tier.

  - id: combined.impact.path.v1
    name: Combined change impact path item
    description: Projects opt-in combined path diff rows into static change-impact path items and path context summaries.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - path impact item
      - path context summary
    limitations:
      - Path context is opt-in, bounded, and must not be treated as complete dependency coverage when truncated.
      - Path evidence is a static trail, not runtime execution, full taint analysis, or proof of business impact.

  - id: combined.impact.path-context.v1
    name: Combined change impact path context
    description: Classifies optional per-item path context when the impact planner can safely map a changed endpoint, surface, or edge to bounded before/after path queries.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - ReachabilityChanged path context
      - ReachabilityEvidenceChanged path context
      - ReachabilityUnchanged path context
      - PathContextUnavailable gap
      - NoPathEvidence gap
    limitations:
      - Path context is static graph evidence and does not prove runtime reachability, branch feasibility, dynamic dispatch, dependency injection binding, or data flow.
      - Unsupported selector mappings must emit review or unknown gaps rather than guessed paths.
      - Reduced coverage and traversal truncation make no-path conclusions coverage-relative.

  - id: combined.impact.selector.v1
    name: Combined change impact selector handling
    description: Emits selector and ignored-selector gaps when user-supplied source, endpoint, surface, or path filters match no comparable evidence or are outside the selected scope.
    evidenceTier: Tier4Unknown
    emits:
      - SelectorNoMatch gap
      - IgnoredSelector gap
    limitations:
      - Selector gaps describe only the current static evidence and query bounds.
      - Ignored selector gaps do not prove matching evidence exists outside the selected scope.

  - id: combined.impact.truncation.v1
    name: Combined change impact truncation gap
    description: Emits gaps when impact item, path-query, or gap caps truncate report output.
    evidenceTier: Tier4Unknown
    emits:
      - TruncatedByLimit gap
    limitations:
      - Truncated output is intentionally partial and must not be treated as complete impact coverage.

  - id: combined.reverse.surface.v1
    name: Combined reverse selected dependency surface
    description: Selects terminal dependency surfaces for reverse static reachability queries using safe structured surface metadata.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - selected reverse surface row
      - NeedsReviewSurfaceEvidence row
      - UnknownAnalysisGap row
    limitations:
      - Surface selection is static evidence and does not prove runtime SQL execution, database schema existence, config loading, package loading, outbound traffic, or API route deployment.
      - Raw SQL, raw URLs, config values, connection strings, source snippets, raw repository remotes, and local absolute paths must not be rendered.
      - Ambiguous, syntax-only, textual, or duplicate-identity surface matches remain review-tier evidence.

  - id: combined.reverse.root.v1
    name: Combined reverse upstream root grouping
    description: Groups reverse traversal results by upstream endpoint, symbol, or source roots that can statically reach selected dependency surfaces.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - reverse endpoint root row
      - reverse symbol root row
      - reverse source root row
      - NoReversePathEvidence gap
    limitations:
      - Root grouping is bounded static graph evidence and does not prove runtime traffic, runtime dispatch, dependency injection binding, branch feasibility, or production usage.
      - Missing or reduced source coverage makes no-path conclusions unknown rather than proof that no caller exists.
      - Legacy-data surface no-path gaps under this rule cover missing generated-code links, unsupported ORM gaps, absent relationship metadata, and reduced legacy-data extraction coverage; they do not prove no database caller or runtime data access exists.
      - Endpoint roots must not be substituted with symbol or source roots unless the requested target mode permits them.

  - id: combined.reverse.path.v1
    name: Combined reverse static path evidence
    description: Emits bounded reverse static paths from upstream roots to selected dependency surfaces by reusing the combined dependency path graph inventory.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - StrongStaticReversePath row
      - ProbableStaticReversePath row
      - NeedsReviewReversePath row
    limitations:
      - Reverse paths are static evidence trails, not runtime execution, full taint analysis, mutation semantics, or proof of business impact.
      - Traversal is bounded by surface, depth, frontier, root, and per-root path limits.
      - Fallback, name-only, syntax-only, dynamic, duplicate-identity, or ambiguous path evidence must be downgraded to review-tier or unknown classifications.

  - id: combined.reverse.selector.v1
    name: Combined reverse selector handling
    description: Emits gaps for reverse query selectors that match no eligible evidence or request a valid target mode that is not implemented in the current release.
    evidenceTier: Tier4Unknown
    emits:
      - SelectorNoMatch gap
      - UnsupportedSelector gap
    limitations:
      - Selector gaps describe only the current static evidence, selector semantics, and query bounds.
      - A selector no-match result is not proof that runtime dependencies or callers do not exist.

  - id: combined.reverse.truncation.v1
    name: Combined reverse traversal truncation gap
    description: Emits gaps when reverse surface, depth, frontier, root, path, or gap caps truncate report output.
    evidenceTier: Tier4Unknown
    emits:
      - TruncatedByLimit gap
    limitations:
      - Truncated output is intentionally partial and must not be treated as complete reverse dependency coverage.
      - Truncation can coexist with coverage gaps; it must not suppress UnknownAnalysisGap evidence.

  - id: combined.reverse.identity.v1
    name: Combined reverse stable identity caveat
    description: Emits reverse-query caveats when selected surfaces, roots, path nodes, source identity, or commit SHA metadata are duplicate, missing, or unverified.
    evidenceTier: Tier4Unknown
    emits:
      - DuplicateIdentity gap
      - IdentityUnverified gap
    limitations:
      - Stable identity construction depends on combined source, fact, symbol, and path metadata quality.
      - Duplicate or unverified identities downgrade affected reverse rows and must not produce strong static classifications.
      - Missing commit SHA or source identity means provenance is incomplete; it does not prove evidence is wrong or absent.

  - id: combined.paths.endpoint-match.v1
    name: Combined dependency path endpoint match edge
    description: Derives an in-memory path edge between HTTP client and server endpoint facts using the same deterministic endpoint matcher as the combined dependency report.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - endpoint-match path edge
    limitations:
      - Endpoint matches are static method/path evidence and do not prove runtime traffic, auth behavior, proxy behavior, deployment base paths, CORS behavior, or reachability.
      - Optional segment, ambiguous, method-mismatch, and dynamic URL cases are review evidence and cannot produce strong static paths.

  - id: combined.paths.fact-attached-to-symbol.v1
    name: Combined dependency path fact-to-symbol attachment edge
    description: Derives an in-memory path edge from endpoint facts to source-local symbol nodes when a fact carries source or target symbol evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - fact-attached-to-symbol path edge
    limitations:
      - Attachment strength follows the originating fact tier and rule; syntax or textual symbols remain review evidence.
      - Symbol display-name equality is source-local and does not imply identity across languages or source indexes.

  - id: combined.paths.surface-evidence.v1
    name: Combined dependency path surface evidence edge
    description: Derives an in-memory path edge from source-local symbol nodes to terminal dependency surfaces such as SQL, HTTP, config, and package evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - surface-evidence path edge
    limitations:
      - Surface attachment proves only static evidence proximity through recorded symbol fields; it does not prove runtime SQL execution, config usage, package loading, or outbound traffic.
      - Unattached surfaces remain inventory evidence and are reported as review gaps rather than guessed paths.

  - id: combined.paths.symbol-reconciliation.v1
    name: Combined dependency path source-local symbol reconciliation edge
    description: Derives an in-memory review-tier path edge between source-local symbol nodes when deterministic scanner facts describe the same member with compatible but non-identical display strings.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - symbol-reconciliation path edge
    limitations:
      - Reconciliation is source-local and must not join symbols across combined indexes or languages.
      - Short-name reconciliation is review evidence only and cannot produce a strong static path.
      - Ambiguous same-name candidates must remain gaps or review evidence rather than arbitrary strong links.
      - Reconciliation does not prove runtime dispatch, dependency injection binding, reflection targets, branch feasibility, serializer behavior, or SQL execution.

  - id: combined.paths.query-gap.v1
    name: Combined dependency path query gap
    description: Emits query-level path gaps such as selector misses, no matching terminal surfaces, and coverage-relative no-path outcomes.
    evidenceTier: Tier4Unknown
    emits:
      - SelectorNoMatch path gap
      - UnknownAnalysisGap path gap
    limitations:
      - Query gaps are conclusions about the current static graph and selector bounds, not proof that runtime dependencies do or do not exist.
      - File spans may be absent when no source evidence matched the selector.

  - id: combined.paths.truncation-gap.v1
    name: Combined dependency path truncation gap
    description: Emits path-search limit gaps when selector candidate, depth, cycle, path-count, or frontier bounds stop traversal.
    evidenceTier: Tier4Unknown
    emits:
      - TruncatedByLimit path gap
    limitations:
      - Truncation means the returned path set is intentionally partial and must not be treated as complete dependency coverage.
      - The triggering evidence span is best-effort and may point to the nearest traversed node rather than the omitted dependency.

  - id: combined.route-flow.selector.v1
    name: Route-flow selector handling
    description: Selects route-centered entry evidence from combined HTTP route, HTTP client call, WebForms, symbol, or source selectors using normalized static evidence.
    evidenceTier: Tier4Unknown for selector gaps; otherwise inherits weakest selected evidence
    emits:
      - route-flow query metadata
      - route-flow entry selector gap
    limitations:
      - Route and client-call selectors are normalized method/path aliases over existing combined endpoint evidence; they do not prove runtime routing, traffic, deployment, auth, middleware, proxy, CORS, or reachability behavior.
      - Overlapping selectors reuse the paths selector grammar where supported. Route-flow additions are --route, --client-call, --classification, --max-logic-rows, and --max-gaps.
      - Unsupported or unknown surface kinds fail validation or emit selector gaps rather than guessed route-flow rows.
      - Percent-encoded selectors are normalized only for safe ordinary path characters; encoded slashes, traversal-like material, host material, and unsafe raw selectors must not be rendered.

  - id: combined.route-flow.entry.v1
    name: Route-flow entry evidence
    description: Emits route-centered entry evidence for selected HTTP route bindings, HTTP client calls, endpoint roots, WebForms roots, symbols, sources, and aligned route/client pairs.
    evidenceTier: Inherits weakest supporting route, client-call, or endpoint-alignment evidence
    emits:
      - route-flow entry evidence row
    limitations:
      - Entry evidence is static source evidence only and does not prove runtime execution, request reachability, live traffic, or handler activation.
      - Missing client or server side evidence is a coverage-relative gap and must not be treated as clean absence under reduced coverage.
      - File spans, extractor versions, and commit SHA values may be unavailable in older indexes; route-flow must preserve explicit unavailable placeholders.

  - id: combined.route-flow.path.v1
    name: Route-flow static path evidence
    description: Projects bounded combined dependency paths into route-centered static flow rows while preserving supporting fact IDs, edge IDs, rule IDs, evidence tiers, files, and line spans.
    evidenceTier: Inherits weakest required path-edge evidence
    emits:
      - route-flow static flow row
    limitations:
      - Path rows are static evidence trails, not runtime execution, dynamic dispatch certainty, dependency-injection binding proof, branch feasibility, generated-code freshness proof, serializer runtime proof, or production use.
      - Bounded breadth-first traversal can omit possible static paths when depth, path, cycle, or frontier caps are reached.
      - Syntax-only, textual, fallback, ambiguous, high fan-out, generated-code uncertain, or reduced-coverage links remain review-tier and cannot be upgraded by composition.

  - id: combined.route-flow.interface-bridge.v1
    name: Route-flow interface implementation candidate bridge
    description: Emits candidate interface-to-implementation bridge rows only when combined symbol-relationship evidence supports the candidate.
    evidenceTier: Inherits relationship evidence and caps classification at NeedsReviewStaticRouteFlow
    emits:
      - interface-implementation-candidate row
      - RuntimeBindingNotProven gap
      - ImplementationCandidateUnavailable gap
      - DispatchCandidateFanOut gap
    limitations:
      - Candidate implementation evidence is not runtime dependency-injection target proof and must not select one runtime implementation.
      - Name-only, syntax-only, fallback, cross-source, or cross-language implementation guesses are not strong bridge evidence in v1.
      - High fan-out implementation candidates are deterministically capped and remain review-tier; omitted candidates may still be possible static review evidence.
      - Reflection, factories, service locators, configuration-driven bindings, and dynamic dispatch remain analysis gaps unless a future deterministic rule covers them.

  - id: combined.dispatch-candidate.v1
    name: Combined dispatch candidate edge
    description: Derives bounded in-memory path edges from interface or override method symbols to statically known implementation or override method candidates using combined symbol-relationship evidence.
    evidenceTier: Inherits relationship evidence and caps path classification at NeedsReviewPath
    emits:
      - interface-candidate path edge
      - override-candidate path edge
    limitations:
      - Candidate edges are static review evidence only and do not prove runtime dispatch, dependency-injection target selection, object lifetime, branch feasibility, or production execution.
      - Candidates are derived only from source-local method-level relationship evidence; type-level inheritance or interface relationships do not substitute for member-level evidence in v1.
      - Override candidate chain traversal follows only `Overrides` relationship evidence and is bounded to a maximum depth of 5 with cycle protection.
      - Syntax-only, fallback, reduced-coverage, ambiguous, generated-code uncertain, or high fan-out candidates remain review-tier and must not strengthen downstream classifications.

  - id: combined.dispatch-gap.v1
    name: Combined dispatch candidate gap
    description: Emits gap rows when dispatch candidate derivation is capped, ambiguous, unavailable, or otherwise unable to support credible static traversal.
    evidenceTier: Tier4Unknown
    emits:
      - DispatchCandidateFanOut gap
      - DispatchCandidateTruncatedByLimit gap
    limitations:
      - Gap rows describe limits of the current static evidence graph and must not be read as proof that no runtime target exists.
      - Candidate caps are deterministic traversal limits; omitted candidates may still be possible static review evidence outside the configured bound.
      - Missing relationship evidence under reduced coverage must remain an unknown analysis gap rather than a clean absence conclusion.

  - id: combined.route-flow.logic-surface.v1
    name: Route-flow business and data logic surface
    description: Emits projection, object-shape, query-shape, validation, guard, branch, async, serializer, contract, and flow-boundary rows as path-context evidence.
    evidenceTier: Inherits weakest supporting logic or surface evidence
    emits:
      - route-flow business/data logic row
    limitations:
      - Business/data logic rows are static review context and do not prove branch feasibility, authorization result, business intent, business impact, query execution, persistence, or production use.
      - Adjacent context requires shared symbol, method/member span, supporting fact or edge ID, or argument-flow linkage; same-file evidence alone is not adjacent in v1.
      - Raw snippets, raw SQL, URLs, literals, config values, connection strings, and secret-like values must be omitted or hashed.

  - id: combined.route-flow.dependency-surface.v1
    name: Route-flow dependency and data surface evidence
    description: Emits terminal dependency/data surface rows reached from route-flow path evidence, including SQL/query, persistence, package/config, HTTP client, WCF/service, remoting, legacy data, storage, queue/event, or generic dependency surfaces.
    evidenceTier: Inherits weakest supporting dependency/data evidence
    emits:
      - route-flow dependency/data surface row
    limitations:
      - Dependency/data surface rows do not prove runtime traffic, SQL execution, database existence, schema compatibility, persistence, package loading, queue activity, service hosting, or production use.
      - Stable keys use safe source-scoped identity fields and must not include scan-specific fact IDs, raw SQL, raw URLs, config values, snippets, connection strings, local paths, remotes, or secrets.
      - Duplicate stable surface identities are review-tier identity gaps rather than proof of one unique terminal surface.

  - id: combined.route-flow.argument-projection.v1
    name: Route-flow argument evidence projection
    description: Projects direct combined_argument_flows rows into route-flow logic rows only when the caller and callee are already connected by selected static route-flow path evidence.
    evidenceTier: Inherits argument-flow evidence and caps strongest projection at ProbableStaticRouteFlow
    emits:
      - route-flow argument-flow logic row
      - ArgumentProjectionUnavailable gap
    limitations:
      - Argument projection rows are direct static argument evidence only; they do not prove full taint, aliasing, mutation tracking, branch feasibility, serializer behavior, repository translation, runtime values, or production data.
      - Projection requires a source-local static call or path bridge already selected by route-flow; unjoined argument rows are reported as gaps rather than inferred flows.
      - Parameter names, type descriptors, ordinals, expression kinds, and hashes may be rendered when safe; literal values, raw source expressions, source snippets, local paths, URLs, SQL/config values, and secrets must not be rendered.

  - id: combined.route-flow.fact-symbol-projection.v1
    name: Route-flow fact-symbol evidence projection
    description: Projects combined_fact_symbols attachments into route-flow logic rows by joining to combined_facts and selected source-local route-flow symbols.
    evidenceTier: Inherits attached fact evidence tier
    emits:
      - route-flow fact-symbol projection logic row
      - FactSymbolProjectionUnavailable gap
      - FactSymbolUnsupportedTypeSkipped gap
    limitations:
      - Fact-symbol projection rows preserve source-local static attachments only; they do not prove runtime request execution, dependency injection binding, dynamic dispatch target selection, SQL execution, database existence, schema compatibility, package loading, or production use.
      - Projection requires source-local symbol identity already present in the selected route-flow path; global short-name stitching and cross-source symbol guesses are not evidence in this rule.
      - Query, data, config, package, object-shape, serializer-contract, and async/callback boundary metadata must use safe descriptors and hashes; raw SQL, config values, serializer attribute names, serializer member names, serializer contract names, connection strings, URLs, remotes, source snippets, local paths, private labels, and secrets must not be rendered.
      - Query, data, config, package, and object-shape projections cap strongest route-flow classification at ProbableStaticRouteFlow unless weaker evidence requires NeedsReviewStaticRouteFlow or UnknownAnalysisGap.
      - Serializer contract rows cap route-flow classification at NeedsReviewStaticRouteFlow and are review-tier path context only; they do not prove serialization execution, formatter selection, runtime payload shape, binary compatibility, client compatibility, or production use.
      - Validation/guard branch-feasibility rows cap route-flow classification at NeedsReviewStaticRouteFlow and are review-tier path context only; they do not prove symbolic execution, branch feasibility, validation outcome, authorization result, or runtime values.
      - Async and callback boundary rows cap route-flow classification at NeedsReviewStaticRouteFlow and are review-tier path context only; they do not prove callback invocation, event firing, runtime scheduling, ordering, task completion, closure lifetime, or mutation safety.
      - Unsupported attached fact-symbol types are reported as review-tier skipped context, not silently rendered or inferred as data-flow evidence.

  - id: combined.route-flow.classification.v1
    name: Route-flow summary classification
    description: Stamps the overall route-flow summary classification from selected entry evidence, path rows, dependency/data surfaces, coverage, source identity, schema availability, truncation, and gaps.
    evidenceTier: Derived report rule over supporting evidence
    emits:
      - StrongStaticRouteFlow summary
      - ProbableStaticRouteFlow summary
      - NeedsReviewStaticRouteFlow summary
      - NoRouteFlowEvidence summary
      - UnknownAnalysisGap summary
    limitations:
      - StrongStaticRouteFlow and NoRouteFlowEvidence require full route-flow coverage, known commit SHA, verified source identity, compatible extractor availability, and no blocking gaps.
      - NeedsReviewStaticRouteFlow is required for syntax-only, textual, dynamic URL, fallback, ambiguous, implementation-candidate, generated-code uncertain, high fan-out, or truncated evidence.
      - UnknownAnalysisGap is required when selector matching, schema, extractor availability, source identity, commit SHA, reduced coverage, or caps prevent a clean conclusion.
      - Classification filtering applies to flow, logic, dependency-surface, and non-blocking gap rows; matched entry evidence remains visible as query context, and blocking coverage/schema/identity gaps are preserved.
      - The v1 high-fan-out threshold is 10 or more candidates, or more than one candidate for generic terminal keys status, id, name, value, result, or response. This conservative threshold requires future calibration against redacted validation data.
      - This rule stamps the overall summary classification; it does not classify business impact or runtime behavior.

  - id: combined.route-flow.gap.v1
    name: Route-flow analysis gap
    description: Emits route-flow gaps for selector misses, missing route roots, missing method-symbol bridges, missing call edges, missing implementation bridges, implementation candidate gaps, missing data-surface attachments, runtime binding uncertainty, dynamic dispatch boundaries, reduced coverage, unknown commit SHA, no route-flow evidence, unknown analysis, traversal bounds, truncation, and unsafe value omission.
    evidenceTier: Tier4Unknown
    emits:
      - SelectorNoMatch gap
      - MissingRouteRoot gap
      - MissingMethodSymbolBridge gap
      - MissingCallEdge gap
      - MissingImplementationBridge gap
      - DataSurfaceAttachmentMissing gap
      - LinkedSymbolAbsentFromIndex gap
      - SchemaMissing gap
      - ExtractorUnavailable gap
      - ImplementationCandidateUnavailable gap
      - AmbiguousImplementationCandidates gap
      - IdentityGap gap
      - RuntimeBindingNotProven gap
      - DynamicDispatchBoundary gap
      - DynamicClientUrlNeedsReview gap
      - ArgumentProjectionUnavailable gap
      - FactSymbolProjectionUnavailable gap
      - FactSymbolUnsupportedTypeSkipped gap
      - ReducedCoverage gap
      - UnknownCommitSha gap
      - NoRouteFlowEvidence gap
      - UnknownAnalysisGap gap
      - TraversalBounds gap
      - TruncatedByLimit gap
      - UnsafeValueOmitted gap
    limitations:
      - Gaps are coverage-relative explanations of missing or weak static evidence and must not be rendered as clean absence under reduced coverage.
      - Endpoint composition gaps describe static bridge and terminal surface availability only and do not prove route reachability, request execution, dependency-injection target selection, dynamic dispatch, branch feasibility, database existence, query execution, or downstream absence.
      - Controller-to-service bridge availability is represented by narrower MissingCallEdge, MissingImplementationBridge, ImplementationCandidateUnavailable, and DataSurfaceAttachmentMissing gaps; v1 does not emit a separate ControllerToServiceBridgeMissing gap code.
      - LinkedSymbolAbsentFromIndex covers a static bridge evidence record whose referenced symbol is absent from the combined index; it is an extraction or coverage gap, not proof that the bridge is invalid at runtime.
      - Truncation gaps mean the report is partial.
      - Gap messages must not echo unsafe selectors, local paths, raw remotes, raw SQL/config values, snippets, connection strings, private labels, or secret-like values.

  - id: combined.route-flow.redaction.v1
    name: Route-flow public artifact redaction
    description: Documents route-flow output redaction for Markdown, JSON, query metadata, row metadata, source labels, paths, and diagnostic-like strings.
    evidenceTier: Tier4Unknown
    emits:
      - UnsafeValueOmitted gap
      - redacted route-flow metadata value
    limitations:
      - Raw local absolute paths, private repository names, raw remotes, URLs, endpoint addresses, WSDL/SOAP addresses, raw SQL, config values, connection strings, source snippets, analyzer diagnostics, and secret-like values are omitted or hashed.
      - Redaction preserves deterministic public-safe identity only where safe source-scoped fields exist.
      - Redaction does not prove an artifact is public-approved; generated artifacts still require review and private-path guard validation.

  - id: combined.route-flow.report.v1
    name: Route-flow report envelope
    description: Stamps the route-flow Markdown and JSON report envelope, output-format metadata, deterministic ordering, coverage labels, limitations, and byte-stable rendering contract.
    evidenceTier: Derived report rule over supporting evidence
    emits:
      - route-flow-report.md
      - route-flow-report.json
      - touchedFiles route-flow JSON section
      - touchedSymbols route-flow JSON section
      - contextGroups route-flow JSON section
    limitations:
      - The report envelope is a deterministic view over existing combined-index evidence and does not mutate the combined index.
      - Touched file and symbol sections are additive report summaries derived from cited entry, flow, logic, dependency-surface, and gap rows; they do not add new scanner evidence or prove runtime execution.
      - Context groups are additive report summaries over already-selected route-flow rows; they do not add traversal evidence or prove runtime execution, dependency-injection target selection, branch feasibility, SQL execution, or production use.
      - Markdown and JSON must use static-evidence wording and must not say impacted, executed, called at runtime, authorized, used in production, proves DI target, query runs, or business impact.
      - Directory outputs write both Markdown and JSON; file outputs default to Markdown unless JSON format is requested.

  - id: repo.manifest.v1
    name: Repository manifest
    description: Captures repo metadata, commit SHA, project inventory, scan status, and known gaps.
    evidenceTier: Tier2Structural
    emits:
      - RepoScanned
      - BuildStatus
      - AnalysisGap
    limitations:
      - Git metadata may be unavailable outside a git checkout.

  - id: file.inventory.v1
    name: File inventory
    description: Records deterministic inventory facts for supported solution, project, source, config, JSON, and SQL files.
    evidenceTier: Tier2Structural
    emits:
      - FileInventoried
      - ConfigFileDeclared
      - SqlFileDeclared
    limitations:
      - File presence is structural evidence only; it does not prove runtime usage.
      - Generated, bin, obj, .git, and TraceMap output directories are excluded in the MVP.

  - id: project.file.v1
    name: Project file inventory
    description: Reads solution and C# project declarations, target frameworks, and package references from project files and packages.config.
    evidenceTier: Tier2Structural
    emits:
      - SolutionDeclared
      - ProjectDeclared
      - TargetFrameworkDeclared
      - PackageReferenced
    limitations:
      - XML files that cannot be parsed are still inventoried but do not emit project metadata facts.
      - Conditional MSBuild properties are not evaluated in Milestone 1.
      - PackageReferenced facts are static project-file or packages.config declarations and do not prove NuGet restore, resolved transitive dependencies, runtime loading, or deployment.
      - Central package management, imported props/targets, and unresolved property interpolation may reduce package metadata precision.

  - id: csharp.syntax.memberaccess.v1
    name: C# syntax member access
    description: Finds member access names from C# syntax without requiring compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
    limitations:
      - Does not prove the containing type or symbol identity.
      - May match unrelated properties with the same name.

  - id: csharp.syntax.declarations.v1
    name: C# syntax declarations
    description: Finds type, method, property, enum, and attribute names from C# syntax without requiring project load or compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - PropertyDeclared
      - EnumDeclared
      - AttributeUsed
      - AnalysisGap
    limitations:
      - Does not prove symbol identity, overload resolution, inheritance, or generated code behavior.
      - Files with parse errors may still emit partial syntax facts, and parse errors are reported as AnalysisGap facts.

  - id: csharp.syntax.invocation.v1
    name: C# syntax invocation
    description: Finds invocation expression names from C# syntax without requiring compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - InvocationName
    limitations:
      - Does not prove receiver type, overload target, extension method binding, or runtime dispatch.

  - id: csharp.syntax.callgraph.v1
    name: C# syntax call graph
    description: Emits syntax-only caller-to-callee edges from invocation and object creation expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - CallEdge
    limitations:
      - Caller names are best-effort containing member names, not fully qualified symbols.
      - Callee names are invocation names only; overload resolution and receiver type are not proven.
      - Dynamic dispatch, reflection, delegates, and event flow are not modeled.

  - id: csharp.syntax.objectcreation.v1
    name: C# syntax object creation
    description: Emits syntax-only object creation facts from new expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Created type names are syntax text and may not be fully qualified.
      - Assigned variable names are best-effort for direct variable declarations or assignments only.
      - Constructor overload and assembly identity are not proven without semantic analysis.

  - id: csharp.syntax.logicshape.v1
    name: C# syntax logic shape
    description: Emits deterministic syntax signals for calculation, branching, retry, serialization, and boilerplate-like code.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - CalculationExpression
      - BranchingLogic
      - RetryPolicyLogic
      - SerializationLogic
      - InfrastructureBoilerplate
    limitations:
      - Logic shape facts are heuristics over syntax and file paths; they are review-routing signals, not proof of business intent.
      - Calculation expressions store expression hashes, operators, and spans, not raw source snippets.
      - Boilerplate classification is path/name based and can misclassify unconventional project layouts.

  - id: csharp.syntax.querypattern.v1
    name: C# syntax query pattern
    description: Records LINQ-style filter, sort, select, and include call shapes with field names and hashed call expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - QueryPatternDetected
    limitations:
      - Syntax-only evidence does not prove the query provider, database table, generated SQL, runtime branch feasibility, or whether the query executes.
      - Field names are extracted from member access inside query arguments and can include unrelated member reads in complex expressions.
      - Literal values and raw expressions are not stored; pattern hashes, field names, operation names, and spans are emitted.
      - Reports may display safe derived query metadata and hashes, but must not display raw SQL text, literal values, or unsafe identifiers.

  - id: csharp.syntax.objectshape.v1
    name: C# syntax object shape
    description: Records object initializer and anonymous-object field shapes with field names, shape hashes, and source spans.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectShapeInferred
    limitations:
      - Object shape facts are review-routing evidence, not proof of DTO/schema contracts, serializer output, runtime object contents, or nullability.
      - Nested object contents, collection element shapes, conditional construction, and mutation after initialization are not expanded in this rule.
      - Raw object expressions are not stored; expression hashes and sorted field names are emitted.

  - id: csharp.semantic.propertyaccess.v1
    name: C# semantic property access
    description: Finds compiler-resolved property accesses using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - PropertyAccessed
    limitations:
      - Requires project load and enough references to resolve symbols.
      - Does not detect reflection-only access.
      - Member access syntax that does not bind to an IPropertySymbol is not emitted by this rule.

  - id: csharp.semantic.methodinvocation.v1
    name: C# semantic method invocation
    description: Finds compiler-resolved method invocations using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - MethodInvoked
    limitations:
      - Requires project load and enough references to resolve symbols.
      - Dynamic dispatch, reflection, and unresolved overload candidates are not emitted by this rule.

  - id: csharp.semantic.callgraph.v1
    name: C# semantic call graph
    description: Emits compiler-resolved caller-to-callee method and constructor call edges using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - CallEdge
    limitations:
      - Requires project load and enough references to resolve method symbols.
      - Does not model runtime polymorphism, delegate invocation targets, event subscribers, reflection, or async continuation flow.
      - A call edge records a syntactic call site, not proof that the path executes at runtime.

  - id: csharp.semantic.objectcreation.v1
    name: C# semantic object creation
    description: Emits compiler-resolved object creation facts with created type, constructor, caller, and assembly identity when available.
    evidenceTier: Tier1Semantic
    emits:
      - ObjectCreated
    limitations:
      - Requires project load and enough references to resolve created type symbols.
      - Does not model dependency injection container activations, reflection, deserialization-created instances, or factory-returned runtime types.
      - Assembly version is sourced from Roslyn assembly identity and may be 0.0.0.0 when a project does not set explicit version metadata.

  - id: csharp.semantic.valueflow.v1
    name: C# semantic argument value flow
    description: Maps resolved call-site arguments to callee parameters and records argument symbol/declaration evidence when available.
    evidenceTier: Tier1Semantic
    emits:
      - ArgumentPassed
    limitations:
      - Requires Roslyn semantic binding for the callee method or constructor.
      - Tracks direct call-site argument expressions only; it does not perform interprocedural alias analysis, mutation tracking, or runtime branch feasibility.
      - Raw argument expressions are not stored; expression hashes, expression kinds, resolved symbols, and declaration spans are emitted.
      - Lambda bodies, delegates, reflection, dynamic dispatch, dependency injection, and serializer-created values require later specialized flow rules.

  - id: csharp.semantic.localalias.v1
    name: C# semantic local alias
    description: Records simple local aliases and assignments where a local variable is assigned from another resolved symbol.
    evidenceTier: Tier1Semantic
    emits:
      - LocalAlias
    limitations:
      - Requires Roslyn semantic binding for the alias local and origin expression.
      - Tracks direct local declarations and simple assignments only, such as `var alias = value` and `alias = value`.
      - Does not model mutation of object contents, collection membership, tuple/deconstruction flow, property aliases, ref/out effects, closures, runtime branches, or alias invalidation after complex control flow.
      - Raw alias expressions are not stored; expression hashes, expression kinds, resolved symbols, and declaration spans are emitted.

  - id: csharp.semantic.fieldalias.v1
    name: C# semantic field alias
    description: Records simple field assignments where a field is assigned from another resolved symbol.
    evidenceTier: Tier1Semantic
    emits:
      - FieldAlias
    limitations:
      - Requires Roslyn semantic binding for the assigned field and origin expression.
      - Tracks simple field assignments only, such as `_cached = value`.
      - Parameter forwarding uses field aliases when the assignment and later argument usage are in the same containing method, or when exactly one constructor in the same containing type assigns the field from a parameter.
      - Does not infer arbitrary cross-method field lifetime, ambiguous multiple-constructor field initialization, dependency injection state, object mutation, property aliases, collection membership, ref/out effects, closures, runtime branches, or alias invalidation after complex control flow.
      - Raw assignment expressions are not stored; expression hashes, expression kinds, resolved symbols, and declaration spans are emitted.

  - id: csharp.semantic.parameterforwarding.v1
    name: C# semantic parameter forwarding
    description: Derives parameter-to-parameter forwarding edges from semantic argument-flow evidence, resolving simple same-method aliases and unique constructor field initialization when available.
    evidenceTier: Tier1Semantic
    emits:
      - ParameterForwardEdge
    limitations:
      - Requires an `ArgumentPassed` fact where the argument is resolved as a method parameter, as a local/field with alias evidence back to a parameter in the same containing method, or as a field with exactly one constructor assignment from a parameter in the same containing type.
      - Follows parameter forwarding, same-method alias chains up to 3 alias hops, and unique constructor field initialization only; it does not infer arbitrary cross-method field lifetime, mutations, runtime branches, dependency injection, reflection, dynamic dispatch, or serializer-created values.
      - Constructor field forwarding requires exactly one visible constructor assignment from a parameter in the analyzed containing type; multiple visible assignments or constructors suppress the derived edge.
      - Path reports are bounded by max depth and max path count, so large or cyclic graphs can be intentionally truncated.
      - Paths are evidence chains, not proof that a runtime request always reaches the terminal method.

  - id: csharp.semantic.symbolidentity.v1
    name: C# semantic symbol identity
    description: Adds deterministic C# symbol IDs to resolved semantic facts and derives SQLite symbol, occurrence, and fact-symbol rows from those facts.
    evidenceTier: Tier1Semantic
    emits:
      - sourceSymbolId property
      - targetSymbolId property
      - argumentSymbolId property
      - parameterSymbolId property
      - originSymbolId property
      - constructorSymbolId property
      - symbols table rows
      - symbol_occurrences table rows
      - fact_symbols table rows
    limitations:
      - Symbol IDs require Roslyn semantic symbols; syntax fallback facts do not receive compiler-backed IDs.
      - IDs include assembly identity, containing symbol, member name, arity, parameter types, and return/type information where available; local IDs include source location to disambiguate same-name locals.
      - IDs are deterministic for the same source, project load, target framework, and dependency graph, but may change when references, target frameworks, generated source, or compiler binding change.
      - These rows are derived indexes over facts, not independent conclusions; the originating fact rule ID and evidence span remain authoritative.
      - Relationship rows for inheritance, interface implementation, and overrides are emitted by `csharp.semantic.symbolrelationship.v1`.

  - id: csharp.semantic.symbolrelationship.v1
    name: C# semantic symbol relationships
    description: Records compiler-resolved relationships between C# symbols, including direct type inheritance, direct interface implementation or extension, member overrides, and interface member implementations.
    evidenceTier: Tier1Semantic
    emits:
      - SymbolRelationship
      - symbol_relationships table rows
    limitations:
      - Requires Roslyn semantic symbols; syntax fallback does not emit symbol relationships.
      - Type relationships are limited to direct base-list declarations in source. Transitive inheritance and inherited interfaces can be queried by graph traversal, but are not emitted as direct evidence rows.
      - Interface member implementation uses Roslyn `FindImplementationForInterfaceMember`; it records compiler-resolved implementations, not runtime dispatch targets.
      - Override relationships record direct overridden members exposed by Roslyn; deeper override chains require graph traversal.
      - Generic substitutions, default interface methods, explicit interface implementations, and partial types follow Roslyn binding for the loaded project/target framework and may differ when project references or target frameworks change.
      - These relationships prove compiler binding, not runtime reachability, branch execution, object allocation, or dependency injection dispatch.

  - id: csharp.semantic.flowboundary.v1
    name: C# semantic flow boundary
    description: Records deterministic evidence for runtime-sensitive flow boundaries such as DI resolution, deserialization, reflection, dynamic invocation, collection mutation, object mutation, branch conditions, callbacks, and async scheduling points.
    evidenceTier: Tier1Semantic
    emits:
      - DependencyResolved
      - DeserializedObject
      - ReflectionUsage
      - DynamicInvocation
      - CollectionMutation
      - ObjectMutation
      - BranchCondition
      - CallbackBoundary
      - AsyncBoundary
    limitations:
      - Requires Roslyn semantic binding except for dynamic invocations where Roslyn intentionally cannot bind a static callee.
      - Callback boundary facts cover syntactically visible lambdas, anonymous methods, delegate arguments on invocations and object creation, delegate creation, expression-tree lambdas, captured outer parameters/locals, and event subscriptions; they do not prove delegate invocation, event firing, subscriber ordering, callback target execution, closure lifetime, expression-tree execution, or mutation safety.
      - Async boundary facts cover syntactically visible `await`, `await foreach`, `await using`, task scheduling/continuation calls, thread-pool queueing calls, and iterator `yield` statements; they do not prove runtime scheduling, execution ordering, thread interleaving, task completion, async-stream enumeration, async disposal execution, or continuation reachability.
      - These facts mark review-routing boundaries and do not prove runtime execution, concrete runtime types, branch feasibility, collection contents, object identity, dependency injection registrations, reflection targets, serializer contract mappings, callback invocation, event firing, or async ordering.
      - Use `csharp.semantic.runtimeevidence.v1` facts for statically visible registrations, reflection targets, serializer member names, collection element inputs, mutation semantics, and simple branch feasibility evidence.
      - Raw expressions are not stored; expression hashes, expression kinds, resolved symbols, and line spans are emitted.
      - Specialized flow rules are still required before TraceMap can carry value provenance across these boundaries.

  - id: csharp.semantic.runtimeevidence.v1
    name: C# semantic runtime evidence
    description: Records statically provable runtime-adjacent evidence for DI registrations, serializer contract members, reflection targets, dynamic dispatch candidates, collection element inputs, mutation semantics, and simple branch feasibility.
    evidenceTier: Tier1Semantic
    emits:
      - DependencyRegistered
      - SerializerContractMember
      - ReflectionTarget
      - DynamicDispatchCandidate
      - CollectionElementFlow
      - MutationSemantics
      - BranchFeasibility
    limitations:
      - Requires Roslyn semantic analysis; when project load or binding is reduced, absence of these facts is not absence of runtime behavior.
      - Dependency registrations are limited to statically visible generic or `typeof(...)` registrations on common registration method names; container modules, scanning conventions, factories, configuration-driven registrations, and runtime conditional registrations are not expanded.
      - Serializer contract member facts cover common attribute-declared member names such as `JsonPropertyName`, Newtonsoft `JsonProperty`, and `DataMember`; naming policies, custom converters, serializer options, and reflection-based serializers are not resolved.
      - Reflection targets are emitted only for direct `typeof(T)` or direct `typeof(T)` arguments with literal or `nameof(...)` member names; string construction, variables, binding flags, overload resolution, and reflective invocation reachability are not inferred.
      - Dynamic dispatch candidates record the invoked member name and generic syntax when the receiver is `dynamic`; they do not resolve concrete runtime targets.
      - Collection element flow records syntactic inputs to add/insert/enqueue/push-like mutations; it does not model collection contents after removals, aliases, loops, branches, object identity, or mutation order.
      - Mutation semantics classify direct property/field assignments and increment/decrement operations; they do not model aliasing, thread interleavings, setter side effects, or downstream object state.
      - Branch feasibility is limited to compiler constant boolean expressions, direct null equality checks, and direct null patterns; it does not perform symbolic execution, path feasibility, range analysis, or branch probability.
      - Raw expressions are not stored; expression hashes, expression kinds, resolved symbols, and line spans are emitted.

  - id: csharp.semantic.contractmapping.v1
    name: C# semantic contract mapping
    description: Records deterministic contract-adjacent mapping evidence for HTTP route/action bindings, database table/column attributes, and configuration section binding calls.
    evidenceTier: Tier1Semantic
    emits:
      - HttpRouteBinding
      - DatabaseColumnMapping
      - ConfigBinding
    limitations:
      - Requires Roslyn semantic analysis; syntax fallback does not emit these mapping facts.
      - HTTP route binding is limited to attribute-declared route/http method metadata and parameter symbols visible in source. Route conventions, endpoint builders, middleware, filters, and runtime route transforms are not expanded.
      - Database mapping is limited to attribute-declared `Table` and `Column` mappings. EF fluent configuration, conventions, migrations, provider-specific naming policies, and runtime model mutation are not resolved.
      - Config binding is limited to direct `GetSection(\"...\").Bind(...)` and `GetSection(\"...\").Get<T>()` call chains with literal section names. Options registration, named options, validation, reload behavior, and provider precedence are not inferred.
      - These facts prove source mapping declarations or calls, not runtime request routing, database schema existence, config availability, or branch reachability.

  - id: csharp.semantic.declarations.v1
    name: C# semantic declarations
    description: Finds compiler-resolved type declarations using Roslyn semantic model.
    evidenceTier: Tier1Semantic
    emits:
      - TypeDeclared
    limitations:
      - Requires project load and enough references to create a Roslyn compilation.
      - Generated source excluded from inventory is not reported.

  - id: csharp.semantic.workspace.v1
    name: C# semantic workspace gaps
    description: Records MSBuildWorkspace load, MSBuild registration, syntax tree, and compilation gaps during semantic extraction.
    evidenceTier: Tier4Unknown
    emits:
      - AnalysisGap
    limitations:
      - Workspace diagnostics can be environment-specific because they depend on installed SDKs and available project references.
      - Compilation gaps do not prevent syntax fallback facts from being emitted.
      - Native workspace messages are sanitized to stable categories before shareable artifacts are written; raw local paths, remotes, package sources, config values, credentials, and source-like snippets are omitted.

  - id: build.environment.target-framework.v1
    name: Build environment target framework diagnostics
    description: Records static target framework declarations that may explain required reference assemblies or SDK families for semantic analysis.
    evidenceTier: Tier2Structural
    emits:
      - BuildEnvironmentDiagnostic
    limitations:
      - Target framework diagnostics are static project-file evidence and do not prove runtime installation, support status, security posture, deployment compatibility, or sufficient tooling.
      - Guidance is environment compatibility context, not an instruction to install obsolete or unsafe runtimes.
      - Legacy target framework evidence is coverage-neutral unless a separate project-load, reference assembly, SDK, runtime, or toolset gap is observed.

  - id: build.environment.toolset.v1
    name: Build environment toolset diagnostics
    description: Records static MSBuild, Visual Studio, and import indicators such as ToolsVersion, VisualStudioVersion, and safe target basenames.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - BuildEnvironmentDiagnostic
    limitations:
      - Toolset indicators are static clues and do not prove that a build can run or that a particular installed tool version is sufficient.
      - TraceMap does not evaluate arbitrary imported build logic or MSBuild conditions.
      - Unsafe import values are hashed or omitted before fact IDs and artifacts are created.

  - id: build.environment.project-format.v1
    name: Build environment project format diagnostics
    description: Records legacy or unsupported project-format clues such as non-SDK-style C# projects, Web Application targets, known unsupported project GUIDs, and unknown project formats.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - BuildEnvironmentDiagnostic
    limitations:
      - Project-format diagnostics are static repository evidence and do not prove runtime IIS, desktop, database, setup, deployment, or service behavior.
      - Unsupported and unknown formats are analysis gaps; they do not prove absence of code evidence.
      - Missing compatible tooling means semantic coverage may be reduced, while syntax/config fallback evidence can still be useful.

  - id: build.environment.restore.v1
    name: Build environment restore diagnostics
    description: Records safe NuGet and restore-shape diagnostics from packages.config, PackageReference, packages.lock.json, nuget.config, and sanitized explicit restore failures.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - BuildEnvironmentDiagnostic
    limitations:
      - Restore diagnostics do not prove package absence, vulnerability, transitive dependency resolution, runtime loading, deployment, or API compatibility.
      - Package source URLs, credentials, config values, command output, and local paths are omitted or categorized before shareable artifacts are written.
      - When restore is not requested, TraceMap records scan-option context rather than claiming packages are missing.

  - id: build.environment.generated-files.v1
    name: Build environment generated and designer file diagnostics
    description: Records deterministic generated/designer-file gaps for supported WebForms, WCF service-reference, resource, and settings patterns.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - BuildEnvironmentDiagnostic
    limitations:
      - Generated-file diagnostics are analysis gaps and do not prove runtime generation, freshness, service reachability, page lifecycle behavior, or absence of code.
      - Missing or malformed generated/design-time files can cap semantic confidence but must not suppress syntax/config facts already found.
      - TraceMap does not rewrite, regenerate, or repair generated files.

  - id: build.environment.workspace-diagnostic.v1
    name: Build environment workspace diagnostics
    description: Records sanitized MSBuildWorkspace, SDK resolution, reference assembly, restore, and compilation setup categories that explain reduced semantic coverage.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - BuildEnvironmentDiagnostic
    limitations:
      - Workspace diagnostics are sanitized categories and do not include raw native output, local paths, private repository names, remotes, package sources, config values, credentials, or source snippets.
      - Categories explain why semantic coverage was reduced; they do not prove runtime compatibility or absence of repository evidence.
      - Syntax, config, SQL, WCF, and WebForms fallback facts remain valid within their own evidence tiers.

  - id: analyzer.capability.semantic.v1
    name: Analyzer semantic capability diagnostics
    description: Summarizes semantic compilation, MSBuild project load, and reference assembly capability from scan status and sanitized workspace evidence.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - AnalyzerCapabilityDiagnostic
    limitations:
      - Capability diagnostics are derived status rows and are not primary compiler symbol observations.
      - Available or reduced semantic capability does not prove runtime behavior, deployment readiness, production usage, or clean repository health.
      - Reference assembly and SDK categories summarize observed scan behavior only; they do not enumerate installed tools or prove absence outside the scan scope.

  - id: analyzer.capability.syntax-fallback.v1
    name: Analyzer syntax fallback capability diagnostics
    description: Summarizes whether syntax fallback evidence was available when semantic coverage is reduced or unavailable.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AnalyzerCapabilityDiagnostic
    limitations:
      - Syntax fallback evidence cannot prove compiler-resolved behavior, runtime reachability, overload binding, or dependency resolution.
      - Syntax fallback availability does not turn no-evidence outcomes into clean absence.
      - The diagnostic cites sanitized support facts and closed coverage labels rather than source snippets.

  - id: analyzer.capability.project-config.v1
    name: Analyzer project and config capability diagnostics
    description: Summarizes static project/config inspection capability from checked-in project, target framework, and toolchain metadata.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - AnalyzerCapabilityDiagnostic
    limitations:
      - Project/config capability is static metadata inspection and does not evaluate arbitrary MSBuild conditions, imports, runtime config transforms, or design-time execution.
      - Conditional, unsupported, malformed, or unresolved metadata remains reduced or unknown coverage rather than a clean absence conclusion.
      - Private project values are omitted, hashed, or represented as closed categories before fact IDs and artifacts are produced.

  - id: analyzer.capability.package-restore.v1
    name: Analyzer package and restore capability diagnostics
    description: Summarizes NuGet/package restore awareness from package-shape diagnostics, explicit restore option state, and sanitized restore failure categories.
    evidenceTier: Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - AnalyzerCapabilityDiagnostic
    limitations:
      - Restore not requested means dependencies were not resolved by TraceMap; it is not evidence that packages are missing.
      - Restore failure categories are sanitized and do not include package source URLs, credentials, command output, local caches, or raw config values.
      - Package/restore capability does not prove vulnerability, license, runtime loading, transitive closure, or deployment behavior.

  - id: analyzer.capability.generated-design-time.v1
    name: Analyzer generated and design-time capability diagnostics
    description: Summarizes generated/designer-file and design-time linkage capability for supported legacy static patterns.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AnalyzerCapabilityDiagnostic
    limitations:
      - Generated/design-time capability rows do not prove generated code absence or freshness outside checked-in repository evidence.
      - Missing, malformed, unlinked, or unknown design-time artifacts cap confidence but do not suppress valid syntax/config facts.
      - TraceMap does not execute designers, regenerate files, contact services, or inspect private local tool state.

  - id: analyzer.capability.legacy-toolchain.v1
    name: Analyzer legacy toolchain capability diagnostics
    description: Summarizes legacy framework, MSBuild/toolset, WebForms, WCF, ASMX, ASP.NET, and remoting capability signals from static repository evidence.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - AnalyzerCapabilityDiagnostic
    limitations:
      - Legacy toolchain capability is static guidance, not proof that Visual Studio, .NET Framework, IIS, service hosts, or runtime dependencies are installed.
      - Web, service, remoting, and generated shape evidence does not prove activation, event firing, endpoint reachability, proxy freshness, deployment, or impact.
      - Toolchain signals are informational unless observed scan behavior reduces coverage.

  - id: analyzer.capability.downstream-coverage.v1
    name: Analyzer downstream coverage capability diagnostics
    description: Summarizes reduced or unknown analyzer capability for downstream no-evidence and coverage-relative report explanations.
    evidenceTier: Tier4Unknown
    emits:
      - AnalyzerCapabilityDiagnostic
    limitations:
      - Downstream coverage context does not prove absence, impact, no-impact, runtime behavior, release readiness, or clean repository health.
      - Consumers must keep no-evidence conclusions coverage-relative when this capability is reduced, unavailable, or unknown.
      - Unsupported capability schema versions must be surfaced as compatibility gaps rather than silently dropped.

  - id: http.client.invocation.v1
    name: HTTP client invocation
    description: Finds outbound HTTP calls through common .NET HTTP APIs.
    evidenceTier: Tier1Semantic or Tier3SyntaxOrTextual
    emits:
      - HttpCallDetected
      - HttpClientCreated
    limitations:
      - Tier1 requires Roslyn symbol binding to known HTTP APIs.
      - Syntax fallback matches common method names and may include unrelated methods with the same name.
      - URL may not be fully resolvable if built dynamically or loaded from runtime configuration.

  - id: database.ef.v1
    name: Entity Framework style database surface
    description: Finds DbContext-like classes, DbSet properties, and SaveChanges calls.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - DbContextDeclared
      - DbSetDeclared
      - DbChangeSaved
    limitations:
      - Tier1 requires Roslyn symbol binding to EF or EF Core types.
      - Structural fallback uses class/base type/property type naming patterns and does not prove runtime EF usage.
      - SaveChanges syntax fallback is name-only and may include unrelated methods.

  - id: database.dapper.invocation.v1
    name: Dapper invocation
    description: Finds common Dapper Query and Execute calls.
    evidenceTier: Tier1Semantic or Tier3SyntaxOrTextual
    emits:
      - DapperCallDetected
    limitations:
      - Tier1 requires Roslyn symbol binding to Dapper SqlMapper APIs.
      - Syntax fallback is name-only for Query, QueryAsync, Execute, and ExecuteAsync and may include unrelated APIs.

  - id: database.sql.text.v1
    name: SQL text detection
    description: Finds ADO.NET SqlCommand construction, SQL-like files, and SQL-like string literals.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - SqlCommandDetected
      - SqlTextUsed
      - AnalysisGap
    limitations:
      - SQL text evidence stores hashes and lengths only; table and column guesses belong on database.sql.shape.v1 QueryPatternDetected facts.
      - C# syntax fallback may classify any complete SQL-like string literal whose first token is a supported SQL verb, even outside a recognized framework call shape.
      - Dynamic SQL construction emits reduced-coverage boundary evidence instead of complete SQL text.
      - Raw SQL text is not stored by default; hashes and spans are emitted instead.

  - id: database.sql.shape.v1
    name: Shared SQL shape detection
    description: Derives Python-v1-compatible SQL query shape hashes and safe operation/table/column metadata from simple static SQL text.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - QueryPatternDetected
    limitations:
      - The v1 queryShapeHash is the Python normalized masked SQL text hash, not a full SQL parser or dialect-aware structural hash.
      - Normalization strips comments before masking strings; `--` inside string literals follows the v1 reference behavior.
      - Double-quoted contents are masked like strings, so quoted SQL identifiers may be omitted or collapse until a parser-backed version exists.
      - Shape-hash-only facts are allowed for SQL-like WITH/CTE text and omit unsupported operation/table/column fields.
      - SELECT table extraction only claims visible top-level FROM/JOIN identifiers; subquery table positions may be left without table metadata to avoid overclaiming.
      - Static SQL shape evidence does not prove runtime execution, schema existence, dialect validity, generated SQL equivalence, permissions, transaction behavior, or branch feasibility.
      - Raw SQL text, predicate literal values, source snippets, connection strings, raw URLs, and unsafe identifiers are not rendered.

  - id: config.key.v1
    name: Configuration key extraction
    description: Parses appsettings*.json, Web.config, App.config, packages.config, and connection string entries.
    evidenceTier: Tier2Structural
    emits:
      - ConfigKeyDeclared
      - ConnectionStringDeclared
      - AnalysisGap
    limitations:
      - JSON line spans are best-effort key locations.
      - Runtime configuration providers, environment overrides, secrets stores, and transformed config files are not evaluated.
      - Raw config values and connection strings are not stored by default; hashes are emitted for sensitive values.

  - id: contract.delta.reduce.v1
    name: Contract delta reduction
    description: Matches changed contract type, property, and field names against indexed facts and classifies evidence-backed impact findings.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - ImpactFinding
    limitations:
      - Name matching is deterministic and approximate; it does not infer serialization aliases, reflection usage, or runtime contract mapping.
      - DefiniteImpact requires compiler-resolved type evidence or usage evidence for the changed member.
      - Syntax-only matches are classified as NeedsReview because symbol identity is not proven.
      - NoEvidenceFullCoverage depends on a successful full semantic scan at a known commit SHA; reduced scans only support NoEvidenceReducedCoverage.
      - UnknownAnalysisGap is emitted only when analysis-gap evidence names the changed contract element; unrelated reduced coverage is reported as NoEvidenceReducedCoverage.
      - Generic or high fan-out name matches are still reported when evidence exists, but warnings mark them as review-sensitive.

  - id: contract.delta.input.v2
    name: Contract delta v2 input validation
    description: Validates structured contract delta v2 changes and records selector/input gaps without echoing raw unsafe values.
    evidenceTier: Tier4Unknown
    emits:
      - ContractDeltaInputGap
      - SelectorNoMatch gap
    limitations:
      - Legacy v1 input is compatibility-mapped to type/property references only.
      - Unsupported kinds or change types fail closed before reduction.
      - Selector gaps describe query shape, not source-code impact evidence.

  - id: contract.delta.impact.v2
    name: Contract delta impact v2
    description: Matches structured contract delta references against single-index and combined-index TraceMap facts and emits evidence-backed static impact findings.
    evidenceTier: Tier1Semantic, Tier2Structural, Tier3SyntaxOrTextual, or Tier4Unknown
    emits:
      - ImpactFinding
      - ContractDeltaImpactGap
    limitations:
      - Findings describe deterministic static evidence, not runtime reachability, traffic, or business impact.
      - Endpoint, package, SQL, schema, and dependency-surface matches are limited to indexed static facts.
      - Generic, high fan-out, name-only, and syntax/text matches are review-sensitive.
      - NoEvidence and NoImpactEvidence classifications are coverage-relative and depend on scan identity, commit SHA, build status, and known gaps.
      - Raw SQL, literal values, connection strings, URLs, local absolute paths, and source snippets are not rendered in public reports.

  - id: contract.delta.context.v2
    name: Contract delta impact context v2
    description: Records bounded path or reverse-context availability for contract delta v2 findings when stable combined-index selectors can be derived.
    evidenceTier: Tier4Unknown
    emits:
      - PathContextUnavailable gap
      - ReverseContextUnavailable gap
    limitations:
      - Path and reverse context are optional bounded static context, not complete dependency coverage.
      - Context is emitted only when stable selectors are available without overclaiming.
      - Missing context is reported as an explicit gap rather than inferred impact or inferred safety.

  - id: typescript.project.v1
    name: TypeScript project loading
    description: Records explicit tsconfig project evidence and project-load gaps for the TypeScript scanner.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - ProjectDeclared
      - AnalysisGap
    limitations:
      - JavaScript, inferred config, and package-manager workspace discovery are follow-up work.
      - Missing dependencies reduce semantic coverage but do not stop syntax fallback.

  - id: typescript.package.v1
    name: TypeScript package metadata
    description: Reads package.json package identity, dependencies, and script key facts without storing raw script commands.
    evidenceTier: Tier2Structural
    emits:
      - ProjectDeclared
      - PackageReferenced
      - ConfigKeyDeclared
      - AnalysisGap
    limitations:
      - Package scripts are stored as hashes and key paths only.
      - Package metadata is structural evidence; it does not prove runtime loading.
      - Package dependency rows are static package.json declarations and do not prove install, lockfile resolution, bundler inclusion, import/use, or deployment.
      - Workspace resolution, registry metadata, package-manager execution, and transitive dependency solving are out of scope.

  - id: typescript.config.v1
    name: TypeScript config keys
    description: Parses JSON config files and emits deterministic key-path facts with value hashes.
    evidenceTier: Tier2Structural
    emits:
      - ConfigFileDeclared
      - ConfigKeyDeclared
      - AnalysisGap
    limitations:
      - JSON line spans are best-effort key locations.
      - Runtime configuration providers, environment overrides, and secrets stores are not evaluated.

  - id: typescript.syntax.declarations.v1
    name: TypeScript syntax declarations
    description: Finds recoverable TypeScript declaration names without requiring semantic project load.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - PropertyDeclared
      - ParameterDeclared
      - AnalysisGap
    limitations:
      - Does not prove symbol identity, overload resolution, structural type equivalence, or runtime implementation for .d.ts declarations.

  - id: typescript.syntax.memberaccess.v1
    name: TypeScript syntax member access
    description: Finds member access names from TypeScript syntax and hashes receiver expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
    limitations:
      - Name-only evidence may match unrelated members with the same name.

  - id: typescript.syntax.invocation.v1
    name: TypeScript syntax invocation
    description: Finds invocation names from TypeScript syntax without compiler binding.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - InvocationName
    limitations:
      - Receiver type, overload target, dynamic dispatch, and runtime reachability are not proven.

  - id: typescript.syntax.callgraph.v1
    name: TypeScript syntax call graph
    description: Emits syntax-only caller-to-callee edges from invocation expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - CallEdge
    limitations:
      - Caller and callee names are best-effort syntax names.

  - id: typescript.syntax.objectcreation.v1
    name: TypeScript syntax object creation
    description: Emits syntax-only object creation facts from new expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Constructor overload and package identity are not proven without semantic analysis.

  - id: typescript.syntax.logicshape.v1
    name: TypeScript syntax logic shape
    description: Emits deterministic syntax signals for calculation, branching, and boilerplate-like code.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - CalculationExpression
      - BranchingLogic
      - InfrastructureBoilerplate
    limitations:
      - Logic shape facts are review-routing signals, not proof of business intent.

  - id: typescript.syntax.objectshape.v1
    name: TypeScript syntax object shape
    description: Records object-literal field shapes with sorted field names, shape hashes, expression hashes, and source spans.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectShapeInferred
    limitations:
      - Object shape facts are syntax evidence only; they do not prove DTO schemas, serializer output, runtime object contents, or nullability.
      - Nested object semantics, spread contents, mutation after construction, and branch feasibility are not expanded in this rule.
      - Raw object expressions and literal values are not stored.

  - id: typescript.semantic.declarations.v1
    name: TypeScript semantic declarations
    description: Emits compiler-resolved declaration facts with TraceMap-native TypeScript symbol IDs.
    evidenceTier: Tier1Semantic
    emits:
      - TypeDeclared
      - MethodDeclared
      - PropertyDeclared
      - ParameterDeclared
    limitations:
      - Requires a loadable TypeScript program and enough dependencies/path mappings for binding.
      - Symbol IDs are stable for the same scan inputs but may change across file renames, package version changes, and compiler binding changes.

  - id: typescript.semantic.propertyaccess.v1
    name: TypeScript semantic property access
    description: Emits compiler-resolved property access facts with reducer-compatible property keys.
    evidenceTier: Tier1Semantic
    emits:
      - PropertyAccessed
    limitations:
      - Does not prove reflection, dynamic property construction, proxy behavior, or runtime branch reachability.

  - id: typescript.semantic.methodinvocation.v1
    name: TypeScript semantic method invocation
    description: Emits compiler-resolved function and method invocation facts with reducer-compatible method keys.
    evidenceTier: Tier1Semantic
    emits:
      - MethodInvoked
    limitations:
      - Dynamic dispatch targets, decorator effects, dependency injection, and runtime interface implementations are not inferred.

  - id: typescript.semantic.callgraph.v1
    name: TypeScript semantic call graph
    description: Emits compiler-resolved call-edge facts when TypeScript exposes callee symbols.
    evidenceTier: Tier1Semantic
    emits:
      - CallEdge
    limitations:
      - A call edge records a syntactic call site, not proof that the path executes at runtime.

  - id: typescript.semantic.objectcreation.v1
    name: TypeScript semantic object creation
    description: Emits compiler-resolved object creation facts with created type and caller evidence.
    evidenceTier: Tier1Semantic
    emits:
      - ObjectCreated
    limitations:
      - Does not model factory-returned runtime types, dependency-injection activations, or deserializer-created instances.

  - id: typescript.semantic.valueflow.v1
    name: TypeScript semantic argument value flow
    description: Records direct call-site argument-to-parameter facts with expression hashes and shared argument/parameter role metadata when compiler symbols are available.
    evidenceTier: Tier1Semantic
    emits:
      - ArgumentPassed
    limitations:
      - Tracks direct call-site arguments only; field/property aliases and interprocedural parameter-forward edges are follow-up work.
      - Parameter role metadata is emitted only when the TypeScript compiler resolves the call signature; unresolved syntax fallback remains lower-tier evidence.

  - id: typescript.semantic.localalias.v1
    name: TypeScript semantic local alias
    description: Records simple local aliases assigned from resolved symbols.
    evidenceTier: Tier1Semantic
    emits:
      - LocalAlias
    limitations:
      - Does not model mutation, closure capture, collection contents, property aliases, or alias invalidation through control flow.

  - id: typescript.semantic.symbolidentity.v1
    name: TypeScript semantic symbol identity
    description: Adds TraceMap-native TypeScript symbol IDs and symbol occurrence rows to semantic facts.
    evidenceTier: Tier1Semantic
    emits:
      - symbols table rows
      - symbol_occurrences table rows
      - fact_symbols table rows
    limitations:
      - TypeScript IDs are not SCIP-compatible and are not guaranteed stable across package/file/compiler identity changes.

  - id: typescript.semantic.symbolrelationship.v1
    name: TypeScript semantic symbol relationships
    description: Emits direct extends, implements, and explicit override relationships when TypeScript resolves the symbols.
    evidenceTier: Tier1Semantic
    emits:
      - SymbolRelationship
      - symbol_relationships table rows
    limitations:
      - Structural type compatibility, transitive relationships, and runtime dispatch are not inferred.
      - Overrides are emitted only for explicit TypeScript override syntax in this MVP.

  - id: typescript.integration.http.v1
    name: TypeScript HTTP integration
    description: Detects fetch and axios HTTP call shapes with hashed URL evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - HttpCallDetected
    limitations:
      - Dynamic URL construction, interceptor behavior, and runtime client configuration are not resolved.

  - id: typescript.integration.route.v1
    name: TypeScript route integration
    description: Detects Express-style route method calls with hashed route literals.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - HttpRouteBinding
    limitations:
      - Middleware, route composition, framework decorators, and runtime route registration are not expanded.

  - id: typescript.integration.serializer.v1
    name: TypeScript serializer integration
    description: Detects JSON.parse and JSON.stringify calls as serializer boundary evidence.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - SerializationLogic
    limitations:
      - Serializer options, replacers, revivers, and schema validation are not interpreted.

  - id: typescript.integration.database.v1
    name: TypeScript database integration
    description: Detects Prisma client call shapes as database boundary evidence.
    evidenceTier: Tier2Structural or Tier1Semantic
    emits:
      - DatabaseColumnMapping
    limitations:
      - Prisma schema files, migrations, query middleware, and runtime client extensions are not modeled in MVP.

  - id: typescript.integration.sql.v1
    name: TypeScript direct SQL integration
    description: Detects direct SQL client literals and tagged SQL templates, emitting hash-only SQL text evidence and SQL-shape query patterns when complete static SQL text is visible.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - SqlTextUsed
      - QueryPatternDetected
      - AnalysisGap
    limitations:
      - Detection is syntax-only for supported direct SQL call and tag shapes; supported method names are query, execute, raw, executeRaw, $queryRaw, and $executeRaw, and unrelated APIs with those names may be missed or require SQL-like first arguments to avoid overclaiming.
      - Template literals with non-static expressions emit dynamic-boundary gaps rather than complete SQL text evidence.
      - Prisma/Base44 query-builder facts remain under typescript.integration.querypattern.v1 and are not SQL-shape evidence unless direct SQL text is present.
      - The v1 queryShapeHash follows Python normalized masked SQL text semantics, including comment-before-string masking and double-quoted-content caveats.
      - Static SQL shape evidence does not prove runtime execution, schema existence, dialect validity, generated SQL equivalence, permissions, transaction behavior, or branch feasibility.
      - Raw SQL text, predicate literal values, source snippets, connection strings, raw URLs, and unsafe identifiers are not rendered.

  - id: typescript.integration.contractmapping.v1
    name: TypeScript contract mapping integration
    description: Detects Zod schema call shapes as structural contract mapping evidence.
    evidenceTier: Tier2Structural
    emits:
      - SerializerContractMember
    limitations:
      - Schema composition, refinements, transforms, and runtime validation paths are not fully expanded.

  - id: typescript.integration.boundary.v1
    name: TypeScript integration boundary
    description: Detects process.env reads and other MVP boundary shapes without claiming runtime state.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ConfigKeyDeclared
    limitations:
      - Environment variable availability, provider precedence, and deployment configuration are not proven.

  - id: typescript.integration.querypattern.v1
    name: TypeScript integration query pattern
    description: Records Prisma-style and Base44-style entity query call shapes with where, orderBy, select, include, data, filter, sort, and mutation field names plus hashed patterns.
    evidenceTier: Tier2Structural
    emits:
      - QueryPatternDetected
    limitations:
      - Structural query evidence does not prove generated SQL, runtime execution, database schema existence, or branch feasibility.
      - Prisma/Base44 query-builder facts are not SQL-shape facts and do not emit sqlSourceKind.
      - Only statically visible object-literal and simple string sort arguments are inspected in MVP; variables, spreads, helper-built filters, and dynamic keys need later flow rules.
      - Literal values and raw object text are not stored; field names, operation names, hashes, and spans are emitted.
      - Reports may display safe derived query metadata and hashes, but must not display raw SQL text, literal values, or unsafe identifiers.

  - id: typescript.integration.angular-httpclient.v1
    name: TypeScript Angular HttpClient integration
    description: Detects Angular HttpClient calls, hashes raw URL expressions, and stores normalized route templates/keys when statically visible.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - HttpCallDetected
    limitations:
      - Static extraction does not prove runtime interceptor rewrites, proxy configuration, deployment base paths, auth state, CORS behavior, or whether a call executes.
      - Environment base URL values are not stored raw; only hash evidence and cleartext relative path suffixes such as /api are stored for matching.
      - Variables, helper functions, destructured methods, indirect receivers, and complex URL expressions are marked dynamic and require review.

  - id: csharp.syntax.aspnetroute.v1
    name: C# ASP.NET syntax route fallback
    description: Extracts ASP.NET controller attribute route bindings from C# syntax and normalizes route templates without requiring framework references.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - HttpRouteBinding
    limitations:
      - Syntax fallback does not prove runtime route registration, middleware ordering, conventional routes, minimal APIs, endpoint filters, route groups, or custom route attributes.
      - Supports literal controller/method route attributes and common Http* attributes; non-literal route constants and advanced routing are not guessed.
      - Route constraints and optional segments are retained as evidence, but runtime constraint behavior is not evaluated.

  - id: endpoint.alignment.v1
    name: Cross-index endpoint alignment
    description: Derives a report by matching client HttpCallDetected facts to server HttpRouteBinding facts by HTTP method and normalized route key.
    evidenceTier: Derived report over source evidence
    emits:
      - endpoint-report.md
      - endpoint-report.json
    limitations:
      - Endpoint findings are derived report rows, not source facts.
      - Matching is static and coverage-relative; client-only findings are not proof of broken calls and server-only findings are not proof of dead or unused endpoints.
      - Does not prove runtime reachability, reverse proxy behavior, auth policies, feature flags, branch feasibility, deployment routing, or generated OpenAPI behavior.
      - MVP compares one client index and one server index; N-way combined dependency analysis and endpoint diffs are follow-up work.

  - id: jvm.file.inventory.v1
    name: JVM file inventory
    description: Records deterministic inventory facts for supported Java, Kotlin, Maven, Gradle, config, XML, JSON, YAML, and SQL files.
    evidenceTier: Tier2Structural
    emits:
      - FileInventoried
    limitations:
      - File presence is structural evidence only and does not prove build or runtime usage.
      - Generated output, build output, dependency caches, and TraceMap output directories are excluded by default.

  - id: jvm.buildfile.v1
    name: JVM build file metadata
    description: Extracts local Maven and literal Gradle module/dependency metadata without running build tools.
    evidenceTier: Tier2Structural
    emits:
      - ProjectDeclared
      - PackageReferenced
      - AnalysisGap
    limitations:
      - Maven parent POMs are resolved only when local files are present.
      - Gradle extraction is literal-only; version catalogs, convention plugins, buildSrc, composite builds, and interpolation are reduced-coverage gaps.
      - Dependency metadata is structural and does not prove the dependency is resolved on the scanner classpath.
      - JVM package facts do not prove Maven/Gradle execution, dependency cache contents, transitive dependency resolution, runtime class loading, or deployment.

  - id: jvm.config.v1
    name: JVM config files
    description: Extracts config file declarations and key paths from properties, JSON, YAML, XML, and env-like config files with hashed values.
    evidenceTier: Tier2Structural
    emits:
      - ConfigFileDeclared
      - ConfigKeyDeclared
      - AnalysisGap
    limitations:
      - Config precedence, profile activation, environment overrides, and runtime availability are not evaluated.
      - Values are hashed and not stored raw.

  - id: jvm.java.syntax.declarations.v1
    name: Java syntax declarations
    description: Finds Java package, type, method, field, parameter, annotation, and simple relationship syntax without relying on compilation.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - FieldDeclared
      - ParameterDeclared
      - AttributeUsed
      - SymbolRelationship
    limitations:
      - Syntax evidence does not prove symbol identity, overload resolution, generated code, or runtime dispatch.
      - Relationship targets are syntax names when semantic binding is unavailable.

  - id: jvm.java.syntax.invocation.v1
    name: Java syntax invocation
    description: Finds Java member access and invocation names without resolving receiver types or overloads.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
      - InvocationName
      - ArgumentPassed
    limitations:
      - Does not prove receiver type, overload target, extension/framework behavior, reflection, or runtime dispatch.
      - Argument flow is call-site shape evidence only when semantic binding is unavailable.

  - id: jvm.java.syntax.callgraph.v1
    name: Java syntax call graph
    description: Emits syntax-only caller-to-callee edges from Java invocation expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - CallEdge
      - ArgumentPassed
    limitations:
      - Caller/callee symbols are best-effort source names, not compiler-resolved symbols.
      - Dynamic dispatch, lambdas, reflection, method references, and async/thread behavior are not modeled.

  - id: jvm.java.syntax.objectcreation.v1
    name: Java syntax object creation
    description: Emits syntax-only object creation facts from Java constructor expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Created type and constructor are syntax names and may not be fully qualified.
      - Constructor overload and dependency-injection activation are not proven.

  - id: jvm.java.syntax.logicshape.v1
    name: Java syntax logic shape
    description: Emits deterministic syntax signals for calculation, branching, and boilerplate-like Java code.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - CalculationExpression
      - BranchingLogic
      - InfrastructureBoilerplate
    limitations:
      - Logic shape facts are review-routing heuristics, not proof of business intent.
      - Raw expressions are not stored; expression hashes and spans are emitted.

  - id: jvm.java.semantic.declarations.v1
    name: Java semantic declarations
    description: Emits compiler-resolved Java type, method, field, and parameter declaration facts using JDK compiler APIs.
    evidenceTier: Tier1Semantic
    emits:
      - TypeDeclared
      - MethodDeclared
      - FieldDeclared
      - ParameterDeclared
    limitations:
      - Requires a JDK compiler and enough classpath/source context for symbols to resolve.
      - Annotation processors are disabled; generated declarations are not created during scan.

  - id: jvm.java.semantic.memberaccess.v1
    name: Java semantic member access
    description: Emits compiler-resolved Java field/member access facts with reducer-friendly plain symbol names.
    evidenceTier: Tier1Semantic
    emits:
      - PropertyAccessed
    limitations:
      - Requires compiler symbol resolution.
      - Does not infer reflection, dynamic proxies, Lombok-generated accessors, or runtime dispatch targets.

  - id: jvm.java.semantic.invocation.v1
    name: Java semantic invocation
    description: Emits compiler-resolved Java method invocation facts.
    evidenceTier: Tier1Semantic
    emits:
      - MethodInvoked
    limitations:
      - Requires compiler symbol resolution.
      - Does not model runtime polymorphism, reflection targets, dependency injection, method references, or async/thread execution.

  - id: jvm.java.semantic.callgraph.v1
    name: Java semantic call graph
    description: Emits compiler-resolved Java caller-to-callee call edges.
    evidenceTier: Tier1Semantic
    emits:
      - CallEdge
    limitations:
      - Records syntactic call sites, not proof that a branch executes at runtime.
      - Dynamic dispatch, callbacks, reflection, and framework wiring are not expanded.

  - id: jvm.java.semantic.objectcreation.v1
    name: Java semantic object creation
    description: Emits compiler-resolved Java object creation facts.
    evidenceTier: Tier1Semantic
    emits:
      - ObjectCreated
    limitations:
      - Does not model dependency-injection-created instances, reflection-created objects, deserialization, or factory-return runtime types.

  - id: jvm.java.semantic.valueflow.v1
    name: Java semantic argument value flow
    description: Maps resolved Java call-site argument expressions to callee parameter names with shared argument/parameter role metadata and records simple local aliases when the initializer resolves to a symbol.
    evidenceTier: Tier1Semantic
    emits:
      - ArgumentPassed
      - LocalAlias
    limitations:
      - Tracks direct call-site arguments only.
      - Argument role metadata is emitted only when javac resolves the argument expression to a symbol.
      - Local aliases are limited to direct local variable initializers with a resolved origin symbol.
      - Does not perform interprocedural aliasing, field aliasing, mutation tracking, collection contents, branch feasibility, or async/callback flow.

  - id: jvm.java.semantic.relationship.v1
    name: Java semantic relationships
    description: Emits compiler-resolved Java extends and implements relationships.
    evidenceTier: Tier1Semantic
    emits:
      - SymbolRelationship
    limitations:
      - Missing dependencies, generated sources, or annotation processors reduce relationship coverage.
      - Runtime proxies and dependency injection substitutions are not modeled.

  - id: jvm.kotlin.syntax.declarations.v1
    name: Kotlin syntax declarations
    description: Finds Kotlin package, type, function, and annotation syntax without Kotlin compiler semantic analysis.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - AttributeUsed
    limitations:
      - Kotlin MVP support is syntax-only; symbol identity, overload resolution, extension dispatch, compiler plugins, and generated members are not proven.

  - id: jvm.kotlin.syntax.invocation.v1
    name: Kotlin syntax invocation
    description: Finds Kotlin member access, invocation names, and syntax call edges.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
      - InvocationName
      - CallEdge
      - HttpRouteBinding
    limitations:
      - Does not prove receiver type, Ktor runtime installation, extension dispatch, coroutine behavior, or overload target.

  - id: jvm.kotlin.syntax.objectcreation.v1
    name: Kotlin syntax object creation
    description: Emits syntax-only object creation facts for Kotlin constructor-like calls.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Constructor-like syntax can also be ordinary function calls; semantic Kotlin extraction is required for stronger evidence.

  - id: jvm.integration.http.route.v1
    name: JVM HTTP route integration
    description: Detects Spring, JAX-RS, and syntax-only Ktor route evidence and stores normalized route keys.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - HttpRouteBinding
    limitations:
      - Static extraction does not prove runtime route registration, middleware/filter behavior, profiles, reverse proxies, auth, or deployment base paths.
      - Ktor route evidence is syntax/structural only until Kotlin semantic extraction exists.

  - id: jvm.integration.sql.v1
    name: JVM SQL integration
    description: Detects SQL resources, JDBC SQL literals, and JPA query literals with hashed SQL evidence.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - SqlFileDeclared
      - SqlTextUsed
      - QueryPatternDetected
    limitations:
      - SQL text hashes and SQL-shape hashes do not prove runtime execution, database schema existence, generated SQL, dialect validity, permissions, transaction behavior, or branch feasibility.
      - The v1 queryShapeHash follows Python normalized masked SQL text semantics, including comment-before-string masking and double-quoted-content caveats.
      - SQL-like WITH/CTE text may emit shape-hash-only QueryPatternDetected without operation/table/column metadata.
      - Dynamic or concatenated SQL literals are not complete SQL text evidence.
      - JDBC/JPA literal detection is conservative and may miss overloaded calls with trailing non-SQL arguments when the visible SQL shape cannot be isolated safely.
      - When JVM query-pattern facts are emitted, reports may display safe derived query metadata and hashes, but must not display raw SQL text, literal values, or unsafe identifiers.

  - id: jvm.integration.jpa.v1
    name: JVM JPA mapping integration
    description: Detects JPA entity and column mapping annotations as persistence boundary evidence.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - DatabaseColumnMapping
    limitations:
      - Naming conventions and annotation presence do not prove runtime entity manager configuration, migrations, generated schema, or lazy-loading behavior.

  - id: jvm.integration.serializer.v1
    name: JVM serializer integration
    description: Detects Jackson explicit serializer contract members and broad serializer logic.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - SerializerContractMember
      - SerializationLogic
    limitations:
      - Serializer runtime configuration, modules, mixins, naming policies, and profile-specific behavior are not evaluated.
      - SerializationLogic is report/export evidence; SerializerContractMember is the reducer-probable serializer fact.

  - id: jvm.integration.configuse.v1
    name: JVM config usage integration
    description: Detects Spring @Value, Environment/System property reads, and environment variable access with hashed/static key evidence.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - ConfigKeyDeclared
    limitations:
      - Runtime config providers, precedence, environment contents, profiles, and secret availability are not proven.

  - id: python.package.metadata.v1
    name: Python package metadata
    description: Emits Python package dependency facts from pyproject.toml, setup.cfg, setup.py literals, and requirements files.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - PackageReferenced
      - AnalysisGap
    limitations:
      - setup.py is parsed for literal dependency lists only and is never executed.
      - Dependency resolution, extras, lockfile solving, environment markers, and installed package versions are not proven.
      - Direct URLs, editable installs, local paths, and dynamic declarations are represented as hash-only metadata or gaps; raw values are not rendered.

  - id: python.ast.declarations.v1
    name: Python AST declarations
    description: Emits syntax-level class, function, field, and parameter declaration facts from Python AST.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - TypeDeclared
      - MethodDeclared
      - FieldDeclared
      - ParameterDeclared
    limitations:
      - Python MVP does not run a type checker or import user code.
      - Dynamic class creation, monkey patching, decorators that add members, and runtime annotations are not expanded.

  - id: python.ast.imports.v1
    name: Python AST imports
    description: Tracks import roots used to classify bounded Python integration patterns.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - AnalysisGap
    limitations:
      - Import aliases help classify local syntax only; imported module contents and runtime side effects are not loaded.

  - id: python.ast.invocation.v1
    name: Python AST invocation
    description: Emits syntax-level member access and invocation-name facts.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - MemberAccessName
      - InvocationName
    limitations:
      - Receiver type, overload target, dynamic dispatch, monkey patching, decorators, and runtime bindings are not proven.

  - id: python.ast.callgraph.v1
    name: Python AST call graph
    description: Emits syntax-level caller-to-callee call-edge facts from call expressions.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - CallEdge
    limitations:
      - Callee names are syntax names and may be local functions, methods, constructors, or callable objects.
      - Branch feasibility, callbacks, async scheduling, decorators, dynamic dispatch, and framework wiring are not modeled.

  - id: python.ast.objectcreation.v1
    name: Python AST object creation
    description: Emits syntax-level object creation facts for constructor-like calls.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ObjectCreated
    limitations:
      - Constructor-like syntax can be ordinary callable invocation in Python.
      - Factory return types, dependency injection, deserialization, and runtime metaclass behavior are not proven.

  - id: python.ast.argumentflow.v1
    name: Python AST argument flow
    description: Emits direct parameter-to-call argument flow, simple local alias facts, and direct self-field alias facts with shared role metadata where AST-visible names are available.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - ArgumentPassed
      - LocalAlias
      - FieldAlias
    limitations:
      - Tracks direct same-function call arguments, local aliases, and self-field assignments only.
      - Callee parameters are ordinal placeholders unless a future Python semantic layer resolves callable signatures.
      - Does not model transitive aliasing, mutation, collection contents, interprocedural return values, branch feasibility, async/callback flow, or dynamic kwargs expansion.

  - id: python.ast.relationships.v1
    name: Python AST symbol relationships
    description: Emits syntax-level class inheritance relationships.
    evidenceTier: Tier3SyntaxOrTextual
    emits:
      - SymbolRelationship
    limitations:
      - Base names are syntax names and may not be fully qualified.
      - MRO, metaclasses, protocols, mixins loaded dynamically, and runtime base mutation are not evaluated.

  - id: python.ast.dynamic-boundary.v1
    name: Python dynamic boundary
    description: Emits analysis gaps and syntax-only boundary evidence for Python constructs that require runtime context.
    evidenceTier: Tier3SyntaxOrTextual or Tier4Unknown
    emits:
      - AnalysisGap
      - HttpRouteBinding
    limitations:
      - Dynamic routes, dynamic SQL, dynamic config keys, importlib targets, and unparsable files remain review evidence rather than resolved facts.

  - id: python.integration.fastapi.v1
    name: Python FastAPI integration
    description: Detects FastAPI and APIRouter route decorator bindings with normalized route keys.
    evidenceTier: Tier2Structural
    emits:
      - HttpRouteBinding
    limitations:
      - Static extraction does not prove runtime router inclusion, dependency overrides, middleware, auth, deployment prefixes, or generated OpenAPI output.

  - id: python.integration.flask.v1
    name: Python Flask integration
    description: Detects Flask route decorator bindings with normalized route keys.
    evidenceTier: Tier2Structural
    emits:
      - HttpRouteBinding
    limitations:
      - Static extraction does not prove app factory behavior, blueprint registration, middleware, auth, reverse proxies, or runtime route mutation.

  - id: python.integration.pydantic.v1
    name: Python Pydantic integration
    description: Emits serializer contract member evidence for classes deriving from BaseModel.
    evidenceTier: Tier2Structural
    emits:
      - SerializerContractMember
    limitations:
      - Field aliases, validators, computed fields, runtime config, model serializers, and version-specific behavior are not fully evaluated in MVP.

  - id: python.integration.dataclass.v1
    name: Python dataclass integration
    description: Emits serializer-like structural member evidence for dataclass fields.
    evidenceTier: Tier2Structural
    emits:
      - SerializerContractMember
    limitations:
      - Runtime serializers, custom encoders, post-init mutation, default factories, and inheritance behavior are not proven.

  - id: python.integration.sqlalchemy.v1
    name: Python SQLAlchemy integration
    description: Detects SQLAlchemy declarative column mapping syntax.
    evidenceTier: Tier2Structural
    emits:
      - DatabaseColumnMapping
    limitations:
      - Runtime engine configuration, migrations, generated schema, hybrid properties, relationships, naming conventions, and lazy-loading behavior are not proven.

  - id: python.integration.sql.v1
    name: Python SQL integration
    description: Detects SQL files and direct SQL text literals used by common DB-API or SQLAlchemy call shapes, and derives lightweight query-pattern metadata when statically visible.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - SqlFileDeclared
      - SqlTextUsed
      - QueryPatternDetected
      - AnalysisGap
    limitations:
      - SQL text is hashed and operation-shaped; raw SQL text and literal values are not stored by default.
      - Query-pattern extraction is best-effort for simple static SQL operation, table, and column shapes; full SQL parsing, dialect behavior, schema existence, generated SQL, and runtime execution are not proven.
      - The v1 queryShapeHash is the Python normalized masked SQL text reference; comment-before-string masking and double-quoted-content masking are known caveats.
      - SQL-like WITH/CTE text may emit shape-hash-only QueryPatternDetected without operation/table/column metadata.
      - Reports may display safe derived table, column, source-kind, and shape-hash metadata, but must not display raw SQL text, literal values, or unsafe identifiers.
      - Quoted identifiers may be treated conservatively as string literals by lightweight SQL shape extraction and missed until a shared SQL parser exists.
      - Tier2 query patterns are structural evidence only; Tier3 query patterns are review-routing evidence and should not be treated as semantic database proof.

  - id: python.integration.config.v1
    name: Python config integration
    description: Detects config files, Python config module assignments, and static os.environ/os.getenv key reads.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - ConfigFileDeclared
      - ConfigKeyDeclared
      - AnalysisGap
    limitations:
      - Runtime config providers, environment contents, secret availability, precedence, profiles, and dynamic key construction are not proven.

  - id: python.integration.httpclient.v1
    name: Python HTTP client integration
    description: Detects requests and httpx HTTP calls with normalized static URL path keys when literals are present.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - HttpCallDetected
    limitations:
      - Runtime base URLs, sessions, auth, retries, proxies, redirects, and dynamically constructed URLs are not resolved.

  - id: python.boilerplate.v1
    name: Python boilerplate shape
    description: Reserved for deterministic Python infrastructure or boilerplate classification.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - InfrastructureBoilerplate
    limitations:
      - Boilerplate classification is a review-routing heuristic and not proof of business intent.

  - id: release.review.rollup.v1
    name: Release review rollup
    description: Emits deterministic release-review summary classifications from underlying TraceMap findings and gaps.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewSummary
    limitations:
      - Rollups summarize static evidence only and are not release approval, CI policy, runtime risk prediction, or production usage proof.
      - Rollup strength is bounded by source identity, commit SHA availability, coverage, truncation, and unavailable workflow gaps.
      - Underlying classifications, rule IDs, evidence tiers, and limitations remain authoritative.

  - id: release.review.checklist.v1
    name: Release review checklist
    description: Emits deterministic checklist items derived only from release-review findings and gaps.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewChecklistItem
    limitations:
      - Checklist items are review-routing prompts, not generated advice or release decisions.
      - Items are derived from static findings and gaps and may omit runtime, deployment, and business context.

  - id: release.review.source.v1
    name: Release review source identity and coverage
    description: Emits source pairing, commit SHA, identity, and coverage gaps for release-review comparisons.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewSourceCoverage
      - ReleaseReviewGap
    limitations:
      - Repository identity is hash-based and cannot prove ownership or runtime deployment equivalence.
      - Missing or reduced coverage makes absence of evidence coverage-relative.
      - Unknown commit SHAs prevent history-completeness claims.

  - id: release.review.section.v1
    name: Release review section status
    description: Emits unavailable, deferred, unsupported-mode, and workflow-status gaps for release-review sections.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewGap
    limitations:
      - Unavailable or deferred sections are explicit analysis gaps, not clean results.
      - Section status does not imply an underlying workflow ran unless the status is available with findings or gaps from that workflow.

  - id: release.review.selector.v1
    name: Release review selector handling
    description: Emits gaps when release-review selectors are ignored or cannot apply to enabled scopes.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewGap
    limitations:
      - Selector no-match or ignored-selector output reflects static indexed evidence only.
      - Dynamic routes, generated configuration, reduced coverage, or unavailable sections can hide otherwise relevant evidence.

  - id: release.review.truncation.v1
    name: Release review truncation
    description: Emits gaps when release-review caps omit findings, path rows, reverse rows, checklist items, or gaps.
    evidenceTier: Tier4Unknown
    emits:
      - ReleaseReviewGap
    limitations:
      - Truncated reports are incomplete by construction and must not be interpreted as comprehensive.
      - Omitted counts are deterministic for the selected scope and caps, but not evidence of lower importance.

  - id: portfolio.identity.v1
    name: Portfolio source identity
    description: Emits portfolio source identity rows and gaps from TraceMap scan metadata, commit SHAs, labels, and manifest expectations.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioSource
      - PortfolioGap
    limitations:
      - Repository identity is hash-based and cannot prove runtime deployment, ownership, or service equivalence.
      - Duplicate source identity is excluded from cross-source grouping to avoid double-counting evidence.
      - Manifest expected identity is a validation hint, not a replacement for indexed source provenance.

  - id: portfolio.coverage.v1
    name: Portfolio coverage summary
    description: Emits portfolio source coverage rows from analysis level, build status, commit SHA availability, and known analysis gaps.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioSourceCoverage
      - PortfolioGap
    limitations:
      - Reduced coverage makes absence of evidence coverage-relative.
      - Coverage is static analysis coverage, not runtime exercise or test coverage.

  - id: portfolio.schema.v1
    name: Portfolio schema gap
    description: Emits portfolio gaps when an input index lacks required or optional TraceMap schema objects.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Missing schema prevents only the affected portfolio section from making stronger claims.
      - Schema gaps are not evidence that dependencies are absent.

  - id: portfolio.endpoint.alignment.v1
    name: Portfolio endpoint alignment
    description: Emits cross-source endpoint findings by reusing TraceMap static method/path matching over indexed HTTP client and route facts.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - PortfolioEndpointFinding
    limitations:
      - Endpoint alignment is static method/path evidence and does not prove runtime traffic, deployment paths, auth, proxy, CORS, or reachability.
      - Dynamic or unnormalized URLs are review-tier evidence only.
      - Source-local ambiguity prevents stronger endpoint conclusions.

  - id: portfolio.surface.inventory.v1
    name: Portfolio dependency surface inventory
    description: Emits source-scoped portfolio dependency surface rows from indexed HTTP, SQL, package, config, resource, and persistence evidence.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - PortfolioSurface
    limitations:
      - Surface rows are static evidence and do not prove runtime use, compatibility, schema existence, package restore, or deployment topology.
      - Raw SQL, snippets, config values, URLs, local paths, and secret-looking values must be omitted, redacted, or hashed.

  - id: portfolio.surface.group.v1
    name: Portfolio shared surface grouping
    description: Groups safe portfolio surface identities across sources while preserving all supporting source evidence.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - PortfolioSharedSurface
    limitations:
      - Shared surface identity does not prove runtime coupling, ownership, traffic, or business dependency.
      - Tier3, dynamic, hash-only, duplicate, or reduced-coverage support keeps the group review-tier.

  - id: portfolio.edge.inventory.v1
    name: Portfolio dependency edge inventory
    description: Emits source-scoped static call, object creation, symbol relationship, argument-flow, and parameter-forwarding edge rows.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - PortfolioEdge
    limitations:
      - Static edges do not prove dynamic dispatch targets, runtime DI registrations, reflection targets, branch feasibility, or collection contents.

  - id: portfolio.diff.v1
    name: Portfolio source diff
    description: Emits source-level before/after portfolio comparison rows from manifest labels and source identity evidence.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioDiffRow
    limitations:
      - V1 source diff does not replace combined diff, impact, path, or reverse workflows.
      - Identity ambiguity downgrades comparisons to review-tier evidence.

  - id: portfolio.impact.context.v1
    name: Portfolio impact context status
    description: Emits portfolio impact context status and deferred/unavailable gaps when impact composition is requested but not available in v1.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Deferred impact context is an explicit analysis gap, not a clean result.
      - Portfolio impact does not introduce a competing impact classifier.

  - id: portfolio.optional-context.v1
    name: Portfolio optional context status
    description: Emits path, reverse, and release-review context statuses for portfolio reports.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Not-requested sections did not run and must not be interpreted as no evidence.
      - Deferred or unavailable sections are explicit analysis gaps for that context.

  - id: portfolio.selector.v1
    name: Portfolio selector handling
    description: Emits portfolio selector no-match and ignored-selector gaps for source, group, surface, and surface-name filters.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Selector no-match reflects indexed static evidence only.
      - Dynamic evidence, reduced coverage, or unavailable sections can hide otherwise relevant evidence.

  - id: portfolio.truncation.v1
    name: Portfolio truncation
    description: Emits gaps and omitted counts when portfolio row caps truncate sources, endpoints, surfaces, edges, groups, diffs, paths, roots, or gaps.
    evidenceTier: Tier4Unknown
    emits:
      - PortfolioGap
    limitations:
      - Truncated portfolio reports are incomplete by construction.
      - Omitted counts are deterministic for selected caps and scope, but not evidence of lower importance.

  - id: portfolio.redaction.v1
    name: Portfolio redaction
    description: Documents portfolio safe-rendering behavior for paths, URLs, SQL, snippets, config values, and secret-looking metadata.
    evidenceTier: Tier4Unknown
    emits:
      - RedactedValue
      - UnsafePropertyOmitted
    limitations:
      - Redaction preserves review safety at the cost of losing raw values.
      - Hashes are comparison aids only and must not be treated as decoded or verified secrets.

  - id: api.dto.contract.diff.endpoint.v1
    name: API/DTO endpoint contract diff
    description: Compares indexed static endpoint route and route-shape evidence between two TraceMap snapshots.
    evidenceTier: Tier2Structural or Tier3SyntaxOrTextual
    emits:
      - ApiDtoContractDiffRow
    limitations:
      - Endpoint rows compare static method/path/handler/route metadata only and do not prove runtime traffic, deployment base paths, proxies, auth, CORS, or reachability.
      - Path-only, display-only, syntax-only, duplicate, or identity-unverified endpoints are review-tier.
      - Handler changes under a stable route identity are changed static evidence, not proof of runtime dispatch.

  - id: api.dto.contract.diff.dto.v1
    name: API/DTO type and member contract diff
    description: Compares indexed DTO/type/member/method evidence between two TraceMap snapshots.
    evidenceTier: Tier1Semantic, Tier2Structural, or Tier3SyntaxOrTextual
    emits:
      - ApiDtoContractDiffRow
    limitations:
      - DTO rows compare only metadata indexed by language adapters and do not prove OpenAPI completeness, runtime serializer mapping, binary compatibility, generated code coverage, or runtime object mutation.
      - Missing declared type, nullability, requiredness, containing type, alias, assembly, package, or module metadata downgrades affected rows.
      - Generic property-only identities such as id, type, name, and status are review-tier unless containing type identity is available.

  - id: api.dto.contract.diff.attachment.v1
    name: API/DTO request-response attachment diff
    description: Compares endpoint-to-DTO request/response attachment evidence where adapters emit credible attachment facts; otherwise emits explicit attachment gaps.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - ApiDtoContractDiffRow
      - ApiDtoContractDiffGap
    limitations:
      - Absence of endpoint-to-DTO attachment evidence is an analysis gap, not proof that request or response contracts did not change.
      - Status-code and response-kind behavior is preserved only when explicitly indexed and is not inferred from framework conventions.
      - Runtime serializer, model binding, dependency injection, filters, and dynamic response behavior are not resolved.

  - id: api.dto.contract.diff.identity.v1
    name: API/DTO contract diff source and stable identity
    description: Emits source identity, duplicate contract identity, and stable-key downgrade gaps for API/DTO contract diffs.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractSourcePair
      - ApiDtoContractDiffGap
    limitations:
      - Repository identity is hash-based and cannot prove ownership, deployment equivalence, or branch ancestry.
      - Duplicate stable identities are preserved as review-tier evidence and TraceMap does not pick an arbitrary winner.
      - Missing source identity, language identity, commit SHA, assembly, package, or module metadata downgrades comparisons.

  - id: api.dto.contract.diff.coverage.v1
    name: API/DTO contract diff coverage
    description: Emits reduced coverage, no-diff evidence, and coverage-relative API/DTO contract diff gaps.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractDiffGap
    limitations:
      - Reduced scan coverage makes absence of evidence coverage-relative.
      - NoDiffEvidence means no comparable static evidence matched the selected scope, not proof that no runtime contract changed.
      - Build failures, syntax fallback, unavailable generated artifacts, and missing adapter precision can hide otherwise relevant evidence.

  - id: api.dto.contract.diff.schema.v1
    name: API/DTO contract diff schema gap
    description: Emits gaps when required or optional TraceMap index schema objects needed by API/DTO contract diff are absent.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractDiffGap
    limitations:
      - Missing schema prevents only the affected evidence projection from making stronger claims.
      - Schema gaps are not evidence that endpoints, DTOs, properties, methods, or attachments are absent.

  - id: api.dto.contract.diff.selector.v1
    name: API/DTO contract diff selector handling
    description: Emits selector no-match and ignored-selector metadata for API/DTO contract diff queries.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractDiffGap
    limitations:
      - Selector no-match reflects indexed static evidence only.
      - Dynamic routes, generated contracts, reduced coverage, unavailable attachment evidence, or unsupported adapter metadata can hide otherwise relevant evidence.

  - id: api.dto.contract.diff.truncation.v1
    name: API/DTO contract diff truncation
    description: Emits gaps when API/DTO contract diff row or gap caps truncate deterministic output.
    evidenceTier: Tier4Unknown
    emits:
      - ApiDtoContractDiffGap
    limitations:
      - Truncated reports are incomplete by construction and must not be interpreted as comprehensive.
      - Omitted counts and retained rows are deterministic for selected scopes and caps, but not evidence of lower importance.

  - id: package.upgrade.impact.v1
    name: Package upgrade static impact report
    description: Matches package-delta.v1 changes against indexed PackageReferenced/package-config static evidence in single or combined TraceMap indexes.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - PackageImpactFinding
      - PackageImpactGap
    limitations:
      - Package findings are static package declaration evidence only and do not prove package restore, installed versions, transitive dependency resolution, runtime loading, deployment, or API compatibility.
      - Lockfile, import/usage, and package-call evidence is adapter-dependent and is only included when deterministic package identity facts with documented limitations exist.
      - Version values are descriptive and safely rendered or hashed; TraceMap does not interpret semantic versioning, changelog impact, or compatibility.
      - Missing package evidence under reduced coverage is an analysis gap, not proof that a package is absent.
      - Exact package-name matching can miss aliases, relocated packages, shaded dependencies, generated manifests, imported build files, and dynamically declared dependencies.
      - No vulnerability database, registry, changelog, license, LLM, embedding, vector, or prompt-based analysis is used.

  - id: legacy.baseline.redacted-manifest.v1
    name: Legacy baseline redacted manifest
    description: Creates deterministic redacted legacy baseline manifests from TraceMap scan outputs using neutral labels and aggregate evidence counts.
    evidenceTier: Tier4Unknown
    emits:
      - LegacyBaselineManifest
    limitations:
      - Baseline manifests are counts-only summaries and omit raw facts, source paths, snippets, SQL text, config values, remotes, analyzer logs, and private sample identities.
      - Public-safe classification depends on validator coverage and reviewer judgment; it is not proof that every possible unsafe value was present or absent.
      - Missing evidence under reduced coverage remains an analysis gap and must not be interpreted as absence.

  - id: legacy.baseline.coverage-snapshot.v1
    name: Legacy baseline coverage snapshot
    description: Summarizes observed rule IDs, fact types, evidence tiers, extractors, surfaces, known gaps, and reduced-coverage states for a redacted baseline.
    evidenceTier: Tier4Unknown
    emits:
      - LegacyBaselineRuleCoverage
      - LegacyBaselineFactCoverage
    limitations:
      - Coverage snapshots preserve aggregate static evidence counts only and do not prove runtime behavior, deployment, or business relevance.
      - Surface status values are scope-relative and can be unknown, not-in-scope, not-observed, or observed depending on available scan artifacts.
      - Extractor and schema differences can make future count movement require a migration map or reviewer interpretation.

  - id: legacy.baseline.regression-comparison.v1
    name: Legacy baseline regression comparison
    description: Compares two redacted legacy baseline manifests by static evidence counts, coverage labels, extractor versions, known gaps, and supported surfaces.
    evidenceTier: Tier4Unknown
    emits:
      - LegacyBaselineComparison
      - LegacyBaselineMovement
    limitations:
      - Comparisons describe static evidence count and coverage movement only; they do not prove runtime behavior, production use, safety posture, or business impact.
      - Decreases, removed categories, rejected classifications, reduced coverage, and unmapped schema or rule changes require human review.
      - Migration maps document schema, rule, or fact renames but do not prove semantic equivalence beyond the stated limitation.

  - id: legacy.baseline.safety-validation.v1
    name: Legacy baseline safety validation
    description: Validates redacted baseline and comparison artifacts for storage boundaries, neutral labels, unsafe content categories, rule-catalog coverage, and promotion readiness.
    evidenceTier: Tier4Unknown
    emits:
      - LegacyBaselineValidationDiagnostic
    limitations:
      - Safety diagnostics report categories without echoing unsafe values, so remediation requires inspecting local-only artifacts outside committed outputs.
      - Secret-like, low-entropy, enumerable, or private identity values are omitted or represented category-only instead of hashed for public-safe artifacts.
      - Validation is a guardrail for committed summaries, not authorization to publish private scan artifacts.

  - id: legacy.evidence-pack.summary.v1
    name: Legacy evidence-pack summary
    description: Creates deterministic redacted evidence-pack summaries from TraceMap scan outputs, baseline manifests, or already redacted legacy validation summaries.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyEvidencePackSummary
      - LegacyEvidencePackDocument
    limitations:
      - Evidence packs are curated summaries over existing static evidence and are not source-of-truth scan outputs.
      - Aggregate counts do not prove runtime execution, deployment, reachability, production use, or business impact.
      - Reduced coverage, missing inputs, and unsupported input schemas remain labeled gaps rather than absence evidence.

  - id: legacy.evidence-pack.section.v1
    name: Legacy evidence-pack section evidence
    description: Emits safe per-section evidence rows with rule IDs, evidence tiers, source labels, coverage labels, provenance categories, and limitations.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyEvidencePackSection
      - LegacyEvidencePackRow
    limitations:
      - Section rows summarize static evidence categories and counts only; raw source snippets, SQL, config values, remotes, and local paths are omitted.
      - Section availability is scope-relative and must not be read as complete repository coverage unless the underlying scan coverage proves it.
      - Syntax or textual fallback evidence remains review-tier even when summarized in a public-safe pack.

  - id: legacy.evidence-pack.claim-boundary.v1
    name: Legacy evidence-pack claim boundary
    description: Records public/demo/local claim boundaries and prohibited-claim downgrades for evidence-pack output.
    evidenceTier: Tier4Unknown
    emits:
      - LegacyEvidencePackGap
      - LegacyEvidencePackLimitation
    limitations:
      - Claim boundaries describe what the pack is allowed to say; they do not upgrade the underlying evidence tier.
      - Public-safe and demo-safe packs can still require human judgment before site copy or release notes use them.
      - The validator blocks obvious overclaims but is not proof that every possible unsafe interpretation has been removed.

  - id: legacy.evidence-pack.safety-validation.v1
    name: Legacy evidence-pack safety validation
    description: Validates generated evidence-pack JSON and Markdown for storage boundaries, neutral labels, unsafe content categories, expected claim level, and promotion readiness.
    evidenceTier: Tier4Unknown
    emits:
      - LegacyEvidencePackValidationResult
      - LegacyEvidencePackValidationDiagnostic
    limitations:
      - Safety diagnostics report categories without echoing unsafe values, so remediation may require inspecting local-only inputs outside committed outputs.
      - Validation is a guardrail for redacted artifacts, not authorization to publish raw scan output or private repository identity.
      - Secret-like, low-entropy, enumerable, or private values are rejected or represented category-only rather than copied into public-safe output.

  - id: legacy.evidence-pack.command-provenance.v1
    name: Legacy evidence-pack command provenance
    description: Records sanitized generator, input-kind, input-fingerprint, and validation-command provenance for evidence packs.
    evidenceTier: Tier2Structural or Tier4Unknown
    emits:
      - LegacyEvidencePackCommandProvenance
    limitations:
      - Command provenance is normalized and omits raw local paths, environment variables, remotes, URLs, and private repository identity.
      - Input fingerprints prove byte identity of the summarized input, not semantic equivalence or runtime behavior.
      - A validation command listed in provenance is expected evidence, not proof that an external CI system ran successfully.

  - id: legacy.evidence-pack.input-availability.v1
    name: Legacy evidence-pack input availability
    description: Emits gaps for missing, unsupported, incompatible, unsafe, or partial evidence-pack inputs.
    evidenceTier: Tier4Unknown
    emits:
      - LegacyEvidencePackGap
    limitations:
      - Missing or unsupported inputs are analysis gaps and must not be interpreted as clean absence of legacy evidence.
      - Raw scan-output inputs are summarized only when they are under approved sample or ignored local storage boundaries.
      - Input availability does not prove source freshness, generated-code freshness, build completeness, or runtime reachability.
